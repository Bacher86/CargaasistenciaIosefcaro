<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Comunidad Familia - Iosef Caro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; padding-bottom: 100px; }
        .view-section { display: none; animation: fadeIn 0.3s ease-out; }
        .view-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .nav-active { color: #db2777 !important; border-top: 3px solid #db2777; background: #fff1f2; }
        .glass-card { background: white; border-radius: 2rem; border: 1px solid #f1f5f9; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); overflow: hidden; }
        .iosi-float { position: fixed; bottom: 100px; right: 20px; width: 60px; height: 60px; background: #4f46e5; border-radius: 25px; display: flex; items-center; justify-content: center; color: white; box-shadow: 0 10px 25px rgba(79, 70, 229, 0.4); z-index: 100; }
    </style>
</head>
<body>

    <header class="bg-white p-6 rounded-b-[2.5rem] shadow-sm mb-6 border-b">
        <div class="flex justify-between items-center">
            <div>
                <h1 id="userName" class="font-black text-xl text-slate-800 tracking-tighter">Cargando...</h1>
                <p id="childInfo" class="text-[10px] font-bold text-pink-500 uppercase tracking-widest">Verificando Alumno</p>
            </div>
            <div class="w-12 h-12 bg-pink-50 rounded-2xl flex items-center justify-center text-pink-600">
                <i class="fas fa-heart"></i>
            </div>
        </div>
    </header>

    <main class="px-4 max-w-md mx-auto">
        
        <section id="view-muro" class="view-section active">
            <h2 class="font-black text-slate-800 text-lg mb-4 ml-2">Muro Institucional</h2>
            <div id="muroContainer" class="grid gap-4">
                </div>
        </section>

        <section id="view-academico" class="view-section">
            <h2 class="font-black text-slate-800 text-lg mb-4 ml-2">Desempeño</h2>
            
            <div class="glass-card p-6 mb-4 flex justify-between items-center bg-gradient-to-br from-white to-slate-50">
                <div>
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Inasistencias Totales</p>
                    <p id="countFaltas" class="text-4xl font-black text-slate-800">0</p>
                </div>
                <div class="text-right">
                    <span class="text-[10px] font-bold bg-rose-100 text-rose-600 px-3 py-1 rounded-full uppercase">Ciclo 2026</span>
                </div>
            </div>

            <div class="glass-card p-6">
                <h3 class="font-bold text-sm text-slate-700 mb-4 flex items-center gap-2">
                    <i class="fas fa-file-invoice text-indigo-500"></i> Boletín de Calificaciones
                </h3>
                <div id="notasContainer" class="grid gap-3">
                    <p class="text-center text-slate-300 text-xs py-4 italic">No hay notas cargadas aún.</p>
                </div>
            </div>
        </section>

        <section id="view-agenda" class="view-section">
            <h2 class="font-black text-slate-800 text-lg mb-4 ml-2">Calendario Escolar</h2>
            <div id="agendaContainer" class="grid gap-3">
                </div>
        </section>

        <section id="view-firmas" class="view-section">
            <h2 class="font-black text-slate-800 text-lg mb-4 ml-2">Autorizaciones</h2>
            <div id="firmasContainer" class="grid gap-3">
                </div>
        </section>

    </main>

    <div class="iosi-float" onclick="alert('Iosi: ¡Hola! Estoy analizando los datos de tu hijo para ayudarte. (Conexión API en proceso)')">
        <i class="fas fa-robot text-2xl"></i>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around items-center h-20 shadow-2xl z-50">
        <button onclick="switchView('muro')" id="btn-muro" class="nav-btn nav-active flex flex-col items-center flex-1 py-2">
            <i class="fas fa-home"></i><span class="text-[8px] font-bold mt-1 uppercase">Inicio</span>
        </button>
        <button onclick="switchView('academico')" id="btn-academico" class="nav-btn text-slate-300 flex flex-col items-center flex-1 py-2">
            <i class="fas fa-graduation-cap"></i><span class="text-[8px] font-bold mt-1 uppercase">Notas</span>
        </button>
        <button onclick="switchView('agenda')" id="btn-agenda" class="nav-btn text-slate-300 flex flex-col items-center flex-1 py-2">
            <i class="fas fa-calendar-alt"></i><span class="text-[8px] font-bold mt-1 uppercase">Agenda</span>
        </button>
        <button onclick="switchView('firmas')" id="btn-firmas" class="nav-btn text-slate-300 flex flex-col items-center flex-1 py-2">
            <i class="fas fa-pen-nib"></i><span class="text-[8px] font-bold mt-1 uppercase">Firmas</span>
        </button>
    </nav>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCLeGKE5NoGUQT0GRdMDIHn4zhxF3ZOp6k",
            authDomain: "app-academica-interna.firebaseapp.com",
            projectId: "app-academica-interna",
            storageBucket: "app-academica-interna.firebasestorage.app",
            messagingSenderId: "169882587504",
            appId: "1:169882587504:web:0fcdf32efdc81ad0a0bfb5"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // 1. LOGIN SIMULADO (Aquí detectamos al padre por su mail)
        const userEmail = "familia@gmail.com"; // Esto vendría del login real
        let dataHijo = { id: "", nombre: "", curso: "" };

       async function initApp() {
    const userDoc = await db.collection('usuarios').doc(userEmail.toLowerCase()).get();
    
    if (userDoc.exists) {
        const userData = userDoc.data();
        document.getElementById('userName').innerText = "Familia " + userData.nombre;
        
        if(userData.hijoID && userData.hijoID.length > 0) {
            const hijoID = userData.hijoID[0];
            const hijoDoc = await db.collection('alumnos').doc(hijoID).get();
            // ... resto del código igual
        }
    } else {
        alert("El mail " + userEmail + " no está registrado. Cargalo primero en el Panel Admin.");
        localStorage.clear();
        location.reload();
    }
}

        function switchView(id) {
            document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => { b.classList.add('text-slate-300'); b.classList.remove('nav-active'); });
            document.getElementById('view-' + id).classList.add('active');
            document.getElementById('btn-' + id).classList.add('nav-active');
            document.getElementById('btn-' + id).classList.remove('text-slate-300');
        }

        // 2. CARGAR MURO PRO
        function cargarMuro() {
            db.collection('comunicados').orderBy('creadoEn', 'desc').onSnapshot(snap => {
                const container = document.getElementById('muroContainer');
                container.innerHTML = snap.docs.map(doc => {
                    const d = doc.data();
                    if(d.tag === "TODOS" || d.tag === dataHijo.curso) {
                        return `
                        <div class="glass-card p-6">
                            <span class="text-[8px] font-black bg-indigo-50 text-indigo-500 px-2 py-1 rounded-full uppercase">${d.tag}</span>
                            <h4 class="font-extrabold text-slate-800 text-lg mt-2 leading-tight">${d.titulo}</h4>
                            <p class="text-xs text-slate-500 mt-2 leading-relaxed">${d.texto}</p>
                        </div>`;
                    }
                }).join('');
            });
        }

        // 3. CARGAR NOTAS Y FALTAS
        function cargarDatosAcademicos() {
            db.collection('calificaciones').doc(dataHijo.id).onSnapshot(doc => {
                if(!doc.exists) return;
                const data = doc.data();
                
                // Faltas
                const faltas = data.fechasFaltas ? data.fechasFaltas.length : 0;
                document.getElementById('countFaltas').innerText = faltas;

                // Notas
                if(data.notas) {
                    let htmlNotas = "";
                    for (const [materia, trimestres] of Object.entries(data.notas)) {
                        htmlNotas += `
                        <div class="flex justify-between items-center p-3 bg-slate-50 rounded-2xl border border-slate-100">
                            <span class="text-xs font-bold text-slate-700">${materia}</span>
                            <div class="flex gap-2">
                                <span class="w-6 h-6 flex items-center justify-center bg-white rounded-lg text-[10px] font-black shadow-sm">${trimestres['1Trim'] || '-'}</span>
                                <span class="w-6 h-6 flex items-center justify-center bg-white rounded-lg text-[10px] font-black shadow-sm">${trimestres['2Trim'] || '-'}</span>
                                <span class="w-6 h-6 flex items-center justify-center bg-indigo-500 text-white rounded-lg text-[10px] font-black shadow-sm">${trimestres['3Trim'] || '-'}</span>
                            </div>
                        </div>`;
                    }
                    document.getElementById('notasContainer').innerHTML = htmlNotas;
                }
            });
        }

        // 4. CARGAR AGENDA
        function cargarAgenda() {
            db.collection('eventos').orderBy('fecha', 'asc').onSnapshot(snap => {
                document.getElementById('agendaContainer').innerHTML = snap.docs.map(doc => {
                    const e = doc.data();
                    if(e.visibilidad === "TODOS" || e.visibilidad === dataHijo.curso) {
                        return `
                        <div class="flex items-center gap-4 bg-white p-4 rounded-[1.5rem] border border-slate-100 shadow-sm">
                            <div class="bg-slate-800 text-white p-2 rounded-xl text-center min-w-[50px]">
                                <span class="block text-xs font-black">${e.fecha.split('-')[2]}</span>
                                <span class="block text-[8px] uppercase font-bold opacity-60">${e.fecha.split('-')[1]}</span>
                            </div>
                            <p class="font-bold text-slate-700 text-xs">${e.titulo}</p>
                        </div>`;
                    }
                }).join('');
            });
        }

        // 5. CARGAR AUTORIZACIONES (FIRMAS)
        function cargarFirmas() {
            db.collection('autorizaciones').onSnapshot(snap => {
                document.getElementById('firmasContainer').innerHTML = snap.docs.map(doc => {
                    const a = doc.data();
                    if(a.curso === "TODOS" || a.curso === dataHijo.curso) {
                        return `
                        <div class="glass-card p-5 border-l-4 border-rose-500">
                            <h4 class="font-black text-slate-800 text-sm">${a.titulo}</h4>
                            <p class="text-[10px] text-slate-500 mt-1">${a.descripcion}</p>
                            <button onclick="firmar('${doc.id}')" class="w-full mt-4 bg-rose-500 text-white py-2 rounded-xl text-[10px] font-black uppercase tracking-widest active:scale-95 transition-all">
                                Firmar Autorización
                            </button>
                        </div>`;
                    }
                }).join('');
            });
        }

        async function firmar(id) {
            if(confirm("¿Autorizas la participación de tu hijo/a en esta actividad?")) {
                await db.collection('autorizaciones').doc(id).update({
                    firmadoPor: firebase.firestore.FieldValue.arrayUnion(userEmail)
                });
                alert("✅ Firma registrada digitalmente.");
            }
        }

        initApp();
    </script>
</body>
</html>
