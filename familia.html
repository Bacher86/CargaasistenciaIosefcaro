<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Familias</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>

<style>
body { font-family: sans-serif; }
</style>
</head>

<body class="bg-slate-100">

<!-- LOGIN -->
<div id="login" class="p-6 text-center">
    <h1 class="text-xl font-bold mb-4">Ingreso Familia</h1>
    <input id="email" placeholder="Email" class="border p-2 rounded">
    <button onclick="login()" class="bg-blue-500 text-white px-4 py-2 rounded">Entrar</button>
</div>

<!-- APP -->
<div id="app" class="hidden p-4 max-w-md mx-auto">

    <h2 id="nombreTutor" class="font-bold mb-4"></h2>

    <!-- HIJOS -->
    <select id="hijos" onchange="cargarTodo()" class="mb-4 p-2 border rounded w-full"></select>

    <!-- CALENDARIO -->
    <div class="mb-6">
        <h3 class="font-bold mb-2">Calendario</h3>
        <div id="calendario"></div>
    </div>

    <!-- CHAT -->
    <div class="flex flex-col h-[400px] border rounded bg-white">

        <div id="chat" class="flex-1 p-3 overflow-y-auto flex flex-col gap-2"></div>

        <div class="flex border-t">
            <input id="msg" class="flex-1 p-2 outline-none" placeholder="Mensaje...">
            <button onclick="enviarMensaje()" class="bg-pink-500 text-white px-4">➤</button>
        </div>
    </div>

</div>

<script>
const firebaseConfig = {
    apiKey: "TU_API_KEY",
    authDomain: "app-academica-interna.firebaseapp.com",
    projectId: "app-academica-interna"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let emailActual = null;
let hijoActual = null;
let unsubChat = null;
let unsubCal = null;

// LOGIN
async function login(){
    const email = document.getElementById('email').value.trim().toLowerCase();

    const doc = await db.collection('usuarios').doc(email).get();

    if(!doc.exists) return alert("No existe");

    const data = doc.data();
    if(data.rol !== "familia") return alert("No autorizado");

    emailActual = email;

    document.getElementById('login').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');

    document.getElementById('nombreTutor').innerText = data.nombre;

    const hijos = Array.isArray(data.hijoID) ? data.hijoID : [data.hijoID];

    const select = document.getElementById('hijos');
    select.innerHTML = "";

    for(let id of hijos){
        const h = await db.collection('alumnos').doc(id).get();
        select.innerHTML += `<option value="${id}">${h.data().nombre}</option>`;
    }

    hijoActual = hijos[0];
    cargarTodo();
}

// CARGAR TODO
function cargarTodo(){
    hijoActual = document.getElementById('hijos').value;
    escucharCalendario();
    escucharChat();
}

// CALENDARIO
function escucharCalendario(){
    if(unsubCal) unsubCal();

    db.collection('alumnos').doc(hijoActual).get().then(h => {

        const curso = h.data().cursoID;

        unsubCal = db.collection('eventos')
        .where('curso', 'in', ['TODOS', curso])
        .orderBy('fecha')
        .onSnapshot(snap => {

            const cont = document.getElementById('calendario');
            cont.innerHTML = "";

            snap.forEach(doc=>{
                const e = doc.data();

                cont.innerHTML += `
                <div class="border p-2 mb-2 rounded">
                    <b>${e.fecha}</b> - ${e.titulo}
                </div>
                `;
            });

        });

    });
}

// CHAT
function escucharChat(){
    if(unsubChat) unsubChat();

    unsubChat = db.collection('mensajes')
    .where('participantes', 'array-contains', emailActual)
    .orderBy('fecha')
    .onSnapshot(snap => {

        const box = document.getElementById('chat');
        box.innerHTML = "";

        snap.forEach(doc=>{
            const m = doc.data();
            const esMio = m.emisorID === emailActual;

            box.innerHTML += `
            <div class="p-2 rounded max-w-[70%] ${
                esMio ? 'bg-pink-500 text-white self-end' : 'bg-gray-200 self-start'
            }">
                ${m.texto}
            </div>
            `;
        });

        box.scrollTop = box.scrollHeight;
    });
}

// ENVIAR MENSAJE
async function enviarMensaje(){
    const input = document.getElementById('msg');
    const texto = input.value.trim();
    if(!texto) return;

    input.value = "";

    await db.collection('mensajes').add({
        emisorID: emailActual,
        receptorID: "secretaria_primaria",
        participantes: [emailActual, "secretaria_primaria"],
        texto: texto,
        fecha: firebase.firestore.FieldValue.serverTimestamp()
    });

    // IA AUTOMÁTICA
    if(texto.toLowerCase().includes("desempeño") || texto.toLowerCase().includes("como va")){
        responderIA(texto);
    }
}

// IA EN CHAT
async function responderIA(pregunta){

    const chat = document.getElementById('chat');

    chat.innerHTML += `<div class="text-xs text-gray-400">IA escribiendo...</div>`;

    try{
        const response = await fetch("https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=TU_API_KEY",{
            method:"POST",
            body: JSON.stringify({
                contents:[{
                    parts:[{
                        text:`Sos una secretaria escolar. Responde breve y amable: ${pregunta}`
                    }]
                }]
            })
        });

        const data = await response.json();
        const texto = data.candidates[0].content.parts[0].text;

        await db.collection('mensajes').add({
            emisorID: "secretaria_primaria",
            receptorID: emailActual,
            participantes: [emailActual, "secretaria_primaria"],
            texto: texto,
            fecha: firebase.firestore.FieldValue.serverTimestamp()
        });

    }catch(e){
        console.log(e);
    }
}

</script>
</body>
</html>
