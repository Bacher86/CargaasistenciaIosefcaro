<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Comunidad Familia - Iosef Caro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; color: #1e293b; }
        .nav-active { color: #db2777 !important; }
        .nav-active i { background: #fdf2f8; padding: 12px; border-radius: 20px; box-shadow: 0 10px 15px -3px rgba(219, 39, 119, 0.2); }
        .view-section { display: none; animation: fadeIn 0.3s ease-out; }
        .view-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        #login-screen { position: fixed; inset: 0; background: white; z-index: 5000; display: flex; flex-direction: column; justify-content: center; padding: 2rem; }
        .ios-input { background: #f1f5f9; border: none; border-radius: 1.5rem; padding: 1.2rem; font-weight: 700; width: 100%; outline: none; }
    </style>
</head>
<body class="pb-32">

    <div id="login-screen" class="hidden">
        <div class="max-w-md mx-auto w-full text-center">
            <div class="w-20 h-20 bg-pink-50 text-pink-500 rounded-[2.5rem] flex items-center justify-center text-3xl mx-auto mb-8 shadow-sm"><i class="fas fa-heart"></i></div>
            <h1 class="font-black text-4xl text-slate-800 tracking-tighter mb-2">Hola,</h1>
            <p class="text-slate-400 font-bold mb-10 text-sm">Ingresá tu correo de familia para continuar.</p>
            <input type="email" id="loginEmail" placeholder="ejemplo@correo.com" class="ios-input mb-4 text-center">
            <button onclick="login()" class="w-full bg-slate-900 text-white p-5 rounded-[1.8rem] font-black text-xs uppercase tracking-widest shadow-xl active:scale-95 transition-all">Ingresar al Panel</button>
            <p id="loginError" class="text-rose-500 text-[10px] font-black mt-6 hidden uppercase tracking-widest text-center">Usuario no encontrado</p>
        </div>
    </div>

    <div id="app">
        <header class="p-8 pb-4">
            <div class="flex justify-between items-start mb-6">
                <div>
                    <h1 id="userName" class="font-black text-3xl text-slate-800 tracking-tighter leading-none">Cargando...</h1>
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em] mt-2">Comunidad Educativa</p>
                </div>
                <button onclick="cerrarSesion()" class="w-12 h-12 bg-white rounded-2xl border flex items-center justify-center text-slate-300 shadow-sm"><i class="fas fa-power-off"></i></button>
            </div>

            <div id="selectorContainer" class="hidden animate-pulse">
                <label class="text-[9px] font-black text-slate-400 uppercase ml-2 mb-1 block">Alumno seleccionado:</label>
                <select id="selectHijo" onchange="cambiarHijo(this.value)" class="ios-input !py-3 !text-sm"></select>
            </div>
        </header>

        <main class="px-6 max-w-md mx-auto">
            <section id="section-muro" class="view-section active space-y-4"></section>

            <section id="section-academico" class="view-section space-y-4">
                <div class="bg-slate-900 p-8 rounded-[2.5rem] text-white shadow-xl flex justify-between items-center">
                    <div>
                        <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Inasistencias Totales</p>
                        <h3 id="countFaltas" class="text-5xl font-black mt-1">0</h3>
                    </div>
                    <div class="w-16 h-16 bg-white/10 rounded-3xl flex items-center justify-center text-2xl"><i class="fas fa-user-clock"></i></div>
                </div>
                <div id="notasContainer" class="bg-white p-6 rounded-[2.5rem] border shadow-sm space-y-3"></div>
            </section>

            <section id="section-agenda" class="view-section space-y-3"></section>
        </main>
    </div>

    <div id="window-iosi" class="hidden fixed inset-x-6 bottom-32 bg-white rounded-[2.5rem] shadow-2xl border z-[4000] flex flex-col overflow-hidden">
        <div class="p-6 bg-indigo-600 text-white flex justify-between items-center">
            <div class="flex items-center gap-3"><i class="fas fa-robot"></i><span class="font-black text-sm uppercase">Iosi Asistente</span></div>
            <button onclick="toggleIosi()"><i class="fas fa-times"></i></button>
        </div>
        <div id="iosi-chat" class="h-80 p-6 overflow-y-auto bg-slate-50 text-[11px] font-bold text-slate-600">
            <div class="bg-white p-4 rounded-2xl rounded-tl-none border shadow-sm mb-2 max-w-[80%]">¡Hola! Soy Iosi. ¿Qué necesitás saber sobre las notas o eventos?</div>
        </div>
        <div class="p-4 border-t bg-white flex gap-2">
            <input type="text" placeholder="Escribí acá..." class="ios-input !p-3 !text-xs">
            <button class="bg-indigo-600 text-white w-12 h-12 rounded-2xl flex items-center justify-center shadow-lg"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>
    <button onclick="toggleIosi()" class="fixed bottom-32 right-6 w-16 h-16 bg-indigo-600 text-white rounded-[2rem] shadow-2xl z-[3000] flex items-center justify-center animate-bounce-subtle border-4 border-white"><i class="fas fa-robot text-2xl"></i></button>

    <nav class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-xl border-t flex justify-around items-center h-28 px-6 z-[2000]">
        <button onclick="switchTab('muro')" id="btn-muro" class="nav-btn nav-active flex flex-col items-center flex-1 transition-all"><i class="fas fa-th-large text-xl"></i><span class="text-[9px] font-black mt-2 uppercase">Inicio</span></button>
        <button onclick="switchTab('academico')" id="btn-academico" class="nav-btn text-slate-300 flex flex-col items-center flex-1 transition-all"><i class="fas fa-address-book text-xl"></i><span class="text-[9px] font-black mt-2 uppercase">Boletín</span></button>
        <button onclick="switchTab('agenda')" id="btn-agenda" class="nav-btn text-slate-300 flex flex-col items-center flex-1 transition-all"><i class="fas fa-calendar-alt text-xl"></i><span class="text-[9px] font-black mt-2 uppercase">Agenda</span></button>
    </nav>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCLeGKE5NoGUQT0GRdMDIHn4zhxF3ZOp6k",
            authDomain: "app-academica-interna.firebaseapp.com",
            projectId: "app-academica-interna",
            storageBucket: "app-academica-interna.firebasestorage.app",
            messagingSenderId: "169882587504",
            appId: "1:169882587504:web:0fcdf32efdc81ad0a0bfb5"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let currentEmail = localStorage.getItem('parentEmail');
        let hijoActivo = "";

        window.onload = () => {
            if (!currentEmail) {
                document.getElementById('login-screen').classList.remove('hidden');
                document.getElementById('app').classList.add('hidden');
            } else {
                iniciarSesion();
            }
        };

        async function login() {
            const email = document.getElementById('loginEmail').value.toLowerCase().trim();
            const userDoc = await db.collection('usuarios').doc(email).get();
            if (userDoc.exists && userDoc.data().rol === 'familia') {
                localStorage.setItem('parentEmail', email);
                location.reload();
            } else {
                document.getElementById('loginError').classList.remove('hidden');
            }
        }

        async function iniciarSesion() {
            const userDoc = await db.collection('usuarios').doc(currentEmail).get();
            const userData = userDoc.data();
            document.getElementById('userName').innerText = "Hola, " + userData.nombre;
            
            if (userData.hijoID && userData.hijoID.length > 0) {
                if (userData.hijoID.length > 1) {
                    document.getElementById('selectorContainer').classList.remove('hidden');
                    const select = document.getElementById('selectHijo');
                    for (let id of userData.hijoID) {
                        const hDoc = await db.collection('alumnos').doc(id).get();
                        select.innerHTML += `<option value="${id}">${hDoc.data().nombre}</option>`;
                    }
                }
                cambiarHijo(userData.hijoID[0]);
            }
        }

        async function cambiarHijo(id) {
            hijoActivo = id;
            const hDoc = await db.collection('alumnos').doc(id).get();
            const data = hDoc.data();
            cargarMuro(data.curso);
            cargarAcademico(id);
            cargarAgenda();
        }

        function cargarMuro(curso) {
            db.collection('comunicados').orderBy('creadoEn', 'desc').onSnapshot(snap => {
                const container = document.getElementById('section-muro');
                container.innerHTML = "";
                snap.forEach(doc => {
                    const d = doc.data();
                    if(d.tag === "TODOS" || d.tag === curso) {
                        const postID = doc.id;
                        container.innerHTML += `
                            <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-100">
                                <h4 class="font-black text-slate-800 text-lg mb-2">${d.titulo}</h4>
                                <p class="text-xs text-slate-500 font-medium mb-6">${d.texto}</p>
                                <div class="flex justify-between items-center pt-4 border-t border-slate-50">
                                    <button onclick="reaccionar('${postID}', 'likes')" class="text-[10px] font-black text-pink-500 uppercase flex items-center gap-2">
                                        <i class="fas fa-heart"></i> Me gusta (${d.likes || 0})
                                    </button>
                                    <button onclick="reaccionar('${postID}', 'visto')" class="text-[10px] font-black text-slate-400 uppercase flex items-center gap-2">
                                        <i class="fas fa-check-double"></i> Confirmar lectura
                                    </button>
                                </div>
                            </div>`;
                    }
                });
            });
        }

        async function reaccionar(id, campo) {
            const ref = db.collection('comunicados').doc(id);
            await ref.update({ [campo]: firebase.firestore.FieldValue.increment(1) });
        }

        function cargarAcademico(id) {
            db.collection('calificaciones').doc(id).onSnapshot(doc => {
                const container = document.getElementById('notasContainer');
                if(!doc.exists) { container.innerHTML = "<p class='text-center text-xs font-bold text-slate-400 p-4'>Sin notas cargadas</p>"; return; }
                const d = doc.data();
                document.getElementById('countFaltas').innerText = d.fechasFaltas ? d.fechasFaltas.length : 0;
                
                let html = "";
                for (const [materia, trims] of Object.entries(d.notas || {})) {
                    html += `
                        <div class="flex justify-between items-center p-5 bg-slate-50 rounded-2xl">
                            <span class="text-xs font-black text-slate-700 uppercase tracking-tighter">${materia}</span>
                            <div class="flex gap-2">
                                <div class="flex flex-col items-center"><span class="text-[7px] text-slate-400 font-black uppercase">1T</span><span class="w-8 h-8 flex items-center justify-center bg-white rounded-lg text-[11px] font-black shadow-sm">${trims['1Trim'] || '-'}</span></div>
                                <div class="flex flex-col items-center"><span class="text-[7px] text-slate-400 font-black uppercase">2T</span><span class="w-8 h-8 flex items-center justify-center bg-white rounded-lg text-[11px] font-black shadow-sm">${trims['2Trim'] || '-'}</span></div>
                                <div class="flex flex-col items-center"><span class="text-[7px] text-pink-500 font-black uppercase">3T</span><span class="w-8 h-8 flex items-center justify-center bg-pink-500 text-white rounded-lg text-[11px] font-black shadow-sm">${trims['3Trim'] || '-'}</span></div>
                            </div>
                        </div>`;
                }
                container.innerHTML = html || "<p class='text-center text-xs font-bold text-slate-400'>No hay calificaciones aún.</p>";
            });
        }

        function cargarAgenda() {
            db.collection('eventos').orderBy('fecha', 'asc').onSnapshot(snap => {
                const container = document.getElementById('section-agenda');
                container.innerHTML = snap.docs.map(doc => `
                    <div class="flex items-center gap-5 bg-white p-5 rounded-[2.2rem] border shadow-sm">
                        <div class="bg-slate-900 text-white p-3 rounded-2xl text-center min-w-[60px]">
                            <span class="block text-sm font-black leading-none">${doc.data().fecha.split('-')[2]}</span>
                            <span class="block text-[8px] uppercase font-bold opacity-50 mt-1">${doc.data().fecha.split('-')[1]}</span>
                        </div>
                        <p class="font-bold text-slate-700 text-sm tracking-tight">${doc.data().titulo}</p>
                    </div>`).join('');
            });
        }

        function switchTab(id) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.getElementById('section-' + id).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('nav-active'));
            document.getElementById('btn-' + id).classList.add('nav-active');
        }

        function toggleIosi() { document.getElementById('window-iosi').classList.toggle('hidden'); }
        function cerrarSesion() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
