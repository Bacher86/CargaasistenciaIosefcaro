<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comunidad Familia v4.0 - Full Interacción</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        .nav-active { color: #db2777 !important; transform: scale(1.1); }
        .nav-active i { background: #fdf2f8; padding: 12px; border-radius: 20px; box-shadow: 0 10px 15px -3px rgba(219, 39, 119, 0.2); }
        .glass { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(14px); border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
        .card-not-read { border-left: 6px solid #db2777; }
        .card-read { border-left: 6px solid #e2e8f0; opacity: 0.8; }
        .ios-scroll::-webkit-scrollbar { display: none; }
        @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }
        .like-active { color: #db2777; animation: pop 0.3s ease; }
    </style>
</head>
<body class="bg-[#F8FAFC] min-h-screen text-slate-900">

    <div id="loadingOverlay" class="fixed inset-0 z-[150] bg-white flex flex-col items-center justify-center">
        <div class="w-12 h-12 border-4 border-pink-500 border-t-transparent rounded-full animate-spin"></div>
        <p class="mt-4 font-black text-pink-500 text-[10px] uppercase tracking-widest">Cargando Comunidad...</p>
    </div>

    <div id="loginScreen" class="fixed inset-0 z-[110] bg-white flex flex-col items-center justify-center px-10">
        <div class="w-full max-w-xs text-center">
            <div class="w-20 h-20 bg-slate-900 rounded-[2rem] shadow-2xl flex items-center justify-center text-white text-3xl mb-10 mx-auto rotate-3"><i class="fa-solid fa-heart-pulse"></i></div>
            <h1 class="text-3xl font-black mb-10">Hola de nuevo.</h1>
            <input type="email" id="emailAcceso" placeholder="Tu correo" class="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl p-5 mb-4 outline-none focus:border-pink-500 font-bold transition-all">
            <button onclick="validarAcceso()" class="w-full bg-slate-900 text-white font-black py-5 rounded-2xl shadow-xl active:scale-95 transition-all uppercase tracking-widest text-xs">Entrar</button>
        </div>
    </div>

    <div id="mainPanel" class="hidden">
        <header class="glass sticky top-0 z-50 px-6 py-5 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-2xl bg-slate-900 flex items-center justify-center text-white shadow-lg"><i class="fa-solid fa-user-graduate"></i></div>
                <div>
                    <p id="nombreTutor" class="font-black text-slate-800 text-sm">...</p>
                    <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Familia</p>
                </div>
            </div>
            <button onclick="cerrarSesion()" class="text-slate-300"><i class="fa-solid fa-arrow-right-from-bracket text-xl"></i></button>
        </header>

        <main class="max-w-md mx-auto px-6 pt-6 pb-40">
            <div id="selectorHijosContainer" class="mb-8 hidden">
                <div class="bg-white p-2 rounded-2xl shadow-sm border border-slate-100 flex items-center">
                    <div class="bg-indigo-600 text-white px-3 py-2 rounded-xl font-black text-[9px] uppercase">Alumno/a</div>
                    <select id="selectorHijos" onchange="cargarDatosHijo(this.value)" class="flex-1 bg-transparent px-3 font-bold text-slate-700 outline-none"></select>
                </div>
            </div>

            <div id="section-home" class="view-section">
                <h3 class="font-black text-2xl mb-6">Comunicados</h3>
                <div id="feedFamilias" class="space-y-6"></div>
            </div>

            <div id="section-calendar" class="view-section hidden">
                <h3 class="font-black text-2xl mb-6">Calendario</h3>
                <div id="calendarFeed" class="space-y-4"></div>
            </div>

            <div id="section-boletin" class="view-section hidden">
                <h3 class="font-black text-2xl mb-6">Rendimiento</h3>
                <div class="grid grid-cols-2 gap-4 mb-8">
                    <div class="bg-slate-900 p-6 rounded-[2.5rem] text-white">
                        <p class="text-[9px] font-bold opacity-50 uppercase">Asistencia</p>
                        <p id="b-asist" class="text-3xl font-black">0%</p>
                    </div>
                    <div class="bg-white p-6 rounded-[2.5rem] border border-slate-100">
                        <p class="text-[9px] font-bold text-slate-400 uppercase">Faltas</p>
                        <p id="b-inasist" class="text-3xl font-black text-slate-800">0</p>
                    </div>
                </div>
                <h4 class="font-black text-[10px] text-slate-400 uppercase tracking-widest mb-4">Notas</h4>
                <div id="tabla-notas" class="space-y-2 mb-8"></div>
                <h4 class="font-black text-[10px] text-slate-400 uppercase tracking-widest mb-4">Informes Escritos</h4>
                <div id="lista-informes" class="space-y-4"></div>
            </div>

            <div id="section-chat" class="view-section hidden">
                <h3 class="font-black text-2xl mb-6">Mensajes</h3>
                <div id="contactList" class="flex gap-4 overflow-x-auto ios-scroll mb-8"></div>
                <div class="bg-white rounded-[2.5rem] border border-slate-100 h-96 flex flex-col overflow-hidden">
                    <div id="chatHeader" class="p-4 border-b bg-slate-50 text-[10px] font-bold text-slate-400 uppercase">Selecciona canal</div>
                    <div id="chatMessages" class="flex-1 p-5 overflow-y-auto space-y-4 ios-scroll"></div>
                    <div class="p-4 border-t flex gap-2">
                        <input type="text" id="msgInput" placeholder="Escribir..." class="flex-1 bg-slate-100 rounded-2xl px-4 py-2 text-sm outline-none">
                        <button onclick="enviarMensaje()" class="bg-indigo-600 text-white w-10 h-10 rounded-xl"><i class="fa-solid fa-paper-plane"></i></button>
                    </div>
                </div>
            </div>
        </main>

        <nav class="fixed bottom-8 left-1/2 -translate-x-1/2 w-[90%] max-w-sm glass rounded-[2.8rem] shadow-2xl h-20 flex items-center justify-around px-6 z-50">
            <button onclick="switchTab('home')" class="nav-btn nav-active" id="btn-home"><i class="fa-solid fa-house-user text-xl"></i></button>
            <button onclick="switchTab('calendar')" class="nav-btn text-slate-300" id="btn-calendar"><i class="fa-solid fa-calendar-day text-xl"></i></button>
            <button onclick="switchTab('boletin')" class="nav-btn text-slate-300" id="btn-boletin"><i class="fa-solid fa-graduation-cap text-xl"></i></button>
            <button onclick="switchTab('chat')" class="nav-btn text-slate-300" id="btn-chat"><i class="fa-solid fa-comment-dots text-xl"></i></button>
        </nav>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCLeGKE5NoGUQT0GRdMDIHn4zhxF3ZOp6k",
        authDomain: "app-academica-interna.firebaseapp.com",
        projectId: "app-academica-interna",
        storageBucket: "app-academica-interna.firebasestorage.app",
        messagingSenderId: "169882587504",
        appId: "1:169882587504:web:0fcdf32efdc81ad0a0bfb5"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let hijoActivo = null;
    let tutorEmail = "";
    let canalChatActivo = null;

    async function validarAcceso() {
        const email = document.getElementById('emailAcceso').value.trim().toLowerCase();
        if(!email) return;
        document.getElementById('loadingOverlay').classList.remove('hidden');
        try {
            const doc = await db.collection('usuarios').doc(email).get();
            if(doc.exists && doc.data().rol === 'familia') {
                tutorEmail = email;
                localStorage.setItem('familiaEmail', email);
                iniciarApp(doc.data());
            } else { alert("Usuario no registrado"); document.getElementById('loadingOverlay').classList.add('hidden'); }
        } catch(e) { document.getElementById('loadingOverlay').classList.add('hidden'); }
    }

    async function iniciarApp(data) {
        document.getElementById('loginScreen').classList.add('hidden');
        document.getElementById('mainPanel').classList.remove('hidden');
        document.getElementById('nombreTutor').innerText = data.nombre;

        const hijosIds = Array.isArray(data.hijoID) ? data.hijoID : [data.hijoID];
        if(hijosIds.length > 1) {
            document.getElementById('selectorHijosContainer').classList.remove('hidden');
            const select = document.getElementById('selectorHijos');
            select.innerHTML = "";
            for(let id of hijosIds) {
                const h = await db.collection('alumnos').doc(id).get();
                if(h.exists) select.innerHTML += `<option value="${id}">${h.data().nombre}</option>`;
            }
        }
        cargarDatosHijo(hijosIds[0]);
        cargarContactos();
        document.getElementById('loadingOverlay').classList.add('hidden');
    }

    async function cargarDatosHijo(id) {
        const doc = await db.collection('alumnos').doc(id).get();
        if(doc.exists) {
            hijoActivo = { id: doc.id, ...doc.data() };
            vincularBoletin(hijoActivo.id);
            escucharFeed(hijoActivo.cursoID);
            escucharCalendario(hijoActivo.cursoID);
            escucharInformes(hijoActivo.id);
        }
    }

    // --- LÓGICA DE CALENDARIO ---
    function escucharCalendario(curso) {
        // Buscamos eventos que sean para todos o para el curso específico
        db.collection('eventos').onSnapshot(snap => {
            const container = document.getElementById('calendarFeed');
            container.innerHTML = "";
            let tieneEventos = false;
            snap.forEach(doc => {
                const e = doc.data();
                if(e.cursoID === "TODOS" || e.cursoID === curso) {
                    tieneEventos = true;
                    container.innerHTML += `
                        <div class="bg-white p-5 rounded-3xl border border-slate-50 flex items-center gap-4 shadow-sm animate-fade">
                            <div class="bg-indigo-50 p-3 rounded-2xl text-indigo-600"><i class="fa-solid fa-calendar-star"></i></div>
                            <div>
                                <p class="font-black text-slate-800 text-sm">${e.titulo}</p>
                                <p class="text-[10px] text-slate-400 font-bold uppercase">${e.fecha} ${e.hora || ''}</p>
                            </div>
                        </div>`;
                }
            });
            if(!tieneEventos) container.innerHTML = "<p class='text-center text-xs text-slate-300 py-10'>No hay eventos programados.</p>";
        });
    }

    // --- COMUNICADOS CON ME GUSTA Y LEÍDO ---
    function escucharFeed(curso) {
        db.collection('comunicados').onSnapshot(snap => {
            const container = document.getElementById('feedFamilias');
            container.innerHTML = "";
            snap.forEach(doc => {
                const p = doc.data();
                if(p.tag === "TODOS" || p.tag === curso) {
                    const interact = p.interacciones || {};
                    const isRead = interact[tutorEmail]?.leido || false;
                    const isLiked = interact[tutorEmail]?.like || false;

                    container.innerHTML += `
                        <div class="bg-white p-6 rounded-[2.2rem] shadow-sm border border-slate-100 ${isRead ? 'card-read' : 'card-not-read'}">
                            <h4 class="font-black text-slate-800 text-lg mb-2 leading-tight">${p.titulo}</h4>
                            <p class="text-xs text-slate-500 font-medium mb-5 leading-relaxed">${p.texto}</p>
                            <div class="flex justify-between items-center pt-4 border-t border-slate-50">
                                <button onclick="toggleLike('${doc.id}', ${isLiked})" class="flex items-center gap-2 text-[10px] font-black uppercase tracking-widest ${isLiked ? 'like-active' : 'text-slate-300'}">
                                    <i class="fa-solid fa-heart"></i> ${isLiked ? 'Te gusta' : 'Me gusta'}
                                </button>
                                ${!isRead ? 
                                    `<button onclick="marcarLeido('${doc.id}')" class="bg-slate-900 text-white px-4 py-2 rounded-xl text-[9px] font-black uppercase tracking-tighter">Marcar leído</button>` : 
                                    `<span class="text-[9px] font-bold text-slate-300 uppercase"><i class="fa-solid fa-check-double"></i> Visto</span>`
                                }
                            </div>
                        </div>`;
                }
            });
        });
    }

    async function toggleLike(docId, currentStatus) {
        const ref = db.collection('comunicados').doc(docId);
        await ref.set({ interacciones: { [tutorEmail]: { like: !currentStatus } } }, { merge: true });
    }

    async function marcarLeido(docId) {
        const ref = db.collection('comunicados').doc(docId);
        await ref.set({ interacciones: { [tutorEmail]: { leido: true } } }, { merge: true });
    }

    // --- INFORMES ESCRITOS ---
    function escucharInformes(alumnoID) {
        db.collection('informes').where('alumnoID', '==', alumnoID).onSnapshot(snap => {
            const container = document.getElementById('lista-informes');
            container.innerHTML = "";
            snap.forEach(doc => {
                const info = doc.data();
                container.innerHTML += `
                    <div class="bg-white p-6 rounded-[2rem] border-l-4 border-indigo-500 shadow-sm">
                        <div class="flex justify-between mb-2">
                            <span class="text-[9px] font-black text-indigo-500 uppercase">${info.materia || 'General'}</span>
                            <span class="text-[9px] font-bold text-slate-300">${info.fecha || ''}</span>
                        </div>
                        <p class="text-[11px] text-slate-600 font-medium leading-relaxed">${info.comentario || info.texto}</p>
                    </div>`;
            });
        });
    }

    // --- RESTO DE FUNCIONES (BOLETÍN Y CHAT) ---
    function vincularBoletin(id) {
        db.collection('calificaciones').doc(id).onSnapshot(doc => {
            if(doc.exists) {
                const d = doc.data();
                document.getElementById('b-inasist').innerText = d.inasistencias || 0;
                const asis = Math.max(0, 100 - ((d.inasistencias || 0) * 100 / 180)).toFixed(1);
                document.getElementById('b-asist').innerText = asis + "%";
                const tabla = document.getElementById('tabla-notas');
                tabla.innerHTML = "";
                Object.entries(d.notas || {}).forEach(([m,v]) => {
                    tabla.innerHTML += `<div class="flex justify-between items-center bg-white p-4 rounded-2xl border border-slate-50 shadow-sm">
                        <span class="font-bold text-slate-400 text-[10px] uppercase">${m}</span>
                        <span class="font-black text-slate-800 text-lg">${v}</span>
                    </div>`;
                });
            }
        });
    }

    function cargarContactos() {
        const c = [{n:'Secretaría', i:'fa-building-columns', id:'secretaria'}, {n:'Administración', i:'fa-file-invoice-dollar', id:'admin'}];
        document.getElementById('contactList').innerHTML = c.map(x => `
            <div onclick="abrirChat('${x.id}', '${x.n}')" class="flex-shrink-0 flex flex-col items-center gap-2 cursor-pointer">
                <div class="w-16 h-16 bg-white border border-slate-100 rounded-[1.5rem] flex items-center justify-center text-slate-400 shadow-sm"><i class="fa-solid ${x.i} text-xl"></i></div>
                <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest">${x.n}</span>
            </div>`).join('');
    }

    function abrirChat(canal, nombre) {
        canalChatActivo = canal;
        document.getElementById('chatHeader').innerText = "Conversando con: " + nombre;
        db.collection('mensajes').where('familiaID', '==', tutorEmail).where('canal', '==', canal).orderBy('timestamp', 'asc').onSnapshot(snap => {
            const box = document.getElementById('chatMessages');
            box.innerHTML = "";
            snap.forEach(doc => {
                const m = doc.data();
                const isMe = m.sender === 'familia';
                box.innerHTML += `<div class="flex ${isMe ? 'justify-end' : 'justify-start'}">
                    <div class="${isMe ? 'bg-slate-900 text-white rounded-tr-none' : 'bg-slate-100 text-slate-800 rounded-tl-none'} p-4 rounded-2xl max-w-[85%] font-medium text-xs">
                        ${m.texto}
                    </div>
                </div>`;
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    async function enviarMensaje() {
        const input = document.getElementById('msgInput');
        if(!input.value.trim() || !canalChatActivo) return;
        await db.collection('mensajes').add({
            familiaID: tutorEmail, canal: canalChatActivo, texto: input.value.trim(),
            sender: 'familia', timestamp: firebase.firestore.FieldValue.serverTimestamp()
        });
        input.value = "";
    }

    function switchTab(id) {
        document.querySelectorAll('.view-section').forEach(s => s.classList.add('hidden'));
        document.getElementById('section-' + id).classList.remove('hidden');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('nav-active'));
        document.getElementById('btn-' + id).classList.add('nav-active');
    }
    function cerrarSesion() { localStorage.clear(); location.reload(); }
    setTimeout(() => { document.getElementById('loadingOverlay').classList.add('hidden'); }, 3000);
</script>
</body>
</html>
