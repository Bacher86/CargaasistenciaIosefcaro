<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comunicación Familiar - Mi Escuela</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .post-card { transition: transform 0.2s; }
        .post-card:active { transform: scale(0.98); }
        .login-gradient { background: radial-gradient(circle at top right, #fdf2f8, #ffffff); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <div id="loginScreen" class="fixed inset-0 z-[100] bg-white login-gradient flex flex-col items-center justify-center px-6 transition-opacity duration-500">
        <div class="w-full max-w-sm text-center">
            <div class="w-20 h-20 bg-pink-500 rounded-[2rem] shadow-xl shadow-pink-200 flex items-center justify-center text-white text-3xl mx-auto mb-8 rotate-3">
                <i class="fa-solid fa-graduation-cap"></i>
            </div>
            <h1 class="text-4xl font-black text-slate-800 tracking-tighter mb-3">Hola de nuevo</h1>
            <p class="text-slate-400 text-sm mb-10 font-medium">Ingresá el correo que registraste en la escuela para ver las novedades.</p>
            
            <div class="space-y-4">
                <div class="text-left">
                    <label class="text-[10px] font-black text-slate-400 uppercase ml-4 mb-2 block tracking-widest">Email de Familia</label>
                    <input type="email" id="emailAcceso" placeholder="mama-papa@correo.com" 
                        class="w-full bg-white border border-slate-200 rounded-2xl p-4 text-slate-700 outline-none focus:ring-4 focus:ring-pink-500/10 focus:border-pink-500 transition-all font-medium shadow-sm">
                </div>
                <button onclick="validarAcceso()" id="btnLogin" class="w-full bg-slate-900 text-white font-bold py-4 rounded-2xl shadow-xl shadow-slate-200 hover:bg-slate-800 transition-all active:scale-95 flex items-center justify-center gap-3">
                    Ingresar al Panel <i class="fa-solid fa-arrow-right text-xs text-pink-400"></i>
                </button>
            </div>
            <p class="mt-12 text-[10px] text-slate-300 font-bold uppercase tracking-[0.2em]">Gestión Institucional 2026</p>
        </div>
    </div>

    <div id="mainPanel" class="hidden">
        <header class="bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b border-slate-200">
            <div class="max-w-md mx-auto px-4 h-16 flex items-center justify-between">
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 bg-pink-500 rounded-lg flex items-center justify-center text-white shadow-lg shadow-pink-200">
                        <i class="fa-solid fa-graduation-cap text-xs"></i>
                    </div>
                    <h1 class="font-black text-slate-800 tracking-tight">COMUNIDAD <span class="text-pink-500 text-xs italic">Escuela</span></h1>
                </div>
                <button onclick="cerrarSesion()" class="w-10 h-10 rounded-xl hover:bg-red-50 text-slate-300 hover:text-red-500 transition-all">
                    <i class="fa-solid fa-power-off"></i>
                </button>
            </div>
        </header>

        <main class="max-w-md mx-auto px-4 py-6 pb-24">
            
            <div id="perfilAlumno" class="mb-8 p-6 bg-gradient-to-br from-slate-800 via-slate-900 to-black rounded-[2.5rem] text-white shadow-2xl shadow-slate-300 relative overflow-hidden">
                <div class="relative z-10">
                    <div class="flex justify-between items-start mb-4">
                        <p class="text-[10px] font-black text-pink-400 uppercase tracking-[0.2em]">Credencial Familia</p>
                        <i class="fa-solid fa-wifi text-[10px] text-green-400 animate-pulse"></i>
                    </div>
                    <h2 id="nombreHijo" class="text-2xl font-bold tracking-tight mb-4 leading-none">...</h2>
                    <div class="flex gap-2">
                        <span id="cursoHijo" class="bg-white/10 backdrop-blur-md text-white px-3 py-1.5 rounded-xl text-[10px] font-black border border-white/20 uppercase">...</span>
                        <span class="bg-white/10 text-slate-300 px-3 py-1.5 rounded-xl text-[10px] font-black border border-white/5 uppercase">Periodo 2026</span>
                    </div>
                </div>
                <div class="absolute -right-6 -bottom-6 w-32 h-32 bg-pink-500/20 rounded-full blur-3xl"></div>
            </div>

            <div class="flex items-center justify-between mb-6">
                <h3 class="font-black text-slate-800 text-sm uppercase tracking-tighter">Muro de Noticias</h3>
                <div class="h-[1px] flex-1 bg-slate-200 ml-4"></div>
            </div>

            <div id="feedFamilias" class="space-y-6">
                <div class="animate-pulse space-y-4">
                    <div class="h-48 bg-slate-200 rounded-[2rem]"></div>
                    <div class="h-6 bg-slate-200 rounded-full w-2/3"></div>
                </div>
            </div>
        </main>

        <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-sm bg-white/90 backdrop-blur-xl border border-slate-200 rounded-full shadow-2xl h-16 flex items-center justify-around px-6 z-50">
            <button class="text-pink-500 bg-pink-50 w-10 h-10 rounded-full flex items-center justify-center"><i class="fa-solid fa-house"></i></button>
            <button class="text-slate-400"><i class="fa-solid fa-calendar-check text-lg"></i></button>
            <button class="text-slate-400"><i class="fa-solid fa-file-invoice text-lg"></i></button>
            <button class="text-slate-400"><i class="fa-solid fa-gear text-lg"></i></button>
        </nav>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCLeGKE5NoGUQT0GRdMDIHn4zhxF3ZOp6k",
            authDomain: "app-academica-interna.firebaseapp.com",
            projectId: "app-academica-interna",
            storageBucket: "app-academica-interna.firebasestorage.app",
            messagingSenderId: "169882587504",
            appId: "1:169882587504:web:0fcdf32efdc81ad0a0bfb5"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // 1. GESTIÓN DE ACCESO
        async function validarAcceso() {
            const email = document.getElementById('emailAcceso').value.trim().toLowerCase();
            const btn = document.getElementById('btnLogin');
            
            if(!email) return alert("Por favor, ingresá un correo.");
            
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Verificando...';
            btn.disabled = true;

            try {
                const userDoc = await db.collection('usuarios').doc(email).get();
                
                if (userDoc.exists && userDoc.data().rol === 'familia') {
                    localStorage.setItem('familiaEmail', email);
                    mostrarPanel(userDoc.data());
                } else {
                    alert("Acceso denegado. Este email no figura como familia autorizada.");
                    btn.innerHTML = 'Ingresar al Panel <i class="fa-solid fa-arrow-right text-xs text-pink-400"></i>';
                    btn.disabled = false;
                }
            } catch (e) {
                alert("Error de conexión con la base de datos.");
                btn.disabled = false;
            }
        }

        async function mostrarPanel(userData) {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('mainPanel').classList.remove('hidden');

            const hijoDoc = await db.collection('alumnos').doc(userData.hijoID).get();
            if (hijoDoc.exists) {
                const hijoData = hijoDoc.data();
                document.getElementById('nombreHijo').innerText = hijoData.nombre;
                document.getElementById('cursoHijo').innerText = hijoData.cursoID;
                cargarFeed(hijoData.cursoID);
            }
        }

        // 2. CARGA DE CONTENIDO
        async function cargarFeed(cursoID) {
            const ahora = new Date().toISOString();

            db.collection('comunicados')
                .where('fechaPublicacion', '<=', ahora)
                .orderBy('fechaPublicacion', 'desc')
                .onSnapshot(snap => {
                    const feed = document.getElementById('feedFamilias');
                    let html = "";

                    snap.forEach(doc => {
                        const post = doc.data();
                        if(post.tag === "TODOS" || post.tag === cursoID) {
                            html += `
                                <article class="post-card bg-white rounded-[2rem] border border-slate-200 overflow-hidden shadow-sm">
                                    ${post.img ? `<img src="${post.img}" class="w-full h-64 object-cover">` : ''}
                                    <div class="p-6">
                                        <div class="flex items-center gap-2 mb-3">
                                            <span class="text-[9px] font-black bg-pink-50 text-pink-500 px-2.5 py-1 rounded-lg uppercase tracking-widest">${post.tag}</span>
                                            <span class="text-[10px] text-slate-300 font-bold">${new Date(post.fechaPublicacion).toLocaleDateString('es-AR')}</span>
                                        </div>
                                        <h4 class="text-xl font-bold text-slate-800 leading-tight mb-3">${post.titulo}</h4>
                                        <p class="text-sm text-slate-500 leading-relaxed mb-6">${post.texto}</p>
                                        
                                        ${post.doc ? `
                                            <a href="${post.doc}" target="_blank" class="flex items-center gap-4 p-4 bg-slate-50 rounded-2xl border border-slate-100 hover:bg-pink-50 transition-colors group">
                                                <div class="w-12 h-12 bg-white text-pink-500 rounded-xl flex items-center justify-center shadow-sm group-hover:bg-pink-500 group-hover:text-white transition-all">
                                                    <i class="fa-solid fa-file-pdf text-lg"></i>
                                                </div>
                                                <div class="flex-1">
                                                    <p class="text-xs font-bold text-slate-700 uppercase tracking-tighter">Descargar Adjunto</p>
                                                    <p class="text-[10px] text-slate-400">Documento oficial PDF</p>
                                                </div>
                                            </a>
                                        ` : ''}
                                    </div>
                                    <div class="px-6 py-4 bg-slate-50/50 border-t border-slate-100 flex justify-between items-center">
                                        <button onclick="darLike('${doc.id}')" class="text-slate-400 text-xs font-bold flex items-center gap-2 hover:text-pink-500 transition-colors">
                                            <i class="fa-regular fa-heart"></i> ${post.likes || 0}
                                        </button>
                                        <button class="text-slate-300"><i class="fa-solid fa-share-nodes"></i></button>
                                    </div>
                                </article>
                            `;
                        }
                    });
                    feed.innerHTML = html || '<div class="text-center py-20"><i class="fa-solid fa- Inbox text-3xl text-slate-200 mb-4 block"></i><p class="text-slate-400 text-sm italic">No hay novedades para hoy.</p></div>';
                });
        }

        async function darLike(id) {
            const postRef = db.collection('comunicados').doc(id);
            await postRef.update({ likes: firebase.firestore.FieldValue.increment(1) });
        }

        function cerrarSesion() {
            if(confirm("¿Querés cerrar la sesión de familia?")) {
                localStorage.removeItem('familiaEmail');
                location.reload();
            }
        }

        // AUTO-LOGIN AL CARGAR
        window.onload = async () => {
            const savedEmail = localStorage.getItem('familiaEmail');
            if(savedEmail) {
                const userDoc = await db.collection('usuarios').doc(savedEmail).get();
                if(userDoc.exists) mostrarPanel(userDoc.data());
            }
        }
    </script>
</body>
</html>
