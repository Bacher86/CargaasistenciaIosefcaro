<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comunidad Familia - Mi Escuela</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .nav-active { color: #ec4899; background: #fdf2f8; border-radius: 9999px; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; }
        .chat-container { display: flex; flex-direction: column; gap: 8px; }
        /* Animación suave para cambios de sección */
        .view-section { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <div id="loadingOverlay" class="fixed inset-0 z-[110] bg-white/80 backdrop-blur-sm hidden flex items-center justify-center">
        <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-pink-500"></div>
    </div>

    <div id="loginScreen" class="fixed inset-0 z-[100] bg-white flex flex-col items-center justify-center px-6">
        <div class="w-full max-w-sm text-center">
            <div class="w-20 h-20 bg-pink-500 rounded-[2rem] shadow-xl flex items-center justify-center text-white text-3xl mx-auto mb-8 rotate-3">
                <i class="fa-solid fa-graduation-cap"></i>
            </div>
            <h1 class="text-3xl font-black text-slate-800 mb-2">Acceso Familias</h1>
            <p class="text-slate-400 text-sm mb-8">Ingresá tu correo registrado</p>
            <input type="email" id="emailAcceso" placeholder="tu@email.com" class="w-full border border-slate-200 rounded-2xl p-4 mb-4 outline-none focus:ring-2 focus:ring-pink-500 transition-all">
            <button onclick="validarAcceso()" id="btnLogin" class="w-full bg-slate-900 text-white font-bold py-4 rounded-2xl shadow-lg active:scale-95 transition-transform">Ingresar al Panel</button>
        </div>
    </div>

    <div id="mainPanel" class="hidden">
        <header class="bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b p-4">
            <div class="max-w-md mx-auto flex justify-between items-center">
                <div>
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Tutor Responsable</p>
                    <p class="font-black text-sm text-slate-800" id="nombreTutor">...</p>
                </div>
                <button onclick="cerrarSesion()" class="text-slate-300 hover:text-red-500 transition-colors"><i class="fa-solid fa-power-off"></i></button>
            </div>
        </header>

        <main class="max-w-md mx-auto px-4 py-6 pb-32">
            <div id="selectorHijosContainer" class="mb-6 hidden">
                <div class="bg-pink-50 p-4 rounded-3xl border border-pink-100">
                    <label class="text-[10px] font-black text-pink-500 uppercase tracking-widest mb-2 block">Estás viendo a:</label>
                    <select id="selectorHijos" onchange="seleccionarHijo(this.value)" class="w-full bg-transparent font-bold text-slate-700 outline-none cursor-pointer"></select>
                </div>
            </div>

            <div id="cardHijo" class="mb-8 p-6 bg-slate-900 rounded-[2.5rem] text-white shadow-2xl relative overflow-hidden transition-all">
                <div class="relative z-10">
                    <h2 id="nombreHijoDisplay" class="text-2xl font-bold mb-2">...</h2>
                    <div class="flex gap-2">
                        <span id="cursoHijoDisplay" class="bg-pink-500 px-3 py-1 rounded-xl text-[10px] font-black uppercase tracking-tighter">...</span>
                        <span class="bg-white/10 px-3 py-1 rounded-xl text-[10px] font-black uppercase">Ciclo Lectivo 2026</span>
                    </div>
                </div>
                <div class="absolute -right-10 -bottom-10 w-40 h-40 bg-pink-500/20 rounded-full blur-3xl"></div>
            </div>

            <div id="section-home" class="view-section">
                <h3 class="font-black text-slate-800 text-xs uppercase tracking-widest mb-4">Comunicados Recientes</h3>
                <div id="feedFamilias" class="space-y-4"></div>
            </div>

            <div id="section-calendar" class="view-section hidden">
                <h3 class="font-black text-slate-800 text-xs uppercase tracking-widest mb-4">Próximos Eventos</h3>
                <div id="calendarFeed" class="space-y-3"></div>
            </div>

            <div id="section-boletin" class="view-section hidden">
                <h3 class="font-black text-slate-800 text-xs uppercase tracking-widest mb-4">Informes y Notas</h3>
                <div id="boletinContent" class="bg-white rounded-[2rem] border p-6">
                    <div class="grid grid-cols-2 gap-4 mb-6">
                        <div class="p-4 bg-green-50 rounded-2xl border border-green-100 text-center">
                            <p class="text-[9px] font-bold text-green-600 uppercase">Presente</p>
                            <p id="b-asist" class="text-2xl font-black text-green-700">--</p>
                        </div>
                        <div class="p-4 bg-red-50 rounded-2xl border border-red-100 text-center">
                            <p class="text-[9px] font-bold text-red-600 uppercase">Faltas</p>
                            <p id="b-inasist" class="text-2xl font-black text-red-700">--</p>
                        </div>
                    </div>
                    <div id="tabla-notas" class="space-y-2"></div>
                </div>
            </div>

            <div id="section-chat" class="view-section hidden flex flex-col h-[500px]">
                <div id="chatBox" class="flex-1 bg-white border border-slate-200 rounded-[2.5rem] p-5 overflow-y-auto chat-container mb-4 shadow-inner">
                    </div>
                <div class="flex gap-2 bg-white p-2 rounded-full border shadow-lg px-4">
                    <input type="text" id="msgInput" placeholder="Escribir a la escuela..." class="flex-1 p-2 outline-none text-sm">
                    <button onclick="enviarMensaje()" class="bg-pink-500 text-white w-10 h-10 rounded-full flex items-center justify-center hover:bg-pink-600 transition-colors">
                        <i class="fa-solid fa-paper-plane text-xs"></i>
                    </button>
                </div>
            </div>
        </main>

        <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[92%] max-w-sm bg-white/90 backdrop-blur-xl border border-slate-200 rounded-full shadow-2xl h-16 flex items-center justify-around px-2 z-50">
            <button onclick="switchTab('home')" class="nav-btn text-pink-500 nav-active" id="btn-home"><i class="fa-solid fa-house"></i></button>
            <button onclick="switchTab('calendar')" class="nav-btn text-slate-400" id="btn-calendar"><i class="fa-solid fa-calendar-alt"></i></button>
            <button onclick="switchTab('boletin')" class="nav-btn text-slate-400" id="btn-boletin"><i class="fa-solid fa-paste"></i></button>
            <button onclick="switchTab('chat')" class="nav-btn text-slate-400" id="btn-chat"><i class="fa-solid fa-comment-dots"></i></button>
        </nav>
    </div>

    <script>
        // CONFIGURACIÓN FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyCLeGKE5NoGUQT0GRdMDIHn4zhxF3ZOp6k",
            authDomain: "app-academica-interna.firebaseapp.com",
            projectId: "app-academica-interna",
            storageBucket: "app-academica-interna.firebasestorage.app",
            messagingSenderId: "169882587504",
            appId: "1:169882587504:web:0fcdf32efdc81ad0a0bfb5"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        
        let tutorData = null;
        let hijoActivo = null;
        let unsubChat = null;
        let unsubFeed = null;
        let unsubCal = null;

        // 1. GESTIÓN DE ACCESO
        async function validarAcceso() {
            const email = document.getElementById('emailAcceso').value.trim().toLowerCase();
            if(!email) return alert("Por favor, ingresá tu email.");
            
            try {
                const doc = await db.collection('usuarios').doc(email).get();
                if(doc.exists && doc.data().rol === 'familia') {
                    localStorage.setItem('familiaEmail', email);
                    iniciarApp(doc.data());
                } else {
                    alert("Email no habilitado para el acceso familias.");
                }
            } catch(e) { alert("Error al conectar: " + e.message); }
        }

        async function iniciarApp(data) {
            tutorData = data;
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('mainPanel').classList.remove('hidden');
            document.getElementById('nombreTutor').innerText = data.nombre;

            // Manejo Multi-hijo
            const hijosArray = Array.isArray(data.hijoID) ? data.hijoID : [data.hijoID];
            const select = document.getElementById('selectorHijos');
            select.innerHTML = "";

            if(hijosArray.length > 1) {
                document.getElementById('selectorHijosContainer').classList.remove('hidden');
                for(let id of hijosArray) {
                    const hDoc = await db.collection('alumnos').doc(id).get();
                    if(hDoc.exists) {
                        select.innerHTML += `<option value="${id}">${hDoc.data().nombre}</option>`;
                    }
                }
            }
            seleccionarHijo(hijosArray[0]);
        }

        async function seleccionarHijo(id) {
            document.getElementById('loadingOverlay').classList.remove('hidden');
            const hDoc = await db.collection('alumnos').doc(id).get();
            if(!hDoc.exists) return;
            
            hijoActivo = { id: hDoc.id, ...hDoc.data() };
            document.getElementById('nombreHijoDisplay').innerText = hijoActivo.nombre;
            document.getElementById('cursoHijoDisplay').innerText = hijoActivo.cursoID;
            
            // Recargar datos en tiempo real
            escucharFeed(hijoActivo.cursoID);
            escucharCalendario(hijoActivo.cursoID);
            
            document.getElementById('loadingOverlay').classList.add('hidden');
        }

        // 2. LISTENERS EN TIEMPO REAL
        function escucharFeed(curso) {
            if(unsubFeed) unsubFeed();
            unsubFeed = db.collection('comunicados')
                .orderBy('fechaPublicacion', 'desc')
                .onSnapshot(snap => {
                    let html = "";
                    snap.forEach(doc => {
                        const p = doc.data();
                        if(p.tag === "TODOS" || p.tag === curso) {
                            html += `
                            <div class="bg-white rounded-3xl border border-slate-200 p-5 shadow-sm">
                                <span class="text-[8px] font-black bg-pink-100 text-pink-600 px-2 py-1 rounded-md uppercase">${p.tag}</span>
                                <h4 class="font-bold text-slate-800 my-2">${p.titulo}</h4>
                                <p class="text-xs text-slate-500 leading-relaxed">${p.texto}</p>
                            </div>`;
                        }
                    });
                    document.getElementById('feedFamilias').innerHTML = html || "<p class='text-center text-xs text-slate-400'>No hay comunicados.</p>";
                });
        }

        function escucharCalendario(curso) {
            if(unsubCal) unsubCal();
            // CORRECCIÓN: Si el curso en la DB es "1 A" y el alumno tiene "1 A", funciona. 
            // Si el Admin manda "1° A" (con el circulito), no va a coincidir.
            unsubCal = db.collection('eventos')
                .where('curso', 'in', ['TODOS', curso])
                .orderBy('fecha', 'asc')
                .onSnapshot(snap => {
                    let html = "";
                    snap.forEach(doc => {
                        const e = doc.data();
                        html += `
                        <div class="bg-white p-4 rounded-2xl border-l-4 border-pink-500 shadow-sm flex items-center justify-between">
                            <div>
                                <p class="text-[9px] font-black text-pink-500 uppercase">${e.fecha}</p>
                                <p class="text-sm font-bold text-slate-700">${e.titulo}</p>
                            </div>
                            <div class="w-10 h-10 bg-slate-50 rounded-full flex items-center justify-center text-slate-300">
                                <i class="fa-solid fa-calendar-day"></i>
                            </div>
                        </div>`;
                    });
                    document.getElementById('calendarFeed').innerHTML = html || "<p class='text-center text-xs text-slate-400'>Sin eventos agendados.</p>";
                }, error => {
                    console.error("Error Calendario:", error);
                    document.getElementById('calendarFeed').innerHTML = "<p class='text-[10px] text-red-400 text-center italic'>Falta configurar índice en Firebase.</p>";
                });
        }

        function cargarNotas(alumnoID) {
            db.collection('calificaciones')
                .where('alumnoID', '==', alumnoID)
                .orderBy('actualizadoEn', 'desc')
                .onSnapshot(snap => {
                    const tabla = document.getElementById('tabla-notas');
                    if(snap.empty) {
                        tabla.innerHTML = "<p class='text-center text-xs p-4'>Aún no se cargaron notas para este periodo.</p>";
                        return;
                    }
                    const d = snap.docs[0].data();
                    document.getElementById('b-asist').innerText = d.asistencias || 0;
                    document.getElementById('b-inasist').innerText = d.inasistencias || 0;
                    
                    let html = "";
                    for(let mat in d.notas) {
                        const n = d.notas[mat];
                        html += `
                        <div class="flex justify-between items-center p-3 bg-slate-50 rounded-2xl border border-slate-100">
                            <span class="text-xs font-bold text-slate-600 capitalize">${mat}</span>
                            <span class="font-black ${n >= 6 ? 'text-blue-600' : 'text-red-500'}">${n}</span>
                        </div>`;
                    }
                    tabla.innerHTML = html;
                });
        }

        // 3. CHAT WHATSAPP STYLE
        function escucharChat() {
            if(unsubChat) unsubChat();
            const email = localStorage.getItem('familiaEmail');
            unsubChat = db.collection('mensajes')
                .where('participantes', 'array-contains', email)
                .orderBy('fecha', 'asc')
                .onSnapshot(snap => {
                    const box = document.getElementById('chatBox');
                    box.innerHTML = "";
                    snap.forEach(doc => {
                        const m = doc.data();
                        const soyYo = m.emisorID === email;
                        const div = document.createElement('div');
                        div.className = `max-w-[85%] p-3 rounded-2xl text-xs shadow-sm mb-1 ${
                            soyYo 
                            ? 'bg-pink-500 text-white self-end rounded-tr-none' 
                            : 'bg-slate-100 text-slate-700 self-start rounded-tl-none'
                        }`;
                        div.innerText = m.texto;
                        box.appendChild(div);
                    });
                    box.scrollTop = box.scrollHeight;
                });
        }

        async function enviarMensaje() {
            const input = document.getElementById('msgInput');
            const email = localStorage.getItem('familiaEmail');
            if(!input.value.trim()) return;

            try {
                await db.collection('mensajes').add({
                    emisorID: email,
                    receptorID: "secretaria_primaria",
                    participantes: [email, "secretaria_primaria"],
                    texto: input.value.trim(),
                    fecha: new Date().toISOString()
                });
                input.value = "";
                input.focus();
            } catch(e) { alert("Error al enviar"); }
        }

        // 4. NAVEGACIÓN Y CIERRE
        function switchTab(id) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.add('hidden'));
            document.getElementById('section-' + id).classList.remove('hidden');
            document.querySelectorAll('.nav-btn').forEach(b => {
                b.classList.remove('nav-active', 'text-pink-500');
                b.classList.add('text-slate-400');
            });
            document.getElementById('btn-' + id).classList.add('nav-active', 'text-pink-500');
            
            if(id === 'chat') escucharChat();
            if(id === 'boletin') cargarNotas(hijoActivo.id);
        }

        function cerrarSesion() {
            localStorage.clear();
            location.reload();
        }

        window.onload = async () => {
            const savedEmail = localStorage.getItem('familiaEmail');
            if(savedEmail) {
                const doc = await db.collection('usuarios').doc(savedEmail).get();
                if(doc.exists) iniciarApp(doc.data());
            }
        };
    </script>
</body>
</html>
