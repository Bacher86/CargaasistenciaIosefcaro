<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comunidad Familia v2.0 - Iosef Caro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        .nav-active { color: #db2777 !important; transform: scale(1.1); }
        .nav-active i { background: #fdf2f8; padding: 10px; border-radius: 15px; shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .card-news { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .card-news:active { transform: scale(0.97); }
        .ios-scroll::-webkit-scrollbar { display: none; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .modal-open { animation: slideUp 0.4s ease-out; }
    </style>
</head>
<body class="bg-[#F8FAFC] min-h-screen text-slate-900">

    <div id="loadingOverlay" class="fixed inset-0 z-[120] bg-white flex flex-col items-center justify-center">
        <div class="relative w-20 h-20">
            <div class="absolute inset-0 border-4 border-pink-100 rounded-full"></div>
            <div class="absolute inset-0 border-4 border-pink-500 rounded-full border-t-transparent animate-spin"></div>
        </div>
        <p class="mt-4 font-bold text-pink-500 animate-pulse uppercase text-[10px] tracking-widest">Sincronizando...</p>
    </div>

    <div id="loginScreen" class="fixed inset-0 z-[110] bg-white flex flex-col items-center justify-center px-8">
        <div class="w-full max-w-sm text-center">
            <div class="w-24 h-24 bg-gradient-to-tr from-pink-500 to-rose-400 rounded-[2.5rem] shadow-2xl flex items-center justify-center text-white text-4xl mb-10 rotate-6 mx-auto">
                <i class="fa-solid fa-shield-heart"></i>
            </div>
            <h1 class="text-4xl font-black text-slate-900 mb-2 tracking-tight">Hola de nuevo.</h1>
            <p class="text-slate-400 font-medium mb-10 text-sm">Ingresá para ver el progreso de tus hijos.</p>
            <div class="space-y-4 text-left">
                <div class="relative">
                    <i class="fa-solid fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-slate-300"></i>
                    <input type="email" id="emailAcceso" placeholder="correo@ejemplo.com" class="w-full bg-slate-50 border-2 border-slate-100 rounded-3xl p-5 pl-12 outline-none focus:border-pink-500 transition-all font-semibold">
                </div>
                <button onclick="validarAcceso()" class="w-full bg-slate-900 text-white font-black py-5 rounded-3xl shadow-xl hover:bg-pink-600 active:scale-95 transition-all">ACCEDER AHORA</button>
            </div>
        </div>
    </div>

    <div id="mainPanel" class="hidden">
        <header class="glass sticky top-0 z-50 px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-2xl bg-pink-100 flex items-center justify-center text-pink-600">
                    <i class="fa-solid fa-user-tie"></i>
                </div>
                <div>
                    <p id="nombreTutor" class="font-black text-slate-800 text-sm tracking-tight">...</p>
                    <p class="text-[9px] font-bold text-slate-400 uppercase">Panel Familia</p>
                </div>
            </div>
            <button onclick="cerrarSesion()" class="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center text-slate-400"><i class="fa-solid fa-arrow-right-from-bracket"></i></button>
        </header>

        <main class="max-w-md mx-auto px-6 py-6 pb-40">
            <div id="selectorHijosContainer" class="mb-8 hidden">
                <div class="bg-white p-2 rounded-[2rem] shadow-sm border border-slate-100 flex items-center">
                    <div class="bg-indigo-500 text-white px-4 py-2 rounded-2xl font-black text-[10px] uppercase">Hijo</div>
                    <select id="selectorHijos" onchange="cargarDatosHijo(this.value)" class="flex-1 bg-transparent px-4 font-bold text-slate-700 outline-none appearance-none"></select>
                </div>
            </div>

            <div id="section-home" class="view-section">
                <div class="flex justify-between items-end mb-6">
                    <h3 class="font-black text-2xl text-slate-800 tracking-tighter">Noticias</h3>
                    <div class="flex bg-slate-200/50 p-1 rounded-xl text-[10px] font-bold">
                        <button onclick="filtrarNoticias('todas')" id="filter-todas" class="px-3 py-1 bg-white rounded-lg shadow-sm">TODAS</button>
                        <button onclick="filtrarNoticias('nuevas')" id="filter-nuevas" class="px-3 py-1 rounded-lg text-slate-500">NUEVAS</button>
                    </div>
                </div>
                <div id="feedFamilias" class="space-y-6"></div>
            </div>

            <div id="section-boletin" class="view-section hidden">
                <h3 class="font-black text-2xl text-slate-800 tracking-tighter mb-6">Rendimiento</h3>
                <div class="grid grid-cols-2 gap-4 mb-8">
                    <div class="bg-indigo-600 p-5 rounded-[2.5rem] text-white shadow-lg shadow-indigo-100">
                        <p class="text-[10px] font-bold opacity-70 uppercase tracking-widest">Asistencia</p>
                        <p id="b-asist" class="text-3xl font-black">0%</p>
                    </div>
                    <div class="bg-white p-5 rounded-[2.5rem] border border-slate-100">
                        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Faltas</p>
                        <p id="b-inasist" class="text-3xl font-black text-slate-800">0</p>
                    </div>
                </div>
                <div id="tabla-notas" class="space-y-3"></div>
            </div>

            <div id="section-chat" class="view-section hidden">
                <h3 class="font-black text-2xl text-slate-800 tracking-tighter mb-6">Mensajes</h3>
                <div id="contactList" class="flex gap-4 overflow-x-auto ios-scroll mb-8 pb-2"></div>
                <div id="chatBox" class="bg-white border border-slate-100 rounded-[2.5rem] h-80 p-6 overflow-y-auto mb-4 flex flex-col gap-4 shadow-inner">
                    <div class="text-center text-slate-300 text-[10px] py-10 font-bold uppercase tracking-widest">Seleccioná un contacto</div>
                </div>
            </div>
        </main>

        <nav class="fixed bottom-8 left-1/2 -translate-x-1/2 w-[90%] max-w-sm glass rounded-[2.5rem] shadow-2xl h-20 flex items-center justify-around px-4 z-50 border-t border-white/50">
            <button onclick="switchTab('home')" class="nav-btn nav-active text-slate-400" id="btn-home"><i class="fa-solid fa-house text-xl"></i></button>
            <button onclick="switchTab('boletin')" class="nav-btn text-slate-400" id="btn-boletin"><i class="fa-solid fa-chart-line text-xl"></i></button>
            <button onclick="switchTab('chat')" class="nav-btn text-slate-400" id="btn-chat"><i class="fa-solid fa-comment-dots text-xl"></i></button>
        </nav>

        <div id="btn-iosi" onclick="toggleIosi()" class="fixed bottom-32 right-8 w-14 h-14 bg-slate-900 text-white rounded-2xl shadow-2xl flex items-center justify-center z-[100] active:scale-90 transition-all border-4 border-white rotate-3">
            <i class="fa-solid fa-bolt-lightning text-yellow-400"></i>
        </div>

        <div id="window-iosi" class="fixed inset-0 z-[200] bg-slate-900/40 backdrop-blur-md hidden flex items-end justify-center p-4">
            <div class="bg-white w-full max-w-sm rounded-[3rem] shadow-2xl overflow-hidden modal-open">
                <div class="bg-gradient-to-r from-slate-900 to-indigo-900 p-6 text-white flex justify-between items-center">
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 bg-yellow-400 rounded-xl flex items-center justify-center text-slate-900 shadow-lg"><i class="fa-solid fa-bolt"></i></div>
                        <div><p class="font-black text-sm uppercase tracking-tight">Iosi AI v4.0</p></div>
                    </div>
                    <button onclick="toggleIosi()" class="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center"><i class="fa-solid fa-xmark"></i></button>
                </div>
                <div id="iosiContent" class="h-80 overflow-y-auto p-6 space-y-4 bg-slate-50 ios-scroll">
                    <div class="flex justify-start"><div class="bg-white border border-slate-200 p-4 rounded-2xl rounded-tl-none text-xs font-medium text-slate-600 shadow-sm">Hola. Soy Iosi. Preguntame por "notas" o "faltas".</div></div>
                </div>
                <div class="p-4 bg-white border-t flex gap-2">
                    <input type="text" id="preguntaIosi" placeholder="Preguntame algo..." class="flex-1 bg-slate-100 rounded-2xl px-5 py-3 text-sm outline-none font-medium">
                    <button onclick="analisisRapidoIosi()" class="bg-indigo-600 text-white px-5 rounded-2xl active:scale-95 transition-all"><i class="fa-solid fa-paper-plane"></i></button>
                </div>
            </div>
        </div>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCLeGKE5NoGUQT0GRdMDIHn4zhxF3ZOp6k",
        authDomain: "app-academica-interna.firebaseapp.com",
        projectId: "app-academica-interna",
        storageBucket: "app-academica-interna.firebasestorage.app",
        messagingSenderId: "169882587504",
        appId: "1:169882587504:web:0fcdf32efdc81ad0a0bfb5"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let hijoActivo = null;
    let noticiasGlobal = [];

    // --- ACCESO Y CONFIGURACIÓN ---
    async function validarAcceso() {
        const email = document.getElementById('emailAcceso').value.trim().toLowerCase();
        if(!email) return;
        document.getElementById('loadingOverlay').classList.remove('hidden');
        
        const doc = await db.collection('usuarios').doc(email).get();
        if(doc.exists && doc.data().rol === 'familia') {
            localStorage.setItem('familiaEmail', email);
            iniciarApp(doc.data());
        } else {
            alert("Acceso inválido");
            document.getElementById('loadingOverlay').classList.add('hidden');
        }
    }

    async function iniciarApp(data) {
        document.getElementById('loginScreen').classList.add('hidden');
        document.getElementById('mainPanel').classList.remove('hidden');
        document.getElementById('nombreTutor').innerText = data.nombre;

        const hijos = Array.isArray(data.hijoID) ? data.hijoID : [data.hijoID];
        if(hijos.length > 1) {
            document.getElementById('selectorHijosContainer').classList.remove('hidden');
            const select = document.getElementById('selectorHijos');
            select.innerHTML = "";
            for(let id of hijos) {
                const h = await db.collection('alumnos').doc(id).get();
                select.innerHTML += `<option value="${id}">${h.data().nombre}</option>`;
            }
        }
        cargarDatosHijo(hijos[0]);
        cargarContactos();
        document.getElementById('loadingOverlay').classList.add('hidden');
    }

    async function cargarDatosHijo(id) {
        const doc = await db.collection('alumnos').doc(id).get();
        hijoActivo = { id: doc.id, ...doc.data() };
        escucharFeed(hijoActivo.cursoID);
        vincularBoletin(hijoActivo.id);
    }

    // --- RENDIMIENTO (BOLETÍN) ---
    function vincularBoletin(id) {
        db.collection('calificaciones').doc(id).onSnapshot(doc => {
            if(doc.exists) {
                const d = doc.data();
                document.getElementById('b-inasist').innerText = d.inasistencias || 0;
                const asistenciaPerc = Math.max(0, 100 - ((d.inasistencias || 0) * 100 / 180)).toFixed(1);
                document.getElementById('b-asist').innerText = asistenciaPerc + "%";
                
                const tabla = document.getElementById('tabla-notas');
                tabla.innerHTML = "";
                const notas = d.notas || {};
                Object.keys(notas).forEach(m => {
                    tabla.innerHTML += `
                        <div class="flex justify-between items-center bg-white p-4 rounded-2xl border border-slate-100 shadow-sm">
                            <span class="font-bold text-slate-600 text-xs uppercase">${m}</span>
                            <span class="font-black text-indigo-600 text-lg">${notas[m]}</span>
                        </div>`;
                });
            }
        });
    }

    // --- CEREBRO INTELIGENTE DE IOSI PRO (Actualizado) ---
    async function obtenerRespuestaIosi(mensaje) {
        const p = mensaje.toLowerCase();
        if (!hijoActivo) return "No tengo datos del alumno cargados.";

        const docRef = await db.collection('calificaciones').doc(hijoActivo.id).get();
        const data = docRef.exists ? docRef.data() : {};
        const notas = data.notas || {};

        // 1. Lógica de NOTAS (Busca materia específica)
        if (p.includes("nota") || p.includes("sacó") || p.includes("calificación") || p.includes("cuánto tiene")) {
            const materias = Object.keys(notas);
            let materiaFound = materias.find(m => p.includes(m.toLowerCase()));
            
            if (materiaFound) {
                return `${hijoActivo.nombre} tiene un **${notas[materiaFound]}** en ${materiaFound}.`;
            }
            
            let resumen = `Estas son las notas de ${hijoActivo.nombre}:<br>`;
            Object.entries(notas).forEach(([m, v]) => resumen += `• ${m}: **${v}**<br>`);
            return resumen;
        }

        // 2. Lógica de ASISTENCIAS (Busca fechas exactas en Firebase)
        if (p.includes("falta") || p.includes("inasistencia") || p.includes("tarde") || p.includes("faltó")) {
            if (p.includes("cuándo") || p.includes("qué día") || p.includes("fecha")) {
                const snap = await db.collection('asistencias')
                    .where('alumnoID', '==', hijoActivo.id)
                    .where('estado', 'in', ['A', 'T'])
                    .orderBy('fecha', 'desc')
                    .limit(5)
                    .get();

                if (snap.empty) return `${hijoActivo.nombre} no tiene faltas registradas.`;
                
                let list = "Últimos registros detallados:<br>";
                snap.forEach(d => {
                    const info = d.data();
                    const tipo = info.estado === 'A' ? 'Ausente' : 'Tarde';
                    list += `• **${info.fecha}**: ${tipo}<br>`;
                });
                return list;
            }
            return `${hijoActivo.nombre} tiene un total de **${data.inasistencias || 0}** inasistencias en el boletín.`;
        }

        // 3. Lógica de NOTICIAS / FEED
        if (p.includes("novedad") || p.includes("noticia") || p.includes("pasó") || p.includes("comunicado")) {
            if (noticiasGlobal.length === 0) return "No hay noticias recientes en el panel.";
            
            let ultimas = "Esto es lo último que se publicó:<br>";
            // Tomamos las últimas 2 noticias
            noticiasGlobal.slice(0, 2).forEach(n => {
                ultimas += `• **${n.titulo}**: ${n.texto.substring(0, 60)}...<br>`;
            });
            return ultimas;
        }

        return "Soy Iosi. Podés preguntarme:<br>• <i>'¿Qué nota sacó en Matemática?'</i><br>• <i>'¿Qué días faltó esta semana?'</i><br>• <i>'¿Qué noticias hay hoy?'</i>";
    }

    async function analisisRapidoIosi() {
        const input = document.getElementById('preguntaIosi');
        const box = document.getElementById('iosiContent');
        const txt = input.value.trim();
        if(!txt) return;

        box.innerHTML += `<div class="flex justify-end"><div class="bg-indigo-600 text-white p-3 rounded-xl rounded-tr-none text-xs shadow-md">${txt}</div></div>`;
        input.value = "";
        box.scrollTop = box.scrollHeight;

        const respuesta = await obtenerRespuestaIosi(txt);
        setTimeout(() => {
            box.innerHTML += `<div class="flex justify-start"><div class="bg-white border p-3 rounded-xl rounded-tl-none text-xs text-slate-600 shadow-sm">${respuesta}</div></div>`;
            box.scrollTop = box.scrollHeight;
        }, 600);
    }

    // --- NAVEGACIÓN Y OTROS ---
    function switchTab(id) {
        document.querySelectorAll('.view-section').forEach(s => s.classList.add('hidden'));
        document.getElementById('section-' + id).classList.remove('hidden');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('nav-active'));
        document.getElementById('btn-' + id).classList.add('nav-active');
    }

    function toggleIosi() { document.getElementById('window-iosi').classList.toggle('hidden'); }

    function escucharFeed(curso) {
        db.collection('comunicados').onSnapshot(snap => {
            noticiasGlobal = [];
            snap.forEach(doc => {
                const p = doc.data();
                if(p.tag === "TODOS" || p.tag === curso) noticiasGlobal.push({id: doc.id, ...p});
            });
            renderizarNoticias('todas');
        });
    }

    function renderizarNoticias(filtro) {
        const container = document.getElementById('feedFamilias');
        container.innerHTML = noticiasGlobal.map(n => `
            <div class="card-news bg-white p-6 rounded-[2.5rem] border border-slate-100 shadow-sm mb-4">
                <span class="text-[9px] font-black bg-slate-100 text-slate-500 px-3 py-1 rounded-lg uppercase mb-2 inline-block">${n.tag}</span>
                <h4 class="font-black text-slate-800 text-lg leading-tight mb-2">${n.titulo}</h4>
                <p class="text-xs text-slate-400">${n.texto}</p>
            </div>`).join('');
    }

    function cargarContactos() {
        const list = document.getElementById('contactList');
        const c = [{n: 'Secretaría', i: 'fa-building'}, {n: 'Administración', i: 'fa-file-invoice'}, {n: 'Directivo', i: 'fa-user-tie'}];
        list.innerHTML = c.map(x => `<div class="flex-shrink-0 flex flex-col items-center gap-2"><div class="w-14 h-14 bg-white border border-slate-100 rounded-2xl flex items-center justify-center text-slate-400 shadow-sm"><i class="fa-solid ${x.i}"></i></div><span class="text-[9px] font-bold text-slate-400 uppercase">${x.n}</span></div>`).join('');
    }

    function cerrarSesion() { localStorage.clear(); location.reload(); }
</script>
</body>
</html>
