<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comunidad Familia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; scroll-behavior: smooth; }
        .nav-active { color: #db2777 !important; transform: scale(1.1); }
        .nav-active i { background: #fdf2f8; padding: 12px; border-radius: 20px; box-shadow: 0 10px 15px -3px rgba(219, 39, 119, 0.2); }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .view-section { transition: all 0.3s ease; }
        #login-screen { position: fixed; inset: 0; background: white; z-index: 5000; display: flex; flex-direction: column; justify-content: center; padding: 2rem; }
    </style>
</head>
<body class="bg-slate-50 pb-28">

    <div id="login-screen" class="hidden">
        <div class="max-w-md mx-auto w-full">
            <div class="w-16 h-16 bg-pink-50 text-pink-500 rounded-3xl flex items-center justify-center text-2xl mb-6 shadow-sm"><i class="fas fa-heart"></i></div>
            <h1 class="font-black text-3xl text-slate-800 tracking-tighter mb-2">Hola, familia</h1>
            <p class="text-slate-400 font-bold text-sm mb-8 uppercase tracking-widest">Ingresá para continuar</p>
            <input type="email" id="loginEmail" placeholder="Tu correo registrado" class="w-full p-5 bg-slate-100 rounded-3xl border-none font-bold mb-4 outline-none">
            <button onclick="login()" class="w-full bg-slate-900 text-white p-5 rounded-3xl font-black text-xs uppercase tracking-widest shadow-xl">Entrar al Panel</button>
            <p id="loginError" class="text-rose-500 text-[10px] font-black mt-4 hidden uppercase tracking-widest text-center">Usuario no encontrado</p>
        </div>
    </div>

    <header class="p-8 pb-0">
        <div class="flex justify-between items-start mb-6">
            <div>
                <h1 id="userName" class="font-black text-3xl text-slate-800 tracking-tighter">Hola, ...</h1>
                <p class="text-[11px] font-bold text-slate-400 uppercase tracking-[0.2em] mt-1">Comunidad Iosef Caro</p>
            </div>
            <button onclick="cerrarSesion()" class="w-12 h-12 bg-white rounded-2xl shadow-sm border border-slate-100 text-slate-300 flex items-center justify-center"><i class="fas fa-power-off"></i></button>
        </div>

        <div id="wrapperSelector" class="hidden mb-6 animate-pulse">
            <label class="text-[9px] font-black text-slate-400 uppercase ml-2 mb-1 block">Viendo a:</label>
            <select id="selectHijo" onchange="cambiarHijo(this.value)" class="w-full p-4 bg-white border border-slate-100 rounded-2xl font-bold text-sm shadow-sm outline-none"></select>
        </div>
    </header>

    <main class="px-6 max-w-md mx-auto">
        <section id="section-muro" class="view-section space-y-4">
            <div id="muroContainer" class="space-y-4"></div>
        </section>

        <section id="section-academico" class="view-section hidden space-y-4">
            <div class="bg-slate-900 p-8 rounded-[2.5rem] text-white shadow-xl shadow-indigo-100 flex justify-between items-center">
                <div>
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Inasistencias</p>
                    <h3 id="countFaltas" class="text-5xl font-black mt-1">0</h3>
                </div>
                <div class="w-14 h-14 bg-white/10 rounded-2xl flex items-center justify-center text-2xl"><i class="fas fa-calendar-check"></i></div>
            </div>
            <div id="notasContainer" class="bg-white p-6 rounded-[2.5rem] border border-slate-100 shadow-sm space-y-3"></div>
        </section>

        <section id="section-agenda" class="view-section hidden space-y-3"></section>
    </main>

    <div id="window-iosi" class="hidden fixed inset-x-6 bottom-32 bg-white rounded-[2.5rem] shadow-2xl border border-slate-100 z-[4000] flex flex-col overflow-hidden animate-bounce-subtle">
        <div class="p-6 bg-indigo-600 text-white flex justify-between items-center">
            <div class="flex items-center gap-3"><i class="fas fa-robot text-xl"></i><span class="font-black text-sm">IOSI IA</span></div>
            <button onclick="toggleIosi()"><i class="fas fa-times"></i></button>
        </div>
        <div class="h-64 p-6 overflow-y-auto bg-slate-50 text-[11px] font-bold text-slate-500" id="chat-iosi">¡Hola! Soy Iosi. ¿En qué puedo ayudarte hoy?</div>
    </div>
    <button onclick="toggleIosi()" class="fixed bottom-32 right-6 w-16 h-16 bg-indigo-600 text-white rounded-[2rem] shadow-xl z-[3000] active:scale-90 transition-all"><i class="fas fa-robot text-2xl"></i></button>

    <nav class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-xl border-t border-slate-100 flex justify-around items-center h-28 px-8 z-[2000]">
        <button onclick="switchTab('muro')" id="btn-muro" class="nav-btn nav-active flex flex-col items-center"><i class="fas fa-home text-xl"></i><span class="text-[9px] font-black mt-2 uppercase tracking-tighter">Inicio</span></button>
        <button onclick="switchTab('academico')" id="btn-academico" class="nav-btn text-slate-300 flex flex-col items-center"><i class="fas fa-chart-line text-xl"></i><span class="text-[9px] font-black mt-2 uppercase tracking-tighter">Notas</span></button>
        <button onclick="switchTab('agenda')" id="btn-agenda" class="nav-btn text-slate-300 flex flex-col items-center"><i class="fas fa-calendar text-xl"></i><span class="text-[9px] font-black mt-2 uppercase tracking-tighter">Agenda</span></button>
    </nav>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCLeGKE5NoGUQT0GRdMDIHn4zhxF3ZOp6k",
            authDomain: "app-academica-interna.firebaseapp.com",
            projectId: "app-academica-interna",
            storageBucket: "app-academica-interna.firebasestorage.app",
            messagingSenderId: "169882587504",
            appId: "1:169882587504:web:0fcdf32efdc81ad0a0bfb5"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let currentEmail = localStorage.getItem('parentEmail');

        window.onload = () => {
            if (!currentEmail) {
                document.getElementById('login-screen').classList.remove('hidden');
            } else {
                iniciarApp();
            }
        };

        async function login() {
            const email = document.getElementById('loginEmail').value.toLowerCase().trim();
            const userDoc = await db.collection('usuarios').doc(email).get();
            if (userDoc.exists && userDoc.data().rol === 'familia') {
                localStorage.setItem('parentEmail', email);
                location.reload();
            } else {
                document.getElementById('loginError').classList.remove('hidden');
            }
        }

        async function iniciarApp() {
            const userDoc = await db.collection('usuarios').doc(currentEmail).get();
            const userData = userDoc.data();
            document.getElementById('userName').innerText = "Hola, " + userData.nombre;
            
            if(userData.hijoID?.length > 0) {
                if(userData.hijoID.length > 1) {
                    document.getElementById('wrapperSelector').classList.remove('hidden');
                    const select = document.getElementById('selectHijo');
                    for(let id of userData.hijoID) {
                        const hDoc = await db.collection('alumnos').doc(id).get();
                        select.innerHTML += `<option value="${id}">${hDoc.data().nombre}</option>`;
                    }
                }
                cambiarHijo(userData.hijoID[0]);
            }
        }

        async function cambiarHijo(idHijo) {
            const hDoc = await db.collection('alumnos').doc(idHijo).get();
            const data = hDoc.data();
            cargarMuro(data.curso);
            cargarAcademico(idHijo);
            cargarAgenda();
        }

        function cargarMuro(curso) {
            db.collection('comunicados').orderBy('creadoEn', 'desc').onSnapshot(snap => {
                document.getElementById('muroContainer').innerHTML = snap.docs.map(doc => {
                    const d = doc.data();
                    if(d.tag === "TODOS" || d.tag === curso) {
                        return `<div class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-100">
                            <h4 class="font-black text-slate-800 text-lg mb-2">${d.titulo}</h4>
                            <p class="text-xs text-slate-500 font-medium">${d.texto}</p>
                        </div>`;
                    }
                }).join('');
            });
        }

        function cargarAcademico(id) {
            db.collection('calificaciones').doc(id).onSnapshot(doc => {
                if(!doc.exists) return;
                const d = doc.data();
                document.getElementById('countFaltas').innerText = d.fechasFaltas?.length || 0;
                let html = "";
                for (const [materia, trims] of Object.entries(d.notas || {})) {
                    html += `<div class="flex justify-between items-center p-4 bg-slate-50 rounded-2xl">
                        <span class="text-xs font-bold text-slate-700">${materia}</span>
                        <div class="flex gap-2">
                            <span class="w-8 h-8 flex items-center justify-center bg-white rounded-lg text-[10px] font-black">${trims['1Trim'] || '-'}</span>
                            <span class="w-8 h-8 flex items-center justify-center bg-white rounded-lg text-[10px] font-black">${trims['2Trim'] || '-'}</span>
                            <span class="w-8 h-8 flex items-center justify-center bg-indigo-600 text-white rounded-lg text-[10px] font-black">${trims['3Trim'] || '-'}</span>
                        </div>
                    </div>`;
                }
                document.getElementById('notasContainer').innerHTML = html;
            });
        }

        function cargarAgenda() {
            db.collection('eventos').orderBy('fecha', 'asc').onSnapshot(snap => {
                document.getElementById('section-agenda').innerHTML = snap.docs.map(doc => `
                    <div class="flex items-center gap-5 bg-white p-5 rounded-[2.5rem] border shadow-sm">
                        <div class="bg-slate-900 text-white p-3 rounded-2xl text-center min-w-[60px]">
                            <span class="block text-sm font-black">${doc.data().fecha.split('-')[2]}</span>
                            <span class="block text-[8px] uppercase font-bold opacity-50">${doc.data().fecha.split('-')[1]}</span>
                        </div>
                        <p class="font-bold text-slate-700 text-sm">${doc.data().titulo}</p>
                    </div>`).join('');
            });
        }

        function switchTab(id) {
            document.querySelectorAll('.view-section').forEach(v => v.classList.add('hidden'));
            document.getElementById('section-' + id).classList.remove('hidden');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('nav-active'));
            document.getElementById('btn-' + id).classList.add('nav-active');
        }

        function toggleIosi() { document.getElementById('window-iosi').classList.toggle('hidden'); }
        function cerrarSesion() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
