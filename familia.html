<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comunidad Familia v3.5 - Informes Directos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        .nav-active { color: #db2777 !important; transform: scale(1.1); }
        .nav-active i { background: #fdf2f8; padding: 12px; border-radius: 20px; box-shadow: 0 10px 15px -3px rgba(219, 39, 119, 0.2); }
        .glass { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(14px); border-bottom: 1px solid rgba(255, 255, 255, 0.3); }
        .report-card { background: white; border-radius: 2rem; border: 1px solid #f1f5f9; padding: 1.5rem; position: relative; overflow: hidden; }
        .report-card::before { content: ''; position: absolute; top: 0; left: 0; width: 6px; height: 100%; background: #6366f1; }
        .ios-scroll::-webkit-scrollbar { display: none; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade { animation: fadeIn 0.4s ease-out forwards; }
    </style>
</head>
<body class="bg-[#F8FAFC] min-h-screen text-slate-900">

    <div id="loadingOverlay" class="fixed inset-0 z-[150] bg-white flex flex-col items-center justify-center">
        <div class="w-12 h-12 border-4 border-pink-500 border-t-transparent rounded-full animate-spin"></div>
        <p class="mt-4 font-black text-pink-500 text-[10px] uppercase tracking-[0.2em]">Sincronizando Sistema</p>
    </div>

    <div id="loginScreen" class="fixed inset-0 z-[110] bg-white flex flex-col items-center justify-center px-10 text-center">
        <div class="w-20 h-20 bg-slate-900 rounded-[2.2rem] shadow-2xl flex items-center justify-center text-white text-3xl mb-8 rotate-3">
            <i class="fa-solid fa-house-chimney-user"></i>
        </div>
        <h1 class="text-3xl font-black tracking-tight mb-2">Comunidad Familia</h1>
        <p class="text-slate-400 text-sm mb-10 font-medium">Acceso institucional seguro</p>
        <div class="w-full max-w-xs space-y-4">
            <input type="email" id="emailAcceso" placeholder="Tu correo electrónico" class="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl p-5 outline-none focus:border-pink-500 font-semibold transition-all">
            <button onclick="validarAcceso()" class="w-full bg-slate-900 text-white font-black py-5 rounded-2xl shadow-xl active:scale-95 transition-all">INGRESAR</button>
        </div>
    </div>

    <div id="mainPanel" class="hidden">
        <header class="glass sticky top-0 z-50 px-6 py-5 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-2xl bg-gradient-to-tr from-pink-500 to-rose-400 flex items-center justify-center text-white shadow-lg"><i class="fa-solid fa-user"></i></div>
                <div>
                    <p id="nombreTutor" class="font-black text-slate-800 text-sm leading-none">...</p>
                    <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest mt-1">Familia</p>
                </div>
            </div>
            <button onclick="cerrarSesion()" class="w-10 h-10 rounded-xl bg-slate-50 text-slate-400 flex items-center justify-center"><i class="fa-solid fa-arrow-right-from-bracket"></i></button>
        </header>

        <main class="max-w-md mx-auto px-6 pt-6 pb-40">
            <div id="selectorHijosContainer" class="mb-8 hidden animate-fade">
                <div class="bg-white p-2 rounded-2xl shadow-sm border border-slate-100 flex items-center">
                    <div class="bg-slate-900 text-white px-3 py-2 rounded-xl font-black text-[9px] uppercase">Alumno</div>
                    <select id="selectorHijos" onchange="cargarDatosHijo(this.value)" class="flex-1 bg-transparent px-3 font-bold text-slate-700 outline-none"></select>
                </div>
            </div>

            <div id="section-home" class="view-section animate-fade">
                <h3 class="font-black text-2xl mb-6">Novedades</h3>
                <div id="feedFamilias" class="space-y-4"></div>
            </div>

            <div id="section-calendar" class="view-section hidden animate-fade">
                <h3 class="font-black text-2xl mb-6">Calendario</h3>
                <div id="calendarFeed" class="space-y-3"></div>
            </div>

            <div id="section-boletin" class="view-section hidden animate-fade">
                <h3 class="font-black text-2xl mb-6">Rendimiento</h3>
                <div class="grid grid-cols-2 gap-4 mb-8">
                    <div class="bg-indigo-600 p-6 rounded-[2.5rem] text-white shadow-lg shadow-indigo-100">
                        <p class="text-[9px] font-bold opacity-60 uppercase">Asistencia</p>
                        <p id="b-asist" class="text-3xl font-black">0%</p>
                    </div>
                    <div class="bg-white p-6 rounded-[2.5rem] border border-slate-100">
                        <p class="text-[9px] font-bold text-slate-400 uppercase">Faltas</p>
                        <p id="b-inasist" class="text-3xl font-black">0</p>
                    </div>
                </div>

                <h4 class="font-black text-[10px] text-slate-400 uppercase tracking-[0.2em] mb-4">Calificaciones</h4>
                <div id="tabla-notas" class="space-y-2 mb-10"></div>

                <h4 class="font-black text-[10px] text-slate-400 uppercase tracking-[0.2em] mb-4">Informes del Docente</h4>
                <div id="lista-informes" class="space-y-4"></div>
            </div>

            <div id="section-chat" class="view-section hidden animate-fade">
                <h3 class="font-black text-2xl mb-6">Mensajería</h3>
                <div id="contactList" class="flex gap-4 overflow-x-auto ios-scroll mb-8 pb-2"></div>
                <div class="bg-white rounded-[2.5rem] border border-slate-100 overflow-hidden shadow-sm flex flex-col h-[400px]">
                    <div id="chatHeader" class="p-5 border-b bg-slate-50 font-black text-[10px] text-slate-400 uppercase">Seleccioná un contacto</div>
                    <div id="chatMessages" class="flex-1 p-5 overflow-y-auto space-y-4 ios-scroll"></div>
                    <div class="p-4 border-t flex gap-2">
                        <input type="text" id="msgInput" placeholder="Escribir..." class="flex-1 bg-slate-100 rounded-2xl px-4 py-3 text-sm outline-none">
                        <button onclick="enviarMensaje()" class="bg-indigo-600 text-white w-12 h-12 rounded-2xl flex items-center justify-center shadow-lg shadow-indigo-100 active:scale-90 transition-all"><i class="fa-solid fa-paper-plane"></i></button>
                    </div>
                </div>
            </div>
        </main>

        <nav class="fixed bottom-8 left-1/2 -translate-x-1/2 w-[90%] max-w-sm glass rounded-[2.8rem] shadow-2xl h-20 flex items-center justify-around px-6 z-50 border border-white">
            <button onclick="switchTab('home')" class="nav-btn nav-active" id="btn-home"><i class="fa-solid fa-house-chimney text-xl"></i></button>
            <button onclick="switchTab('calendar')" class="nav-btn text-slate-300" id="btn-calendar"><i class="fa-solid fa-calendar-check text-xl"></i></button>
            <button onclick="switchTab('boletin')" class="nav-btn text-slate-300" id="btn-boletin"><i class="fa-solid fa-graduation-cap text-xl"></i></button>
            <button onclick="switchTab('chat')" class="nav-btn text-slate-300" id="btn-chat"><i class="fa-solid fa-comment-dots text-xl"></i></button>
        </nav>

        <div onclick="toggleIosi()" class="fixed bottom-32 right-8 w-14 h-14 bg-slate-900 text-white rounded-2xl shadow-2xl flex items-center justify-center z-[100] active:scale-90 border-4 border-white rotate-3 transition-transform cursor-pointer">
            <i class="fa-solid fa-bolt-lightning text-yellow-400"></i>
        </div>

        <div id="window-iosi" class="fixed inset-0 z-[200] bg-slate-900/40 backdrop-blur-md hidden flex items-end justify-center p-4">
            <div class="bg-white w-full max-w-sm rounded-[3rem] shadow-2xl overflow-hidden animate-fade">
                <div class="bg-slate-900 p-6 text-white flex justify-between items-center">
                    <p class="font-black text-xs uppercase tracking-widest">Iosi AI v4.0</p>
                    <button onclick="toggleIosi()"><i class="fa-solid fa-xmark text-xl opacity-40"></i></button>
                </div>
                <div id="iosiContent" class="h-80 overflow-y-auto p-6 space-y-4 bg-slate-50 text-[11px] font-medium leading-relaxed">
                    <div class="bg-white border p-4 rounded-2xl rounded-tl-none shadow-sm">Hola. Consultame notas, faltas o informes.</div>
                </div>
                <div class="p-4 bg-white border-t flex gap-2">
                    <input type="text" id="preguntaIosi" placeholder="Preguntar..." class="flex-1 bg-slate-100 rounded-2xl px-5 py-3 text-sm outline-none">
                    <button onclick="analisisRapidoIosi()" class="bg-indigo-600 text-white w-12 h-12 rounded-2xl flex items-center justify-center"><i class="fa-solid fa-paper-plane"></i></button>
                </div>
            </div>
        </div>
    </div>

<script>
    // CONFIGURACIÓN FIREBASE
    const firebaseConfig = {
        apiKey: "AIzaSyCLeGKE5NoGUQT0GRdMDIHn4zhxF3ZOp6k",
        authDomain: "app-academica-interna.firebaseapp.com",
        projectId: "app-academica-interna",
        storageBucket: "app-academica-interna.firebasestorage.app",
        messagingSenderId: "169882587504",
        appId: "1:169882587504:web:0fcdf32efdc81ad0a0bfb5"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let hijoActivo = null;
    let tutorEmail = "";
    let canalChatActivo = null;

    // ACCESO
    async function validarAcceso() {
        const email = document.getElementById('emailAcceso').value.trim().toLowerCase();
        if(!email) return;
        document.getElementById('loadingOverlay').classList.remove('hidden');
        try {
            const doc = await db.collection('usuarios').doc(email).get();
            if(doc.exists && doc.data().rol === 'familia') {
                tutorEmail = email;
                localStorage.setItem('familiaEmail', email);
                iniciarApp(doc.data());
            } else { alert("Usuario no autorizado"); document.getElementById('loadingOverlay').classList.add('hidden'); }
        } catch(e) { document.getElementById('loadingOverlay').classList.add('hidden'); }
    }

    async function iniciarApp(data) {
        document.getElementById('loginScreen').classList.add('hidden');
        document.getElementById('mainPanel').classList.remove('hidden');
        document.getElementById('nombreTutor').innerText = data.nombre;

        const hijosIds = Array.isArray(data.hijoID) ? data.hijoID : [data.hijoID];
        if(hijosIds.length > 1) {
            document.getElementById('selectorHijosContainer').classList.remove('hidden');
            const select = document.getElementById('selectorHijos');
            select.innerHTML = "";
            for(let id of hijosIds) {
                const h = await db.collection('alumnos').doc(id).get();
                if(h.exists) select.innerHTML += `<option value="${id}">${h.data().nombre}</option>`;
            }
        }
        cargarDatosHijo(hijosIds[0]);
        cargarContactos();
        document.getElementById('loadingOverlay').classList.add('hidden');
    }

    async function cargarDatosHijo(id) {
        const doc = await db.collection('alumnos').doc(id).get();
        if(doc.exists) {
            hijoActivo = { id: doc.id, ...doc.data() };
            vincularBoletin(hijoActivo.id);
            escucharFeed(hijoActivo.cursoID);
            escucharCalendario(hijoActivo.cursoID);
            escucharInformesEscritos(hijoActivo.id);
        }
    }

    // CALENDARIO Y NOTICIAS
    function escucharCalendario(curso) {
        db.collection('eventos').where('cursoID', 'in', ['TODOS', curso]).onSnapshot(snap => {
            const container = document.getElementById('calendarFeed');
            container.innerHTML = "";
            snap.forEach(doc => {
                const e = doc.data();
                container.innerHTML += `<div class="bg-white p-5 rounded-3xl border border-slate-50 flex items-center gap-4 shadow-sm">
                    <div class="bg-pink-50 p-3 rounded-2xl text-pink-500"><i class="fa-solid fa-calendar-star"></i></div>
                    <div><p class="font-black text-slate-800 text-sm">${e.titulo}</p><p class="text-[10px] text-slate-400 font-bold uppercase">${e.fecha}</p></div>
                </div>`;
            });
        });
    }

    // INFORMES ESCRITOS
    function escucharInformesEscritos(alumnoID) {
        db.collection('informes').where('alumnoID', '==', alumnoID).orderBy('timestamp', 'desc').onSnapshot(snap => {
            const container = document.getElementById('lista-informes');
            container.innerHTML = "";
            if(snap.empty) container.innerHTML = "<p class='text-center text-[10px] text-slate-300 font-bold py-10 uppercase tracking-widest'>Sin informes aún</p>";
            snap.forEach(doc => {
                const info = doc.data();
                container.innerHTML += `<div class="report-card animate-fade">
                    <div class="flex justify-between items-start mb-3">
                        <span class="text-[9px] font-black text-indigo-500 uppercase tracking-widest">${info.materia || 'General'}</span>
                        <span class="text-[9px] font-bold text-slate-300">${info.fecha || ''}</span>
                    </div>
                    <h5 class="font-black text-slate-800 text-sm mb-2">${info.titulo || 'Informe de desempeño'}</h5>
                    <p class="text-[11px] text-slate-500 font-medium leading-relaxed">${info.comentario || info.texto || 'No hay descripción adicional.'}</p>
                </div>`;
            });
        });
    }

    // BOLETÍN
    function vincularBoletin(id) {
        db.collection('calificaciones').doc(id).onSnapshot(doc => {
            if(doc.exists) {
                const d = doc.data();
                document.getElementById('b-inasist').innerText = d.inasistencias || 0;
                const asis = Math.max(0, 100 - ((d.inasistencias || 0) * 100 / 180)).toFixed(1);
                document.getElementById('b-asist').innerText = asis + "%";
                const tabla = document.getElementById('tabla-notas');
                tabla.innerHTML = "";
                Object.entries(d.notas || {}).forEach(([m,v]) => {
                    tabla.innerHTML += `<div class="flex justify-between items-center bg-white p-4 rounded-2xl border border-slate-50 shadow-sm">
                        <span class="font-bold text-slate-400 text-[10px] uppercase tracking-widest">${m}</span>
                        <span class="font-black text-slate-800 text-lg">${v}</span>
                    </div>`;
                });
            }
        });
    }

    // CHAT
    function cargarContactos() {
        const c = [{n:'Secretaría', i:'fa-building-columns', id:'secretaria'}, {n:'Administración', i:'fa-file-invoice-dollar', id:'admin'}, {n:'Dirección', i:'fa-user-tie', id:'direccion'}];
        document.getElementById('contactList').innerHTML = c.map(x => `
            <div onclick="abrirChat('${x.id}', '${x.n}')" class="flex-shrink-0 flex flex-col items-center gap-2 cursor-pointer">
                <div class="w-16 h-16 bg-white border border-slate-100 rounded-3xl flex items-center justify-center text-slate-400 hover:text-pink-600 transition-all shadow-sm"><i class="fa-solid ${x.i} text-xl"></i></div>
                <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest">${x.n}</span>
            </div>`).join('');
    }

    function abrirChat(canal, nombre) {
        canalChatActivo = canal;
        document.getElementById('chatHeader').innerText = "Canal: " + nombre;
        db.collection('mensajes').where('familiaID', '==', tutorEmail).where('canal', '==', canal).orderBy('timestamp', 'asc').onSnapshot(snap => {
            const box = document.getElementById('chatMessages');
            box.innerHTML = "";
            snap.forEach(doc => {
                const m = doc.data();
                const isMe = m.sender === 'familia';
                box.innerHTML += `<div class="flex ${isMe ? 'justify-end' : 'justify-start'} animate-fade">
                    <div class="${isMe ? 'bg-slate-900 text-white rounded-tr-none' : 'bg-slate-100 text-slate-800 rounded-tl-none'} p-4 rounded-2xl max-w-[85%] font-medium text-xs shadow-sm">
                        ${m.texto}
                    </div>
                </div>`;
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    async function enviarMensaje() {
        const input = document.getElementById('msgInput');
        if(!input.value.trim() || !canalChatActivo) return;
        await db.collection('mensajes').add({
            familiaID: tutorEmail,
            canal: canalChatActivo,
            texto: input.value.trim(),
            sender: 'familia',
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        });
        input.value = "";
    }

    // IOSI AI
    async function obtenerRespuestaIosi(mensaje) {
        const p = mensaje.toLowerCase();
        if (!hijoActivo) return "No cargué los datos.";
        try {
            const calDoc = await db.collection('calificaciones').doc(hijoActivo.id).get();
            const calData = calDoc.exists ? calDoc.data() : {};
            if (p.includes("nota") || p.includes("sacó")) {
                let res = "Notas actuales:<br>";
                Object.entries(calData.notas || {}).forEach(([k,v]) => res += `• ${k}: **${v}**<br>`);
                return res;
            }
            if (p.includes("falta") || p.includes("día") || p.includes("faltó")) {
                const snap = await db.collection('asistencias').where('alumnoID', '==', hijoActivo.id).limit(5).get();
                let r = `Tiene un total de ${calData.inasistencias || 0} faltas.<br>Fechas:<br>`;
                snap.forEach(d => r += `• ${d.data().fecha}: ${d.data().estado}<br>`);
                return r;
            }
            if (p.includes("informe") || p.includes("reporte")) {
                return "Los informes escritos están en la sección Rendimiento (icono del birrete), abajo de las notas.";
            }
        } catch(e) { return "Error de conexión."; }
        return "Podés preguntarme sobre notas, faltas o informes.";
    }

    async function analisisRapidoIosi() {
        const input = document.getElementById('preguntaIosi');
        const box = document.getElementById('iosiContent');
        if(!input.value.trim()) return;
        const txt = input.value.trim();
        box.innerHTML += `<div class="flex justify-end"><div class="bg-indigo-600 text-white p-3 rounded-2xl rounded-tr-none shadow-md">${txt}</div></div>`;
        input.value = "";
        const r = await obtenerRespuestaIosi(txt);
        setTimeout(() => {
            box.innerHTML += `<div class="flex justify-start"><div class="bg-white border p-3 rounded-2xl rounded-tl-none text-slate-600 shadow-sm">${r}</div></div>`;
            box.scrollTop = box.scrollHeight;
        }, 600);
    }

    function escucharFeed(curso) {
        db.collection('comunicados').onSnapshot(snap => {
            const c = document.getElementById('feedFamilias');
            c.innerHTML = "";
            snap.forEach(doc => {
                const p = doc.data();
                if(p.tag === "TODOS" || p.tag === curso) {
                    c.innerHTML += `<div class="bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm">
                        <h4 class="font-black text-slate-800 text-lg leading-tight mb-2">${p.titulo}</h4>
                        <p class="text-xs text-slate-400 font-medium">${p.texto}</p>
                    </div>`;
                }
            });
        });
    }

    function switchTab(id) {
        document.querySelectorAll('.view-section').forEach(s => s.classList.add('hidden'));
        document.getElementById('section-' + id).classList.remove('hidden');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('nav-active'));
        document.getElementById('btn-' + id).classList.add('nav-active');
    }
    function toggleIosi() { document.getElementById('window-iosi').classList.toggle('hidden'); }
    function cerrarSesion() { localStorage.clear(); location.reload(); }
    setTimeout(() => { document.getElementById('loadingOverlay').classList.add('hidden'); }, 3000);
</script>
</body>
</html>
