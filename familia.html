<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comunicación Familiar - Mi Escuela</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .post-card { transition: transform 0.2s; }
        .post-card:active { transform: scale(0.98); }
        .login-gradient { background: radial-gradient(circle at top right, #fdf2f8, #ffffff); }
        .nav-active { color: #ec4899; background: #fdf2f8; border-radius: 9999px; width: 40px; height: 40px; display: flex; items-center: center; justify-content: center; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <div id="loginScreen" class="fixed inset-0 z-[100] bg-white login-gradient flex flex-col items-center justify-center px-6 transition-opacity duration-500">
        <div class="w-full max-w-sm text-center">
            <div class="w-20 h-20 bg-pink-500 rounded-[2rem] shadow-xl shadow-pink-200 flex items-center justify-center text-white text-3xl mx-auto mb-8 rotate-3">
                <i class="fa-solid fa-graduation-cap"></i>
            </div>
            <h1 class="text-4xl font-black text-slate-800 tracking-tighter mb-3">Hola de nuevo</h1>
            <p class="text-slate-400 text-sm mb-10 font-medium">Ingresá el correo que registraste en la escuela.</p>
            
            <div class="space-y-4">
                <div class="text-left">
                    <label class="text-[10px] font-black text-slate-400 uppercase ml-4 mb-2 block tracking-widest">Email de Familia</label>
                    <input type="email" id="emailAcceso" placeholder="mama-papa@correo.com" 
                        class="w-full bg-white border border-slate-200 rounded-2xl p-4 text-slate-700 outline-none focus:ring-4 focus:ring-pink-500/10 focus:border-pink-500 transition-all font-medium shadow-sm">
                </div>
                <button onclick="validarAcceso()" id="btnLogin" class="w-full bg-slate-900 text-white font-bold py-4 rounded-2xl shadow-xl shadow-slate-200 hover:bg-slate-800 transition-all active:scale-95 flex items-center justify-center gap-3">
                    Ingresar al Panel <i class="fa-solid fa-arrow-right text-xs text-pink-400"></i>
                </button>
            </div>
        </div>
    </div>

    <div id="mainPanel" class="hidden">
        <header class="bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b border-slate-200">
            <div class="max-w-md mx-auto px-4 h-16 flex items-center justify-between">
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 bg-pink-500 rounded-lg flex items-center justify-center text-white shadow-lg shadow-pink-200">
                        <i class="fa-solid fa-graduation-cap text-xs"></i>
                    </div>
                    <h1 class="font-black text-slate-800 tracking-tight text-sm">COMUNIDAD <span class="text-pink-500 italic">Escuela</span></h1>
                </div>
                <button onclick="cerrarSesion()" class="text-slate-300 hover:text-red-500 transition-all"><i class="fa-solid fa-power-off"></i></button>
            </div>
        </header>

        <main class="max-w-md mx-auto px-4 py-6 pb-32">
            
            <div id="perfilAlumno" class="mb-8 p-6 bg-gradient-to-br from-slate-800 via-slate-900 to-black rounded-[2.5rem] text-white shadow-2xl relative overflow-hidden">
                <div class="relative z-10">
                    <p class="text-[10px] font-black text-pink-400 uppercase tracking-widest mb-2">Credencial Familia</p>
                    <h2 id="nombreHijo" class="text-2xl font-bold tracking-tight mb-4 leading-none">...</h2>
                    <div class="flex gap-2">
                        <span id="cursoHijo" class="bg-white/10 backdrop-blur-md text-white px-3 py-1.5 rounded-xl text-[10px] font-black border border-white/20 uppercase">...</span>
                        <span class="bg-white/10 text-slate-300 px-3 py-1.5 rounded-xl text-[10px] font-black border border-white/5 uppercase">Periodo 2026</span>
                    </div>
                </div>
                <div class="absolute -right-6 -bottom-6 w-32 h-32 bg-pink-500/20 rounded-full blur-3xl"></div>
            </div>

            <div id="section-home" class="view-section">
                <h3 class="font-black text-slate-800 text-sm uppercase tracking-tighter mb-6">Muro de Noticias</h3>
                <div id="feedFamilias" class="space-y-6"></div>
            </div>

            <div id="section-calendar" class="view-section hidden">
                <h3 class="font-black text-slate-800 text-sm uppercase tracking-tighter mb-6">Agenda Escolar</h3>
                <div id="calendarFeed" class="space-y-4"></div>
            </div>

            <div id="section-chat" class="view-section hidden flex flex-col h-[500px]">
                <h3 class="font-black text-slate-800 text-sm uppercase tracking-tighter mb-6">Mensaje a Secretaría</h3>
                <div id="chatBox" class="flex-1 bg-white border border-slate-200 rounded-[2rem] p-4 overflow-y-auto flex flex-col gap-3 mb-4 shadow-inner">
                    </div>
                <div class="flex gap-2 bg-white p-2 rounded-2xl border shadow-sm">
                    <input type="text" id="msgInput" placeholder="Escribir consulta..." class="flex-1 p-2 bg-transparent outline-none text-sm">
                    <button onclick="enviarMensaje()" class="bg-pink-500 text-white w-10 h-10 rounded-xl flex items-center justify-center shadow-lg"><i class="fa-solid fa-paper-plane text-xs"></i></button>
                </div>
            </div>

            <div id="section-settings" class="view-section hidden">
                <h3 class="font-black text-slate-800 text-sm uppercase tracking-tighter mb-6">Configuración</h3>
                <div class="bg-white rounded-[2rem] border p-6 space-y-4">
                    <div class="flex justify-between items-center py-2 border-b">
                        <span class="text-sm font-bold text-slate-600">Notificaciones</span>
                        <div class="w-10 h-5 bg-pink-500 rounded-full flex items-center px-1"><div class="w-3 h-3 bg-white rounded-full ml-auto"></div></div>
                    </div>
                    <p class="text-[10px] text-slate-400 text-center pt-4 uppercase font-bold">App Versión 2.0.1</p>
                </div>
            </div>

        </main>

        <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-sm bg-white/90 backdrop-blur-xl border border-slate-200 rounded-full shadow-2xl h-16 flex items-center justify-around px-6 z-50">
            <button onclick="switchTab('home')" class="nav-btn text-pink-500 nav-active" id="btn-home"><i class="fa-solid fa-house"></i></button>
            <button onclick="switchTab('calendar')" class="nav-btn text-slate-400" id="btn-calendar"><i class="fa-solid fa-calendar-check text-lg"></i></button>
            <button onclick="switchTab('chat')" class="nav-btn text-slate-400" id="btn-chat"><i class="fa-solid fa-comment-dots text-lg"></i></button>
            <button onclick="switchTab('settings')" class="nav-btn text-slate-400" id="btn-settings"><i class="fa-solid fa-gear text-lg"></i></button>
        </nav>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCLeGKE5NoGUQT0GRdMDIHn4zhxF3ZOp6k",
            authDomain: "app-academica-interna.firebaseapp.com",
            projectId: "app-academica-interna",
            storageBucket: "app-academica-interna.firebasestorage.app",
            messagingSenderId: "169882587504",
            appId: "1:169882587504:web:0fcdf32efdc81ad0a0bfb5"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let userGlobal = null;

        // 1. NAVEGACIÓN
        function switchTab(tabId) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.add('hidden'));
            document.getElementById('section-' + tabId).classList.remove('hidden');
            
            document.querySelectorAll('.nav-btn').forEach(b => {
                b.classList.remove('nav-active', 'text-pink-500');
                b.classList.add('text-slate-400');
            });
            const activeBtn = document.getElementById('btn-' + tabId);
            activeBtn.classList.add('nav-active', 'text-pink-500');
            activeBtn.classList.remove('text-slate-400');

            if(tabId === 'chat') escucharChat();
        }

        // 2. ACCESO
        async function validarAcceso() {
            const email = document.getElementById('emailAcceso').value.trim().toLowerCase();
            const btn = document.getElementById('btnLogin');
            if(!email) return alert("Ingresá tu correo");
            
            btn.disabled = true;
            try {
                const userDoc = await db.collection('usuarios').doc(email).get();
                if (userDoc.exists && userDoc.data().rol === 'familia') {
                    localStorage.setItem('familiaEmail', email);
                    mostrarPanel(userDoc.data());
                } else {
                    alert("Email no registrado como familia.");
                    btn.disabled = false;
                }
            } catch (e) { alert("Error de conexión"); btn.disabled = false; }
        }

        async function mostrarPanel(userData) {
            userGlobal = userData;
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('mainPanel').classList.remove('hidden');

            const hijoDoc = await db.collection('alumnos').doc(userData.hijoID).get();
            if (hijoDoc.exists) {
                const h = hijoDoc.data();
                document.getElementById('nombreHijo').innerText = h.nombre;
                document.getElementById('cursoHijo').innerText = h.cursoID;
                cargarFeed(h.cursoID);
                cargarCalendario(h.cursoID);
            }
        }

        // 3. COMUNICADOS (FEED)
        function cargarFeed(cursoID) {
            const ahora = new Date().toISOString();
            db.collection('comunicados')
                .where('fechaPublicacion', '<=', ahora)
                .orderBy('fechaPublicacion', 'desc')
                .onSnapshot(snap => {
                    const feed = document.getElementById('feedFamilias');
                    let html = "";
                    snap.forEach(doc => {
                        const p = doc.data();
                        if(p.tag === "TODOS" || p.tag === cursoID) {
                            html += `
                                <article class="post-card bg-white rounded-[2rem] border border-slate-200 overflow-hidden shadow-sm">
                                    ${p.img ? `<img src="${p.img}" class="w-full h-48 object-cover">` : ''}
                                    <div class="p-6">
                                        <div class="flex gap-2 mb-2">
                                            <span class="text-[8px] font-black bg-pink-50 text-pink-500 px-2 py-1 rounded-md uppercase">${p.tag}</span>
                                        </div>
                                        <h4 class="font-bold text-slate-800 mb-2">${p.titulo}</h4>
                                        <p class="text-xs text-slate-500 mb-4">${p.texto}</p>
                                        ${p.doc ? `<a href="${p.doc}" target="_blank" class="flex items-center gap-3 p-3 bg-slate-50 rounded-xl border border-slate-100 text-[10px] font-bold text-slate-700 uppercase tracking-tighter"><i class="fa-solid fa-file-pdf text-pink-500 text-sm"></i> Descargar Documento</a>` : ''}
                                    </div>
                                    <div class="px-6 py-3 bg-slate-50/50 border-t flex justify-between">
                                        <button onclick="darLike('${doc.id}')" class="text-[10px] font-bold text-slate-400 hover:text-pink-500"><i class="fa-regular fa-heart mr-1"></i> ${p.likes || 0}</button>
                                    </div>
                                </article>`;
                        }
                    });
                    feed.innerHTML = html || '<p class="text-center text-slate-400 text-xs">No hay novedades.</p>';
                });
        }

        // 4. CALENDARIO
        function cargarCalendario(cursoID) {
            db.collection('eventos')
                .where('curso', 'in', ['TODOS', cursoID])
                .orderBy('fecha', 'asc')
                .onSnapshot(snap => {
                    const list = document.getElementById('calendarFeed');
                    list.innerHTML = snap.docs.map(doc => {
                        const e = doc.data();
                        return `
                        <div class="bg-white p-4 rounded-2xl border-l-4 border-pink-500 shadow-sm flex items-center justify-between">
                            <div>
                                <p class="text-[10px] font-black text-pink-500 uppercase">${e.fecha}</p>
                                <p class="text-sm font-bold text-slate-700">${e.titulo}</p>
                            </div>
                            <i class="fa-solid fa-calendar-day text-slate-100 text-2xl"></i>
                        </div>`;
                    }).join('');
                });
        }

        // 5. CHAT PRIVADO
        function escucharChat() {
            const email = localStorage.getItem('familiaEmail');
            db.collection('mensajes')
                .where('participantes', 'array-contains', email)
                .orderBy('fecha', 'asc')
                .onSnapshot(snap => {
                    const box = document.getElementById('chatBox');
                    box.innerHTML = snap.docs.map(doc => {
                        const m = doc.data();
                        const esMio = m.emisorID === email;
                        return `<div class="max-w-[85%] p-3 rounded-2xl text-xs ${esMio ? 'bg-pink-500 text-white self-end rounded-tr-none' : 'bg-slate-100 text-slate-700 self-start rounded-tl-none'}">${m.texto}</div>`;
                    }).join('');
                    box.scrollTop = box.scrollHeight;
                });
        }

        async function enviarMensaje() {
            const email = localStorage.getItem('familiaEmail');
            const input = document.getElementById('msgInput');
            if(!input.value.trim()) return;
            await db.collection('mensajes').add({
                emisorID: email,
                receptorID: "secretaria_primaria",
                participantes: [email, "secretaria_primaria"],
                texto: input.value,
                fecha: new Date().toISOString()
            });
            input.value = "";
        }
        // En la App de Familias, para ver la respuesta del Admin:
function escucharMisMensajes(miEmail) {
    db.collection('mensajes')
      .where('participantes', 'array-contains', miEmail)
      .orderBy('fecha', 'asc')
      .onSnapshot(snap => {
          // Aquí pintas los globos de texto. 
          // Si emisorID == miEmail -> Globo a la derecha.
          // Si emisorID == "secretaria_primaria" -> Globo a la izquierda.
      });
}

        async function darLike(id) {
            await db.collection('comunicados').doc(id).update({ likes: firebase.firestore.FieldValue.increment(1) });
        }

        function cerrarSesion() {
            localStorage.removeItem('familiaEmail');
            location.reload();
        }

        window.onload = async () => {
            const savedEmail = localStorage.getItem('familiaEmail');
            if(savedEmail) {
                const doc = await db.collection('usuarios').doc(savedEmail).get();
                if(doc.exists) mostrarPanel(doc.data());
            }
        }
    </script>
</body>
</html>
