<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Comunidad Familia - Iosef Caro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; color: #1e293b; margin: 0; }
        
        /* LOGIN OVERLAY */
        #login-screen { position: fixed; inset: 0; background: #fff; z-index: 2000; display: flex; flex-direction: column; justify-content: center; padding: 2.5rem; }
        
        /* APP LAYOUT */
        .app-content { display: none; padding-bottom: 120px; }
        .view-section { display: none; animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .view-section.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* IOSI IA STYLES */
        .iosi-btn { position: fixed; bottom: 100px; right: 20px; width: 64px; height: 64px; background: linear-gradient(135deg, #4f46e5, #8b5cf6); border-radius: 22px; display: flex; align-items: center; justify-content: center; color: white; box-shadow: 0 10px 25px rgba(79, 70, 229, 0.4); z-index: 1000; cursor: pointer; transition: all 0.3s; border: 4px solid white; }
        #window-iosi { position: fixed; inset: 0; background: white; z-index: 1500; display: none; flex-direction: column; }
        
        /* CARDS & UI */
        .nav-active { color: #db2777 !important; transform: translateY(-5px); }
        .nav-active i { background: #fdf2f8; padding: 12px; border-radius: 20px; box-shadow: 0 10px 15px -3px rgba(219, 39, 119, 0.1); }
        .glass-card { background: white; border-radius: 2.5rem; border: 1px solid #f1f5f9; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.02); margin-bottom: 1.2rem; overflow: hidden; }
        
        input, select { background: #f1f5f9 !important; border: none !important; border-radius: 1.2rem !important; padding: 1.2rem !important; font-weight: 700 !important; width: 100%; outline: none; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="w-20 h-20 bg-pink-50 text-pink-500 rounded-[2.2rem] flex items-center justify-center text-3xl mb-8 shadow-sm">
            <i class="fas fa-heart"></i>
        </div>
        <h1 class="font-black text-4xl text-slate-800 tracking-tighter mb-2">Hola,</h1>
        <p class="text-slate-400 font-bold mb-10 text-sm">Ingresá el correo registrado para ver la información escolar.</p>
        <input type="email" id="loginEmail" placeholder="tu-correo@ejemplo.com" class="mb-4">
        <button onclick="intentarLogin()" class="w-full bg-slate-900 text-white p-5 rounded-[1.5rem] font-black text-xs uppercase tracking-widest shadow-xl">Entrar ahora</button>
        <p id="loginError" class="text-rose-500 text-[10px] font-black text-center mt-4 hidden uppercase">Correo no encontrado</p>
    </div>

    <div id="app" class="app-content">
        <header class="bg-white p-8 rounded-b-[3rem] shadow-sm mb-6 border-b">
            <div class="flex justify-between items-start mb-6">
                <div>
                    <h1 id="userName" class="font-black text-2xl text-slate-800 tracking-tighter leading-none">...</h1>
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-2">Panel de Familia</p>
                </div>
                <button onclick="cerrarSesion()" class="w-10 h-10 rounded-xl bg-slate-50 text-slate-300 flex items-center justify-center"><i class="fas fa-power-off text-sm"></i></button>
            </div>

            <div id="wrapperSelector" class="hidden animate-pulse">
                <label class="text-[9px] font-black text-slate-400 uppercase ml-2 mb-1 block">Viendo datos de:</label>
                <select id="selectHijo" onchange="cambiarHijo(this.value)"></select>
            </div>
        </header>

        <main class="px-6 max-w-md mx-auto">
            <section id="view-muro" class="view-section active space-y-4"></section>
            
            <section id="view-academico" class="view-section hidden space-y-4">
                <div class="glass-card p-8 bg-slate-900 text-white border-none shadow-xl">
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Inasistencias</p>
                    <h3 id="countFaltas" class="text-5xl font-black">0</h3>
                </div>
                <div id="notasContainer" class="space-y-3"></div>
            </section>

            <section id="view-agenda" class="view-section hidden space-y-3"></section>
        </main>
    </div>

    <div class="iosi-btn" onclick="toggleIosi()">
        <i class="fas fa-robot text-2xl"></i>
    </div>

    <div id="window-iosi">
        <div class="p-6 border-b flex justify-between items-center bg-indigo-600 text-white">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-white/20 rounded-xl flex items-center justify-center"><i class="fas fa-robot"></i></div>
                <h3 class="font-black text-sm">IOSI Asistente</h3>
            </div>
            <button onclick="toggleIosi()"><i class="fas fa-times"></i></button>
        </div>
        <div class="flex-1 p-6 overflow-y-auto bg-slate-50" id="iosi-chat">
            <div class="bg-white p-4 rounded-2xl rounded-tl-none shadow-sm border mb-4 max-w-[80%]">
                <p class="text-xs font-bold text-slate-700">¡Hola! Soy Iosi. Puedo ayudarte con las notas, eventos o dudas de la escuela. ¿Qué necesitás saber?</p>
            </div>
        </div>
        <div class="p-4 bg-white border-t flex gap-2">
            <input type="text" placeholder="Preguntale algo..." class="text-sm">
            <button class="bg-indigo-600 text-white w-12 h-12 rounded-xl flex items-center justify-center"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-white/80 backdrop-blur-lg border-t flex justify-around items-center h-24 z-[1001] px-6">
        <button onclick="switchView('muro')" id="btn-muro" class="nav-btn nav-active flex flex-col items-center flex-1 transition-all"><i class="fas fa-th-large text-xl"></i><span class="text-[9px] font-bold mt-2 uppercase">Inicio</span></button>
        <button onclick="switchView('academico')" id="btn-academico" class="nav-btn text-slate-300 flex flex-col items-center flex-1 transition-all"><i class="fas fa-chart-line text-xl"></i><span class="text-[9px] font-bold mt-2 uppercase">Notas</span></button>
        <button onclick="switchView('agenda')" id="btn-agenda" class="nav-btn text-slate-300 flex flex-col items-center flex-1 transition-all"><i class="fas fa-calendar text-xl"></i><span class="text-[9px] font-bold mt-2 uppercase">Agenda</span></button>
    </nav>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCLeGKE5NoGUQT0GRdMDIHn4zhxF3ZOp6k",
            authDomain: "app-academica-interna.firebaseapp.com",
            projectId: "app-academica-interna",
            storageBucket: "app-academica-interna.firebasestorage.app",
            messagingSenderId: "169882587504",
            appId: "1:169882587504:web:0fcdf32efdc81ad0a0bfb5"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let currentEmail = localStorage.getItem('parentEmail');

        window.onload = () => {
            if (currentEmail) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('app').style.display = 'block';
                iniciarApp();
            }
        };

        async function intentarLogin() {
            const email = document.getElementById('loginEmail').value.toLowerCase().trim();
            const userDoc = await db.collection('usuarios').doc(email).get();
            if (userDoc.exists && userDoc.data().rol === 'familia') {
                localStorage.setItem('parentEmail', email);
                location.reload();
            } else {
                document.getElementById('loginError').classList.remove('hidden');
            }
        }

        async function iniciarApp() {
            const userDoc = await db.collection('usuarios').doc(currentEmail).get();
            const userData = userDoc.data();
            document.getElementById('userName').innerText = userData.nombre;
            
            if(userData.hijoID?.length > 0) {
                if(userData.hijoID.length > 1) {
                    document.getElementById('wrapperSelector').classList.remove('hidden');
                    const select = document.getElementById('selectHijo');
                    for(let id of userData.hijoID) {
                        const hDoc = await db.collection('alumnos').doc(id).get();
                        select.innerHTML += `<option value="${id}">${hDoc.data().nombre}</option>`;
                    }
                }
                cambiarHijo(userData.hijoID[0]);
            }
        }

        async function cambiarHijo(idHijo) {
            const hDoc = await db.collection('alumnos').doc(idHijo).get();
            const data = hDoc.data();
            cargarMuro(data.curso);
            cargarAcademico(idHijo);
            cargarAgenda();
        }

        function cargarMuro(curso) {
            db.collection('comunicados').orderBy('creadoEn', 'desc').onSnapshot(snap => {
                document.getElementById('view-muro').innerHTML = snap.docs.map(doc => {
                    const d = doc.data();
                    if(d.tag === "TODOS" || d.tag === curso) {
                        return `<div class="glass-card p-8">
                            <span class="text-[8px] font-black bg-indigo-50 text-indigo-600 px-3 py-1 rounded-full uppercase tracking-widest">${d.tag}</span>
                            <h4 class="font-black text-xl text-slate-800 mt-4 leading-tight">${d.titulo}</h4>
                            <p class="text-sm text-slate-500 mt-3">${d.texto}</p>
                        </div>`;
                    }
                }).join('');
            });
        }

        function cargarAcademico(id) {
            db.collection('calificaciones').doc(id).onSnapshot(doc => {
                if(!doc.exists) return;
                const d = doc.data();
                document.getElementById('countFaltas').innerText = d.fechasFaltas?.length || 0;
                let html = "";
                for (const [materia, trims] of Object.entries(d.notas || {})) {
                    html += `<div class="flex justify-between items-center p-4 bg-white rounded-2xl border shadow-sm">
                        <span class="text-xs font-bold text-slate-700">${materia}</span>
                        <div class="flex gap-2">
                            <span class="w-8 h-8 flex items-center justify-center bg-slate-50 rounded-lg text-[10px] font-black">${trims['1Trim'] || '-'}</span>
                            <span class="w-8 h-8 flex items-center justify-center bg-slate-50 rounded-lg text-[10px] font-black">${trims['2Trim'] || '-'}</span>
                            <span class="w-8 h-8 flex items-center justify-center bg-indigo-600 text-white rounded-lg text-[10px] font-black">${trims['3Trim'] || '-'}</span>
                        </div>
                    </div>`;
                }
                document.getElementById('notasContainer').innerHTML = html;
            });
        }

        function cargarAgenda() {
            db.collection('eventos').orderBy('fecha', 'asc').onSnapshot(snap => {
                document.getElementById('view-agenda').innerHTML = snap.docs.map(doc => `
                    <div class="flex items-center gap-5 bg-white p-5 rounded-[2rem] border shadow-sm">
                        <div class="bg-slate-900 text-white p-3 rounded-2xl text-center min-w-[60px]">
                            <span class="block text-sm font-black">${doc.data().fecha.split('-')[2]}</span>
                            <span class="block text-[8px] uppercase font-bold opacity-50">${doc.data().fecha.split('-')[1]}</span>
                        </div>
                        <p class="font-bold text-slate-700 text-sm">${doc.data().titulo}</p>
                    </div>`).join('');
            });
        }

        function switchView(id) {
            document.querySelectorAll('.view-section').forEach(v => v.classList.add('hidden'));
            document.getElementById('view-' + id).classList.remove('hidden');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('nav-active'));
            document.getElementById('btn-' + id).classList.add('nav-active');
        }

        function toggleIosi() {
            const win = document.getElementById('window-iosi');
            win.style.display = win.style.display === 'flex' ? 'none' : 'flex';
        }

        function cerrarSesion() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
