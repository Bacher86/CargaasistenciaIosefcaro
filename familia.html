<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comunidad Familia - Mi Escuela</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
body { font-family: 'Inter', sans-serif; }
.nav-active { color:#ec4899; background:#fdf2f8; border-radius:9999px; width:44px; height:44px; display:flex; align-items:center; justify-content:center; }
.view-section { animation:fadeIn .3s ease-in-out; }
@keyframes fadeIn { from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);} }
</style>
</head>

<body class="bg-slate-50">

<!-- LOGIN -->
<div id="loginScreen" class="fixed inset-0 flex items-center justify-center bg-white">
<input id="emailAcceso" placeholder="Email" class="border p-3 rounded">
<button onclick="validarAcceso()" class="bg-black text-white p-3 rounded ml-2">Entrar</button>
</div>

<!-- APP -->
<div id="mainPanel" class="hidden max-w-md mx-auto p-4">

<h2 id="nombreTutor" class="font-bold mb-4"></h2>

<select id="selectorHijos" onchange="seleccionarHijo(this.value)" class="mb-4 w-full border p-2 rounded"></select>

<!-- CALENDARIO -->
<div id="section-calendar" class="mb-6">
<h3 class="font-bold mb-2">Calendario</h3>
<div id="calendarFeed"></div>
</div>

<!-- CHAT -->
<div id="section-chat" class="flex flex-col h-[400px]">
<div id="chatBox" class="flex-1 border p-3 overflow-y-auto flex flex-col gap-2 bg-white rounded"></div>

<div class="flex mt-2">
<input id="msgInput" class="flex-1 border p-2 rounded-l" placeholder="Mensaje">
<button onclick="enviarMensaje()" class="bg-pink-500 text-white px-4 rounded-r">➤</button>
</div>
</div>

</div>

<script>
const firebaseConfig = {
apiKey: "AIzaSyATS0LI0XhWWyYEcVyncMWBkFutT-SlWQE",
authDomain: "app-academica-interna.firebaseapp.com",
projectId: "app-academica-interna"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let hijoActivo = null;
let unsubChat = null;
let unsubCal = null;

// LOGIN
async function validarAcceso(){
const email = document.getElementById('emailAcceso').value.trim().toLowerCase();

const doc = await db.collection('usuarios').doc(email).get();
if(!doc.exists || doc.data().rol !== 'familia') return alert("No autorizado");

localStorage.setItem('familiaEmail', email);

document.getElementById('loginScreen').classList.add('hidden');
document.getElementById('mainPanel').classList.remove('hidden');

document.getElementById('nombreTutor').innerText = doc.data().nombre;

const hijos = Array.isArray(doc.data().hijoID) ? doc.data().hijoID : [doc.data().hijoID];

const select = document.getElementById('selectorHijos');
select.innerHTML = "";

for(let id of hijos){
const h = await db.collection('alumnos').doc(id).get();
select.innerHTML += `<option value="${id}">${h.data().nombre}</option>`;
}

seleccionarHijo(hijos[0]);
}

// CAMBIAR HIJO
async function seleccionarHijo(id){
const h = await db.collection('alumnos').doc(id).get();
hijoActivo = {id: h.id, ...h.data()};

escucharCalendario();
escucharChat();
}

// CALENDARIO
function escucharCalendario(){
if(unsubCal) unsubCal();

unsubCal = db.collection('eventos')
.where('curso','in',['TODOS', hijoActivo.cursoID])
.orderBy('fecha','asc')
.onSnapshot(snap=>{
let html="";
snap.forEach(doc=>{
const e=doc.data();
html+=`<div class="border p-2 mb-2 rounded">${e.fecha} - ${e.titulo}</div>`;
});
document.getElementById('calendarFeed').innerHTML=html;
});
}

// CHAT
function escucharChat(){
if(unsubChat) unsubChat();

const email = localStorage.getItem('familiaEmail');

unsubChat = db.collection('mensajes')
.where('participantes','array-contains', email)
.where('alumnoID','==', hijoActivo.id)
.orderBy('fecha','asc')
.onSnapshot(snap=>{

let html="";
const box = document.getElementById('chatBox');

snap.forEach(doc=>{
const m=doc.data();
if(!m.fecha) return;

const esMio = m.emisorID === email;

html += `
<div class="max-w-[70%] p-2 rounded ${
esMio ? 'bg-pink-500 text-white self-end' : 'bg-gray-200 self-start'
}">
${m.texto}
</div>
`;
});

box.innerHTML = html;
box.scrollTop = box.scrollHeight;

});
}

// ENVIAR
async function enviarMensaje(){
const input = document.getElementById('msgInput');
const texto = input.value.trim();
if(!texto) return;

const email = localStorage.getItem('familiaEmail');
input.value="";

await db.collection('mensajes').add({
emisorID: email,
receptorID: "secretaria_primaria",
participantes:[email,"secretaria_primaria"],
alumnoID: hijoActivo.id,
texto:texto,
fecha: firebase.firestore.FieldValue.serverTimestamp()
});

// IA
if(texto.toLowerCase().includes("como va") || texto.toLowerCase().includes("desempeño")){
responderIA(texto);
}
}

// IA
async function responderIA(pregunta){
try{
const res = await fetch("https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=AIzaSyATS0LI0XhWWyYEcVyncMWBkFutT-SlWQE",{
method:"POST",
headers:{'Content-Type':'application/json'},
body: JSON.stringify({
contents:[{parts:[{text:`Sos secretaria escolar. Responde breve: ${pregunta}`}]}]
})
});

const data = await res.json();
const texto = data.candidates[0].content.parts[0].text;

const email = localStorage.getItem('familiaEmail');

await db.collection('mensajes').add({
emisorID:"secretaria_primaria",
receptorID:email,
participantes:[email,"secretaria_primaria"],
alumnoID: hijoActivo.id,
texto:texto,
fecha: firebase.firestore.FieldValue.serverTimestamp()
});

}catch(e){console.log(e);}
}

// AUTO LOGIN
window.onload = async ()=>{
const email = localStorage.getItem('familiaEmail');
if(email){
const doc = await db.collection('usuarios').doc(email).get();
if(doc.exists) validarAcceso();
}
}
</script>
</body>
</html>
