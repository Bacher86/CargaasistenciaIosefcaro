<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Docentes Pro - Iosef Caro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; padding-bottom: 110px; }
        .view-section { display: none; }
        .view-section.active { display: block; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; } to { transform: translateY(0); } }
        
        .btn-status { transition: all 0.2s ease; border: 2px solid transparent; }
        .btn-active-P { background: #10b981 !important; color: white !important; border-color: #059669; box-shadow: 0 4px 10px rgba(16, 185, 129, 0.3); }
        .btn-active-A { background: #f43f5e !important; color: white !important; border-color: #e11d48; box-shadow: 0 4px 10px rgba(244, 63, 94, 0.3); }
        .btn-active-T { background: #f59e0b !important; color: white !important; border-color: #d97706; box-shadow: 0 4px 10px rgba(245, 158, 11, 0.3); }
        
        .nav-active { color: #10b981 !important; border-top: 3px solid #10b981; background: #f0fdf4; }
        input, select, textarea { background: #f1f5f9 !important; border: none !important; border-radius: 1rem !important; padding: 0.75rem 1rem !important; font-size: 0.875rem !important; font-weight: 600 !important; outline: none; }
        .card-alumno { background: white; border-radius: 2rem; border: 1px solid #f1f5f9; transition: transform 0.2s; }
        .card-alumno:active { transform: scale(0.98); }
    </style>
</head>
<body>

    <header class="bg-white p-6 rounded-b-[2.5rem] shadow-sm border-b mb-6">
        <div class="flex justify-between items-center">
            <div>
                <h1 class="font-black text-2xl text-slate-800 tracking-tighter">Docente</h1>
                <p id="materiaLabel" class="text-[10px] font-bold text-emerald-500 uppercase tracking-widest mt-1 italic">Cargando materia...</p>
            </div>
            <div class="bg-emerald-50 p-3 rounded-2xl text-emerald-600"><i class="fas fa-book-open"></i></div>
        </div>

        <div class="mt-4 grid grid-cols-2 gap-2">
            <select id="sel-curso" onchange="actualizarFiltros()" class="w-full shadow-inner">
                <option value="1A">1° Año A</option>
                <option value="KINDER">Kinder</option>
            </select>
            <input type="text" id="busqueda" onkeyup="actualizarFiltros()" placeholder="Buscar alumno..." class="w-full shadow-inner">
        </div>
    </header>

    <main class="px-4 max-w-md mx-auto">
        
        <section id="view-asistencia" class="view-section active">
            <div class="flex justify-between items-center mb-4 ml-2">
                <h2 class="font-black text-slate-800">Pase de Lista</h2>
                <span class="text-[10px] font-black bg-slate-100 px-2 py-1 rounded-lg text-slate-500 uppercase" id="fechaHoy"></span>
            </div>
            <div id="lista-asistencia" class="grid gap-3"></div>
        </section>

        <section id="view-notas" class="view-section">
            <h2 class="font-black text-slate-800 mb-4 ml-2">Trimestres</h2>
            <div id="lista-notas" class="grid gap-3"></div>
        </section>

        <section id="view-informes" class="view-section">
            <h2 class="font-black text-slate-800 mb-4 ml-2">Informes de Seguimiento</h2>
            <div class="bg-white p-6 rounded-[2rem] border shadow-sm mb-6">
                <label class="text-[9px] font-black text-slate-400 uppercase ml-2">Alumno</label>
                <select id="inf-alumno" class="w-full mb-3"></select>
                <label class="text-[9px] font-black text-slate-400 uppercase ml-2">Tipo de Informe</label>
                <select id="inf-tipo" class="w-full mb-3">
                    <option value="Observación Positiva">🟢 Observación Positiva</option>
                    <option value="Llamado de atención">🟡 Llamado de atención</option>
                    <option value="Incumplimiento de Tarea">🔴 Tarea incompleta</option>
                </select>
                <textarea id="inf-detalle" class="w-full h-24 mb-3" placeholder="Detalle del informe..."></textarea>
                <button onclick="guardarInforme()" class="w-full bg-slate-800 text-white p-4 rounded-2xl font-black text-xs uppercase tracking-widest active:scale-95 transition-all">Guardar Informe</button>
            </div>
            <div id="historial-informes" class="grid gap-3"></div>
        </section>

    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around items-center h-20 shadow-2xl z-50 rounded-t-[2.5rem]">
        <button onclick="switchView('asistencia')" id="btn-asistencia" class="nav-btn nav-active flex flex-col items-center flex-1 py-2">
            <i class="fas fa-calendar-check"></i><span class="text-[8px] font-bold mt-1 uppercase">Presente</span>
        </button>
        <button onclick="switchView('notas')" id="btn-notas" class="nav-btn text-slate-300 flex flex-col items-center flex-1 py-2">
            <i class="fas fa-graduation-cap"></i><span class="text-[8px] font-bold mt-1 uppercase">Notas</span>
        </button>
        <button onclick="switchView('informes')" id="btn-informes" class="nav-btn text-slate-300 flex flex-col items-center flex-1 py-2">
            <i class="fas fa-clipboard-list"></i><span class="text-[8px] font-bold mt-1 uppercase">Informes</span>
        </button>
    </nav>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCLeGKE5NoGUQT0GRdMDIHn4zhxF3ZOp6k",
            authDomain: "app-academica-interna.firebaseapp.com",
            projectId: "app-academica-interna",
            storageBucket: "app-academica-interna.firebasestorage.app",
            messagingSenderId: "169882587504",
            appId: "1:169882587504:web:0fcdf32efdc81ad0a0bfb5"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // 1. CONFIGURACIÓN INICIAL
        let materiaActual = "Matemática"; // Esto vendría del login del docente
        let todosLosAlumnos = [];
        const hoy = new Date().toISOString().split('T')[0];
        document.getElementById('fechaHoy').innerText = hoy;
        document.getElementById('materiaLabel').innerText = materiaActual;

        function switchView(id) {
            document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => { b.classList.add('text-slate-300'); b.classList.remove('nav-active'); });
            document.getElementById('view-' + id).classList.add('active');
            document.getElementById('btn-' + id).classList.add('nav-active');
            document.getElementById('btn-' + id).classList.remove('text-slate-300');
            if(id === 'informes') cargarHistorialInformes();
        }

        // 2. CARGA DE DATOS
        db.collection('alumnos').onSnapshot(snap => {
            todosLosAlumnos = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            actualizarFiltros();
            
            // Llenar select de informes
            document.getElementById('inf-alumno').innerHTML = todosLosAlumnos.map(a => `<option value="${a.id}">${a.nombre} (${a.curso})</option>`).join('');
        });

        function actualizarFiltros() {
            const curso = document.getElementById('sel-curso').value;
            const buscar = document.getElementById('busqueda').value.toLowerCase();
            const filtrados = todosLosAlumnos.filter(a => a.curso === curso && a.nombre.toLowerCase().includes(buscar));
            
            renderAsistencia(filtrados);
            renderNotas(filtrados);
        }

        // 3. LÓGICA ASISTENCIA (P/A/T)
        async function renderAsistencia(alumnos) {
            const container = document.getElementById('lista-asistencia');
            // Obtener asistencia de hoy para marcar botones
            const asisHoy = await db.collection('asistencias').where('fecha', '==', hoy).get();
            const registrosHoy = {};
            asisHoy.forEach(d => registrosHoy[d.data().alumnoID] = d.data().estado);

            container.innerHTML = alumnos.map(a => `
                <div class="card-alumno p-5 flex justify-between items-center shadow-sm">
                    <p class="font-bold text-sm text-slate-700">${a.nombre}</p>
                    <div class="flex gap-2">
                        <button onclick="marcarAsistencia('${a.id}', 'P')" class="btn-status w-10 h-10 rounded-xl bg-slate-50 text-slate-400 font-black text-xs ${registrosHoy[a.id] === 'P' ? 'btn-active-P' : ''}">P</button>
                        <button onclick="marcarAsistencia('${a.id}', 'A')" class="btn-status w-10 h-10 rounded-xl bg-slate-50 text-slate-400 font-black text-xs ${registrosHoy[a.id] === 'A' ? 'btn-active-A' : ''}">A</button>
                        <button onclick="marcarAsistencia('${a.id}', 'T')" class="btn-status w-10 h-10 rounded-xl bg-slate-50 text-slate-400 font-black text-xs ${registrosHoy[a.id] === 'T' ? 'btn-active-T' : ''}">T</button>
                    </div>
                </div>
            `).join('');
        }

        async function marcarAsistencia(id, estado) {
            const docID = `${hoy}_${id}`;
            await db.collection('asistencias').doc(docID).set({
                alumnoID: id,
                fecha: hoy,
                estado: estado,
                materia: materiaActual
            });
            // Si es Ausente (A), también lo mandamos a la colección centralizada para la app de familia
            if(estado === 'A') {
                await db.collection('calificaciones').doc(id).set({
                    fechasFaltas: firebase.firestore.FieldValue.arrayUnion(hoy)
                }, { merge: true });
            }
        }

        // 4. LÓGICA NOTAS (CON PERSISTENCIA)
        async function renderNotas(alumnos) {
            const container = document.getElementById('lista-notas');
            container.innerHTML = alumnos.map(a => `
                <div class="card-alumno p-6 shadow-sm">
                    <p class="font-black text-xs text-slate-400 uppercase mb-3">${a.nombre}</p>
                    <div class="grid grid-cols-3 gap-3">
                        <div>
                            <label class="text-[8px] font-bold text-slate-400 ml-1">1° TRIM</label>
                            <input type="number" onchange="guardarNota('${a.id}', '1Trim', this.value)" class="w-full text-center py-3 bg-slate-50 rounded-xl">
                        </div>
                        <div>
                            <label class="text-[8px] font-bold text-slate-400 ml-1">2° TRIM</label>
                            <input type="number" onchange="guardarNota('${a.id}', '2Trim', this.value)" class="w-full text-center py-3 bg-slate-50 rounded-xl">
                        </div>
                        <div>
                            <label class="text-[8px] font-bold text-slate-400 ml-1">3° TRIM</label>
                            <input type="number" onchange="guardarNota('${a.id}', '3Trim', this.value)" class="w-full text-center py-3 bg-emerald-50 text-emerald-600 rounded-xl">
                        </div>
                    </div>
                </div>
            `).join('');
        }

        async function guardarNota(id, trim, valor) {
            if(!valor) return;
            const ref = db.collection('calificaciones').doc(id);
            await ref.set({
                notas: { [materiaActual]: { [trim]: parseInt(valor) } }
            }, { merge: true });
        }

        // 5. INFORMES CONDUCTA
        async function guardarInforme() {
            const id = document.getElementById('inf-alumno').value;
            const tipo = document.getElementById('inf-tipo').value;
            const det = document.getElementById('inf-detalle').value;
            if(!det) return alert("Escribe el detalle");

            await db.collection('informes').add({
                alumnoID: id,
                tipo: tipo,
                detalle: det,
                fecha: hoy,
                docente: "Prof. Iosef Caro"
            });
            alert("Informe guardado y enviado a familia");
            document.getElementById('inf-detalle').value = "";
            cargarHistorialInformes();
        }

        function cargarHistorialInformes() {
            db.collection('informes').orderBy('fecha', 'desc').limit(10).onSnapshot(snap => {
                document.getElementById('historial-informes').innerHTML = snap.docs.map(doc => `
                    <div class="bg-white p-4 rounded-2xl border-l-4 ${doc.data().tipo.includes('Positiva') ? 'border-emerald-500' : 'border-rose-500'} shadow-sm">
                        <div class="flex justify-between items-start">
                            <h4 class="text-xs font-black text-slate-800">${doc.data().tipo}</h4>
                            <span class="text-[8px] font-bold text-slate-300 uppercase">${doc.data().fecha}</span>
                        </div>
                        <p class="text-[10px] text-slate-500 mt-1">${doc.data().detalle}</p>
                    </div>
                `).join('');
            });
        }
    </script>
</body>
</html>
