<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asistencia Académica - Iosef Caro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
</head>
<body class="bg-slate-50 min-h-screen pb-24">

    <div id="loginScreen" class="fixed inset-0 bg-white z-50 flex flex-col items-center justify-center p-6 text-center">
        <div class="w-full max-w-sm">
            <h1 class="text-3xl font-bold text-slate-800 mb-2">Iosef Caro</h1>
            <p class="text-slate-500 mb-8">Gestión de Asistencia Interna</p>
            
            <div class="space-y-4">
                <input type="email" id="loginEmail" placeholder="Correo electrónico" 
                    class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-500">
                
                <input type="password" id="loginPass" placeholder="Contraseña" 
                    class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-500">
                
                <button onclick="loginManual()" id="btnLogin" class="w-full bg-slate-800 text-white font-bold py-4 rounded-2xl shadow-xl active:scale-95 transition-all">
                    Ingresar
                </button>
            </div>
            <p class="mt-6 text-xs text-slate-400">Acceso restringido a personal autorizado</p>
        </div>
    </div>

    <div id="appScreen" class="hidden max-w-md mx-auto p-4">
        <header class="py-6 flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold text-slate-800">Pase de Lista</h1>
                <p id="userMail" class="text-slate-500 text-xs italic">Cargando...</p>
            </div>
            <button onclick="logout()" class="bg-slate-200 text-slate-600 px-4 py-2 rounded-xl text-xs font-bold uppercase">Salir</button>
        </header>

        <div class="mb-6">
            <label class="text-xs font-bold text-slate-400 ml-2 mb-1 block uppercase">Seleccionar Curso</label>
            <select id="selectCurso" onchange="cargarAlumnosDesdeFirebase()" class="w-full p-4 bg-white border-0 shadow-sm rounded-2xl font-medium focus:ring-2 focus:ring-blue-500">
                <option value="5A">5to Año "A"</option>
                <option value="4B">4to Año "B"</option>
            </select>
        </div>

        <div class="bg-white rounded-3xl shadow-sm overflow-hidden border border-slate-100">
            <div id="listaAlumnos" class="divide-y divide-slate-50 text-slate-500 italic">
                <p class="p-8 text-center">Buscando alumnos en la nube...</p>
            </div>
        </div>

        <div class="fixed bottom-6 left-0 right-0 px-4">
            <button onclick="guardarAsistencia()" id="btnGuardar" class="w-full max-w-md mx-auto bg-blue-600 text-white font-bold py-4 rounded-2xl shadow-xl active:scale-95 transition-all">
                Guardar Asistencia
            </button>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN DE TU PROYECTO
        const firebaseConfig = {
            apiKey: "AIzaSyCLeGKE5NoGUQT0GRdMDIHn4zhxF3ZOp6k",
            authDomain: "app-academica-interna.firebaseapp.com",
            projectId: "app-academica-interna",
            storageBucket: "app-academica-interna.firebasestorage.app",
            messagingSenderId: "169882587504",
            appId: "1:169882587504:web:0fcdf32efdc81ad0a0bfb5"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        // --- GESTIÓN DE SESIÓN ---
        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('appScreen').classList.remove('hidden');
                document.getElementById('userMail').innerText = `Docente: ${user.email}`;
                cargarAlumnosDesdeFirebase();
            } else {
                document.getElementById('loginScreen').classList.remove('hidden');
                document.getElementById('appScreen').classList.add('hidden');
            }
        });

        async function loginManual() {
            const email = document.getElementById('loginEmail').value;
            const pass = document.getElementById('loginPass').value;
            const btn = document.getElementById('btnLogin');

            if(!email || !pass) return alert("Completa los datos");
            
            btn.innerText = "Verificando...";
            btn.disabled = true;

            try {
                await auth.signInWithEmailAndPassword(email, pass);
            } catch (error) {
                alert("Error: Usuario no autorizado o contraseña incorrecta.");
                btn.innerText = "Ingresar";
                btn.disabled = false;
            }
        }

        function logout() {
            auth.signOut();
        }

        // --- CARGA DE DATOS ---
        async function cargarAlumnosDesdeFirebase() {
            const curso = document.getElementById('selectCurso').value;
            const lista = document.getElementById('listaAlumnos');
            lista.innerHTML = '<p class="p-8 text-center text-slate-400">Actualizando lista...</p>';

            try {
                const snapshot = await db.collection('alumnos')
                    .where('cursoID', '==', curso)
                    .get();

                if (snapshot.empty) {
                    lista.innerHTML = '<p class="p-8 text-center text-red-400">No hay alumnos en el curso ' + curso + '</p>';
                    return;
                }

                lista.innerHTML = snapshot.docs.map(doc => {
                    const a = doc.data();
                    return `
                        <div class="flex items-center justify-between p-4 border-b border-slate-50 last:border-0">
                            <span class="text-slate-700 font-medium">${a.nombre}</span>
                            <select data-id="${doc.id}" class="estado bg-blue-50 text-blue-700 border-0 rounded-lg text-sm font-bold p-2 focus:ring-0">
                                <option value="P">Presente</option>
                                <option value="A">Ausente</option>
                                <option value="T">Tarde</option>
                                <option value="AJ">Ausente Just.</option>
                            </select>
                        </div>
                    `;
                }).join('');
            } catch (e) {
                lista.innerHTML = '<p class="p-8 text-center text-red-500">Error al leer la base de datos.</p>';
            }
        }

        // --- GUARDAR EN NUBE ---
        async function guardarAsistencia() {
            const btn = document.getElementById('btnGuardar');
            const curso = document.getElementById('selectCurso').value;
            const fecha = new Date().toISOString().split('T')[0];
            const registros = {};

            btn.disabled = true;
            btn.innerText = "Subiendo datos...";

            document.querySelectorAll('.estado').forEach(el => {
                registros[el.dataset.id] = el.value;
            });

            try {
                await db.collection('asistencias').doc(`${fecha}_${curso}`).set({
                    fecha,
                    curso,
                    estados: registros,
                    autor: auth.currentUser.email,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                alert('✅ ¡Asistencia guardada!');
            } catch (e) {
                alert('❌ Error al guardar. Revisa la conexión.');
            } finally {
                btn.disabled = false;
                btn.innerText = "Guardar Asistencia";
            }
        }
    </script>
</body>
</html>
