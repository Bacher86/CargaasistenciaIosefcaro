<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Académico Interno</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
</head>
<body class="bg-gray-100 min-h-screen">

    <div id="app" class="max-w-md mx-auto p-4">
        <header class="flex justify-between items-center py-6">
            <h1 class="text-2xl font-bold text-slate-800">Asistencia</h1>
            <button id="btnAdmin" class="hidden bg-slate-200 text-slate-600 px-3 py-1 rounded text-sm">Panel Admin</button>
        </header>

        <div class="mb-6">
            <label class="block text-sm font-medium text-gray-700 mb-2">Seleccionar Curso:</label>
            <select id="selectCurso" class="w-full p-3 bg-white border border-gray-300 rounded-xl shadow-sm focus:ring-2 focus:ring-blue-500">
                <option value="5A">5to Año "A"</option>
                <option value="4B">4to Año "B"</option>
            </select>
        </div>

        <div class="bg-white rounded-2xl shadow-sm overflow-hidden">
            <div id="listaAlumnos" class="divide-y divide-gray-100">
                </div>
        </div>

        <div class="fixed bottom-6 left-0 right-0 px-4">
            <button onclick="guardarAsistencia()" class="w-full max-w-md mx-auto bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl shadow-lg transition-transform active:scale-95">
                Confirmar y Guardar
            </button>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN DE FIREBASE
        const firebaseConfig = {
            apiKey: "TU_API_KEY",
            authDomain: "TU_PROYECTO.firebaseapp.com",
            projectId: "TU_PROYECTO",
            storageBucket: "TU_PROYECTO.appspot.com",
            messagingSenderId: "ID",
            appId: "APP_ID"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Datos de prueba (Luego se cargarán de Firebase)
        const alumnosEjemplo = [
            { id: '1', nombre: 'Alvarez, Juan' },
            { id: '2', nombre: 'García, María' },
            { id: '3', nombre: 'López, Pedro' },
            { id: '4', nombre: 'Martínez, Sofía' }
        ];

        function renderAlumnos() {
            const container = document.getElementById('listaAlumnos');
            container.innerHTML = alumnosEjemplo.map(alumno => `
                <div class="flex items-center justify-between p-4 hover:bg-gray-50">
                    <span class="font-medium text-gray-800">${alumno.nombre}</span>
                    <select data-id="${alumno.id}" class="estado-asistencia border-0 bg-blue-50 text-blue-700 font-semibold rounded-lg p-2 text-sm focus:ring-0">
                        <option value="P">Presente</option>
                        <option value="A">Ausente</option>
                        <option value="AJ">Ausente Just.</option>
                        <option value="T">Tarde</option>
                    </select>
                </div>
            `).join('');
        }

        async function guardarAsistencia() {
            const curso = document.getElementById('selectCurso').value;
            const fecha = new Date().toISOString().split('T')[0];
            const registros = {};

            document.querySelectorAll('.estado-asistencia').forEach(el => {
                registros[el.dataset.id] = el.value;
            });

            try {
                await db.collection('asistencias').doc(`${fecha}_${curso}`).set({
                    fecha: fecha,
                    curso: curso,
                    estados: registros,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                alert('✅ Asistencia guardada con éxito.');
            } catch (error) {
                console.error("Error al guardar:", error);
                alert('Error al guardar. Revisar consola.');
            }
        }

        renderAlumnos();
    </script>
</body>
</html>
