<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plataforma Iosef Caro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 min-h-screen">

    <div id="loginScreen" class="fixed inset-0 bg-slate-900 z-50 flex items-center justify-center p-6 text-center">
        <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-sm">
            <h1 class="text-3xl font-bold text-slate-800 mb-2">Iosef Caro</h1>
            <p class="text-slate-400 mb-8 font-medium italic text-sm">Portal del Docente</p>
            <div class="space-y-4 text-left">
                <input type="email" id="loginEmail" placeholder="Email" class="w-full p-4 bg-slate-100 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 transition-all">
                <input type="password" id="loginPass" placeholder="Contraseña" class="w-full p-4 bg-slate-100 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 transition-all">
                <button onclick="loginManual()" id="btnLogin" class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl hover:bg-blue-700 transition-all shadow-lg shadow-blue-200">Entrar</button>
            </div>
        </div>
    </div>

    <div id="appScreen" class="hidden flex min-h-screen">
        
        <aside class="w-20 md:w-64 bg-slate-900 text-white flex flex-col transition-all">
            <div class="p-6 text-center border-b border-slate-800">
                <span class="text-xl font-bold hidden md:inline">Iosef Caro</span>
                <span class="text-xl font-bold md:hidden">IC</span>
            </div>
            <nav class="flex-1 mt-6 px-3 space-y-2 text-sm">
                <button onclick="showSection('inicio')" class="flex items-center gap-4 w-full p-4 rounded-2xl hover:bg-slate-800 transition-all">
                    <i class="fa-solid fa-house text-lg"></i> <span class="hidden md:inline font-medium">Inicio</span>
                </button>
                <button onclick="showSection('asistencia')" class="flex items-center gap-4 w-full p-4 rounded-2xl hover:bg-slate-800 transition-all">
                    <i class="fa-solid fa-clipboard-user text-lg"></i> <span class="hidden md:inline font-medium text-left">Toma de Asistencia</span>
                </button>
                <button onclick="showSection('boletines')" class="flex items-center gap-4 w-full p-4 rounded-2xl hover:bg-slate-800 transition-all">
                    <i class="fa-solid fa-book-open text-lg"></i> <span class="hidden md:inline font-medium">Boletines</span>
                </button>
                <button onclick="showSection('informes')" class="flex items-center gap-4 w-full p-4 rounded-2xl hover:bg-slate-800 transition-all">
                    <i class="fa-solid fa-triangle-exclamation text-lg"></i> <span class="hidden md:inline font-medium text-left">Informes</span>
                </button>
            </nav>
            <div class="p-4 border-t border-slate-800">
                <button onclick="logout()" class="flex items-center gap-4 w-full p-4 rounded-2xl text-red-400 hover:bg-red-500/10 transition-all">
                    <i class="fa-solid fa-right-from-bracket text-lg"></i> <span class="hidden md:inline font-medium">Cerrar Sesión</span>
                </button>
            </div>
        </aside>

        <main class="flex-1 p-6 md:p-10 overflow-y-auto">
            
            <section id="sec-inicio" class="section-content">
                <div class="max-w-4xl">
                    <h2 class="text-3xl font-bold text-slate-800 mb-2">Bienvenido/a</h2>
                    <p id="userMail" class="text-slate-500 mb-10 italic"></p>
                    
                    <h3 class="font-bold text-slate-400 uppercase text-xs tracking-widest mb-4">Cursos asignados</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                            <div class="w-12 h-12 bg-blue-100 text-blue-600 rounded-2xl flex items-center justify-center mb-4 text-xl font-bold">5A</div>
                            <h4 class="font-bold text-slate-800">5to Año "A"</h4>
                            <p class="text-slate-400 text-sm">32 Alumnos registrados</p>
                        </div>
                        <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 opacity-50">
                            <div class="w-12 h-12 bg-slate-100 text-slate-400 rounded-2xl flex items-center justify-center mb-4 text-xl font-bold">+</div>
                            <h4 class="font-bold text-slate-800 italic text-sm">Solicitar acceso a otro curso</h4>
                        </div>
                    </div>
                </div>
            </section>

            <section id="sec-asistencia" class="section-content hidden">
                <div class="max-w-md">
                    <h2 class="text-2xl font-bold text-slate-800 mb-6 italic">Pase de Lista</h2>
                    <select id="selectCurso" onchange="cargarAlumnos()" class="w-full p-4 bg-white border border-slate-200 shadow-sm rounded-2xl font-medium mb-6">
                        <option value="" disabled selected>Elegir curso...</option>
                        <option value="5A">5to Año "A"</option>
                        <option value="4B">4to Año "B"</option>
                    </select>
                    <div id="listaAlumnos" class="bg-white rounded-3xl shadow-sm border border-slate-100 divide-y divide-slate-50">
                        </div>
                    <button onclick="guardarAsistencia()" id="btnGuardar" class="w-full mt-8 bg-blue-600 text-white font-bold py-4 rounded-2xl shadow-xl hover:bg-blue-700 transition-all">
                        Guardar Asistencia
                    </button>
                </div>
            </section>

            <section id="sec-boletines" class="section-content hidden">
                <div class="p-20 text-center text-slate-300">
                    <i class="fa-solid fa-lock text-5xl mb-4"></i>
                    <p class="font-medium italic">Módulo de Boletines en desarrollo...</p>
                </div>
            </section>
            <section id="sec-informes" class="section-content hidden">
                <div class="max-w-2xl">
                    <h2 class="text-3xl font-bold text-slate-800 mb-2">Informes y Sanciones</h2>
                    <p class="text-slate-500 mb-8 italic text-sm">Registrar incidencias en el legajo digital del alumno.</p>

                    <div class="bg-white p-8 rounded-3xl shadow-sm border border-slate-100 space-y-6">
                        
                        <div>
                            <label class="text-xs font-bold text-slate-400 uppercase tracking-widest ml-1 mb-2 block">1. Buscar Alumno</label>
                            <div class="relative">
                                <input type="text" id="busquedaAlumno" onkeyup="buscarAlumnoInforme()" placeholder="Escribe el apellido..." class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-orange-500 transition-all">
                                <div id="sugerencias" class="absolute z-10 w-full bg-white shadow-xl rounded-2xl mt-2 max-h-60 overflow-y-auto border border-slate-100 hidden"></div>
                            </div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <label class="text-xs font-bold text-slate-400 uppercase tracking-widest ml-1 mb-2 block">2. Tipo de Falta</label>
                                <select id="tipoInforme" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none">
                                    <option value="Sanción Disciplinaria">Sanción Disciplinaria</option>
                                    <option value="Falta de Atención">Falta de Atención</option>
                                    <option value="Uniforme / Material">Uniforme / Material</option>
                                    <option value="Nota Positiva">Nota Positiva</option>
                                </select>
                            </div>
                            <div>
                                <label class="text-xs font-bold text-slate-400 uppercase tracking-widest ml-1 mb-2 block">3. Cantidad / Puntos</label>
                                <input type="number" id="cantInforme" value="1" min="1" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl text-center font-bold">
                            </div>
                        </div>

                        <div>
                            <label class="text-xs font-bold text-slate-400 uppercase tracking-widest ml-1 mb-2 block">4. Observaciones</label>
                            <textarea id="detalleInforme" rows="3" placeholder="Describe lo sucedido..." class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-orange-500 transition-all"></textarea>
                        </div>

                        <input type="hidden" id="idAlumnoInforme">
                        <button onclick="enviarInforme()" id="btnInforme" class="w-full bg-orange-500 text-white font-bold py-4 rounded-2xl shadow-lg shadow-orange-100 hover:bg-orange-600 transition-all active:scale-95">
                            Subir al Legajo
                        </button>
                    </div>
                </div>
            </section>

        </main>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCLeGKE5NoGUQT0GRdMDIHn4zhxF3ZOp6k",
            authDomain: "app-academica-interna.firebaseapp.com",
            projectId: "app-academica-interna",
            storageBucket: "app-academica-interna.firebasestorage.app",
            messagingSenderId: "169882587504",
            appId: "1:169882587504:web:0fcdf32efdc81ad0a0bfb5"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        // NAVEGACIÓN
        function showSection(id) {
            document.querySelectorAll('.section-content').forEach(s => s.classList.add('hidden'));
            document.getElementById('sec-' + id).classList.remove('hidden');
        }

        // SESIÓN
        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('appScreen').classList.remove('hidden');
                document.getElementById('userMail').innerText = `Docente: ${user.email}`;
                showSection('inicio');
            } else {
                document.getElementById('loginScreen').classList.remove('hidden');
                document.getElementById('appScreen').classList.add('hidden');
            }
        });

        async function loginManual() {
            const email = document.getElementById('loginEmail').value;
            const pass = document.getElementById('loginPass').value;
            try { await auth.signInWithEmailAndPassword(email, pass); } 
            catch (e) { alert("Credenciales incorrectas"); }
        }

        function logout() { auth.signOut(); }

        // FUNCIONES DE ASISTENCIA (MISMA LÓGICA DE ANTES)
        async function cargarAlumnos() {
            const curso = document.getElementById('selectCurso').value;
            const lista = document.getElementById('listaAlumnos');
            lista.innerHTML = '<p class="p-8 text-center text-slate-400 italic">Buscando alumnos...</p>';
            const snap = await db.collection('alumnos').where('cursoID', '==', curso).get();
            if(snap.empty) { lista.innerHTML = '<p class="p-8 text-center text-red-400 italic">No hay alumnos en este curso.</p>'; return; }
            lista.innerHTML = snap.docs.map(doc => `
                <div class="flex items-center justify-between p-4">
                    <span class="text-slate-700 font-medium">${doc.data().nombre}</span>
                    <select data-id="${doc.id}" class="estado bg-slate-100 rounded-lg text-xs font-bold p-2">
                        <option value="P">Presente</option>
                        <option value="A">Ausente</option>
                    </select>
                </div>
            `).join('');
        }

        async function guardarAsistencia() {
            const btn = document.getElementById('btnGuardar');
            const curso = document.getElementById('selectCurso').value;
            if(!curso) return alert("Elige un curso");
            btn.disabled = true;
            btn.innerText = "Guardando...";
            const registros = {};
            document.querySelectorAll('.estado').forEach(el => registros[el.dataset.id] = el.value);
            try {
                await db.collection('asistencias').doc(`${new Date().toISOString().split('T')[0]}_${curso}`).set({
                    fecha: new Date().toISOString().split('T')[0],
                    curso, estados: registros, autor: auth.currentUser.email
                });
                alert("Asistencia guardada");
                showSection('inicio');
            } catch (e) { alert("Error al guardar"); }
            finally { btn.disabled = false; btn.innerText = "Guardar Asistencia"; }
        }
        // --- LÓGICA DE INFORMES ---
        let idSeleccionado = "";

        async function buscarAlumnoInforme() {
            const input = document.getElementById('busquedaAlumno').value.toLowerCase();
            const sugerencias = document.getElementById('sugerencias');
            if (input.length < 2) { sugerencias.classList.add('hidden'); return; }

            const snap = await db.collection('alumnos').get();
            const filtrados = snap.docs.filter(d => d.data().nombre.toLowerCase().includes(input));

            if (filtrados.length > 0) {
                sugerencias.classList.remove('hidden');
                sugerencias.innerHTML = filtrados.map(d => `
                    <div onclick="seleccionarParaInforme('${d.id}', '${d.data().nombre}')" class="p-4 hover:bg-orange-50 cursor-pointer border-b border-slate-50 last:border-0 flex justify-between items-center">
                        <span class="font-medium text-slate-700">${d.data().nombre}</span>
                        <span class="text-xs bg-slate-100 px-2 py-1 rounded text-slate-500">${d.data().cursoID}</span>
                    </div>
                `).join('');
            } else {
                sugerencias.innerHTML = '<p class="p-4 text-slate-400 italic">No se encontraron alumnos</p>';
            }
        }

        function seleccionarParaInforme(id, nombre) {
            idSeleccionado = id;
            document.getElementById('busquedaAlumno').value = nombre;
            document.getElementById('sugerencias').classList.add('hidden');
        }

        async function enviarInforme() {
            const tipo = document.getElementById('tipoInforme').value;
            const cant = document.getElementById('cantInforme').value;
            const det = document.getElementById('detalleInforme').value;
            const btn = document.getElementById('btnInforme');

            if(!idSeleccionado || !det) return alert("Completa el alumno y el detalle");

            btn.disabled = true; btn.innerText = "Registrando...";

            try {
                await db.collection('informes').add({
                    alumnoID: idSeleccionado,
                    alumnoNombre: document.getElementById('busquedaAlumno').value,
                    tipo,
                    cantidad: parseInt(cant),
                    detalle: det,
                    fecha: new Date().toISOString().split('T')[0],
                    autor: auth.currentUser.email,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                alert("✅ Informe guardado correctamente");
                // Limpiar
                document.getElementById('busquedaAlumno').value = "";
                document.getElementById('detalleInforme').value = "";
                idSeleccionado = "";
                showSection('inicio');
            } catch (e) { alert("Error al subir informe"); }
            finally { btn.disabled = false; btn.innerText = "Subir al Legajo"; }
        }
    </script>
</body>
</html>
