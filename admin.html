<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Panel de Control Escolar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .admin-tab { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-100 min-h-screen flex">

    <aside class="w-64 bg-slate-900 text-white p-6 hidden md:block flex-shrink-0">
        <div class="mb-8">
            <h1 class="text-xl font-bold text-blue-400 text-center">Control Central</h1>
            <p class="text-[10px] text-slate-500 uppercase tracking-widest text-center mt-1">Gestión Institucional</p>
        </div>
        <nav class="space-y-2">
            <button onclick="tab('alumnos')" class="flex items-center w-full p-3 hover:bg-slate-800 rounded-xl transition-all">
                <i class="fa-solid fa-graduation-cap mr-3 text-blue-400"></i> Alumnos
            </button>
            <button onclick="tab('cursos')" class="flex items-center w-full p-3 hover:bg-slate-800 rounded-xl transition-all">
                <i class="fa-solid fa-chalkboard mr-3 text-green-400"></i> Cursos
            </button>
            <button onclick="tab('docentes')" class="flex items-center w-full p-3 hover:bg-slate-800 rounded-xl transition-all">
                <i class="fa-solid fa-user-tie mr-3 text-purple-400"></i> Docentes
            </button>
            <div class="border-t border-slate-800 my-4"></div>
            <button onclick="tab('familias')" class="flex items-center w-full p-3 hover:bg-slate-800 rounded-xl transition-all">
                <i class="fa-solid fa-people-group mr-3 text-orange-400"></i> Familias
            </button>
            <button onclick="tab('comunicacion')" class="flex items-center w-full p-3 hover:bg-slate-800 rounded-xl transition-all">
                <i class="fa-solid fa-bullhorn mr-3 text-pink-400"></i> Comunicación
            </button>
        </nav>
    </aside>

    <main class="flex-1 p-8 overflow-y-auto">
        
        <section id="tab-alumnos" class="admin-tab">
            <h2 class="text-2xl font-bold text-slate-800 mb-6">Gestión de Alumnos</h2>
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200 mb-8">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <input type="text" id="nombreAlumno" placeholder="Nombre Completo" class="p-3 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                    <select id="cursoAlumno" class="p-3 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="">Cargando cursos...</option>
                    </select>
                    <button onclick="crearAlumno()" class="bg-blue-600 text-white font-bold py-3 rounded-xl hover:bg-blue-700 transition-all">Registrar Alumno</button>
                </div>
            </div>
            <div id="tablaAlumnos" class="bg-white rounded-3xl shadow-sm overflow-hidden border border-slate-200"></div>
        </section>

        <section id="tab-cursos" class="admin-tab hidden">
            <h2 class="text-2xl font-bold text-slate-800 mb-6">Configuración de Cursos</h2>
            </section>

        <section id="tab-docentes" class="admin-tab hidden">
            </section>

        <section id="tab-familias" class="admin-tab hidden">
            <h2 class="text-2xl font-bold text-slate-800 mb-6">Vinculación de Familias</h2>
            <div class="bg-white p-8 rounded-3xl shadow-sm border border-slate-200 max-w-2xl">
                <div class="space-y-4">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-bold text-slate-400 mb-2 uppercase">Email Responsable</label>
                            <input type="email" id="emailFamilia" placeholder="papa-mama@email.com" class="w-full p-3 bg-slate-50 border rounded-xl outline-none">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-400 mb-2 uppercase">Nombre Tutor</label>
                            <input type="text" id="nombreFamilia" placeholder="Nombre completo" class="w-full p-3 bg-slate-50 border rounded-xl outline-none">
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-400 mb-2 uppercase">Asignar Hijo/a (Alumno)</label>
                        <select id="selectHijo" class="w-full p-3 bg-slate-50 border rounded-xl outline-none"></select>
                    </div>
                    <button onclick="registrarFamilia()" class="w-full bg-orange-500 text-white font-bold py-4 rounded-xl shadow-lg shadow-orange-100 hover:bg-orange-600 transition-all">
                        Crear Cuenta de Familia
                    </button>
                </div>
            </div>
        </section>

        <section id="tab-comunicacion" class="admin-tab hidden">
            <h2 class="text-2xl font-bold text-slate-800 mb-6">Muro de Comunicación</h2>
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <div class="bg-white p-8 rounded-3xl shadow-sm border border-slate-200">
                    <h3 class="font-bold text-slate-700 mb-4">Nueva Publicación</h3>
                    <div class="space-y-4">
                        <input type="text" id="tituloPost" placeholder="Título del comunicado" class="w-full p-3 bg-slate-50 border rounded-xl outline-none font-bold">
                        <textarea id="contenidoPost" rows="4" placeholder="¿Qué está pasando en la escuela?" class="w-full p-3 bg-slate-50 border rounded-xl outline-none"></textarea>
                        
                        <div class="flex gap-2">
                            <select id="tagPost" class="p-3 bg-slate-50 border rounded-xl outline-none text-sm">
                                <option value="TODOS">Toda la Escuela</option>
                            </select>
                            <button onclick="mejorarConIA(event)" class="bg-indigo-100 text-indigo-600 px-4 rounded-xl font-bold text-xs hover:bg-indigo-200 transition-all py-2">
    <i class="fa-solid fa-wand-magic-sparkles mr-1"></i> Pulir con IA
</button>
                        </div>

                        <button onclick="publicarFeed()" class="w-full bg-pink-500 text-white font-bold py-4 rounded-xl shadow-lg shadow-pink-100 hover:bg-pink-600 transition-all">
                            Publicar en el Muro
                        </button>
                    </div>
                </div>

                <div class="space-y-4" id="previewFeed">
                    </div>
            </div>
        </section>

    </main>

    <script>
        // Configuración de Firebase (Se mantiene la tuya)
        const firebaseConfig = {
            apiKey: "AIzaSyCLeGKE5NoGUQT0GRdMDIHn4zhxF3ZOp6k",
            authDomain: "app-academica-interna.firebaseapp.com",
            projectId: "app-academica-interna",
            storageBucket: "app-academica-interna.firebasestorage.app",
            messagingSenderId: "169882587504",
            appId: "1:169882587504:web:0fcdf32efdc81ad0a0bfb5"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function tab(id) {
            document.querySelectorAll('.admin-tab').forEach(t => t.classList.add('hidden'));
            document.getElementById('tab-' + id).classList.remove('hidden');
        }

        // --- GESTIÓN DE FAMILIAS ---
        async function registrarFamilia() {
            const email = document.getElementById('emailFamilia').value.trim().toLowerCase();
            const nombre = document.getElementById('nombreFamilia').value.trim();
            const hijoID = document.getElementById('selectHijo').value;

            if(!email || !nombre || !hijoID) return alert("Completa todos los campos");

            try {
                await db.collection('usuarios').doc(email).set({
                    nombre: nombre,
                    rol: 'familia',
                    hijoID: hijoID, // Podría ser un array si tiene varios
                }, { merge: true });
                alert("Familia registrada con éxito");
                document.getElementById('emailFamilia').value = "";
            } catch (e) { alert("Error al registrar familia"); }
        }

        // --- FEED DE COMUNICACIÓN ---
        async function publicarFeed() {
            const titulo = document.getElementById('tituloPost').value;
            const texto = document.getElementById('contenidoPost').value;
            const tag = document.getElementById('tagPost').value;

            if(!titulo || !texto) return alert("Escribí algo antes de publicar");

            try {
                await db.collection('comunicados').add({
                    titulo,
                    texto,
                    tag,
                    fecha: new Date().toISOString(),
                    likes: 0
                });
                document.getElementById('tituloPost').value = "";
                document.getElementById('contenidoPost').value = "";
                alert("¡Publicado!");
            } catch (e) { alert("Error al publicar"); }
        }

        function escucharFeed() {
            db.collection('comunicados').orderBy('fecha', 'desc').onSnapshot(snap => {
                const feed = document.getElementById('previewFeed');
                feed.innerHTML = snap.docs.map(doc => `
                    <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm relative">
                        <span class="absolute top-4 right-4 text-[9px] font-black bg-slate-100 px-2 py-1 rounded text-slate-500 uppercase">${doc.data().tag}</span>
                        <h4 class="font-bold text-slate-800 pr-12">${doc.data().titulo}</h4>
                        <p class="text-sm text-slate-600 mt-2">${doc.data().texto}</p>
                        <div class="mt-4 flex items-center text-xs text-slate-400 gap-4">
                            <span><i class="fa-solid fa-calendar mr-1"></i> ${doc.data().fecha.split('T')[0]}</span>
                            <span><i class="fa-solid fa-heart mr-1"></i> ${doc.data().likes}</span>
                        </div>
                    </div>
                `).join('');
            });
        }

       async function mejorarConIA(event) {
            const tituloInput = document.getElementById('tituloPost');
            const contenidoInput = document.getElementById('contenidoPost');
            // Usamos event.currentTarget para asegurarnos de capturar el botón
            const btnIA = event.currentTarget; 

            if (!contenidoInput.value) return alert("Escribí algo en el contenido primero.");

            const textoOriginalBtn = btnIA.innerHTML;
            btnIA.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-1"></i> Procesando...';
            btnIA.disabled = true;

            const prompt = `Actúa como un directivo escolar. Mejora este comunicado para que sea formal y cordial. 
            Responde SOLO con el texto mejorado.
            Borrador: ${contenidoInput.value}`;

            try {
                const API_KEY = "AIzaSyATS0LI0XhWWyYEcVyncMWBkFutT-SlWQE"; 
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;
                
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }]
                    })
                });

                const data = await response.json();
                
                // Si la API devuelve un error, lo capturamos aquí
                if (data.error) {
                    console.error("Error de la API:", data.error);
                    throw new Error(data.error.message);
                }

                if (data.candidates && data.candidates[0].content.parts[0].text) {
                    contenidoInput.value = data.candidates[0].content.parts[0].text.trim();
                }

            } catch (e) {
                console.error("Error completo:", e);
                alert("Error: " + e.message);
            } finally {
                btnIA.innerHTML = textoOriginalBtn;
                btnIA.disabled = false;
            }
        }

        // Llenar select de hijos y tags
        function cargarSelects() {
            db.collection('alumnos').orderBy('nombre').onSnapshot(snap => {
                const selectHijo = document.getElementById('selectHijo');
                selectHijo.innerHTML = snap.docs.map(doc => `<option value="${doc.id}">${doc.data().nombre} (${doc.data().cursoID})</option>`).join('');
            });

            db.collection('cursos').onSnapshot(snap => {
                const tagPost = document.getElementById('tagPost');
                let options = '<option value="TODOS">Toda la Escuela</option>';
                snap.forEach(doc => options += `<option value="${doc.id}">Solo ${doc.id}</option>`);
                tagPost.innerHTML = options;
            });
        }

        // Inicializar
        escucharFeed();
        cargarSelects();
        // (Tus funciones existentes de escucharCursos y escucharAlumnos)
    </script>
</body>
</html>
