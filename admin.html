<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control - Iosef Caro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
</head>
<body class="bg-slate-100 font-sans">

    <div class="max-w-4xl mx-auto p-6">
        <h1 class="text-3xl font-bold text-slate-800 mb-6">Panel de Administración</h1>

        <div class="bg-white p-6 rounded-2xl shadow-sm mb-6">
            <h2 class="text-xl font-bold mb-4 text-blue-600">Agregar Nuevo Alumno</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <input type="text" id="nuevoNombre" placeholder="Apellido y Nombre" class="p-3 border rounded-xl">
                <select id="nuevoCurso" class="p-3 border rounded-xl">
                    <option value="5A">5to Año A</option>
                    <option value="4A">4to Año A</option>
                    </select>
                <button onclick="crearAlumno()" class="bg-blue-600 text-white p-3 rounded-xl font-bold hover:bg-blue-700">
                    Cargar Alumno
                </button>
            </div>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-sm">
            <h2 class="text-xl font-bold mb-4 text-slate-700">Consultar Historial</h2>
            <div class="flex gap-4 mb-4">
                <input type="date" id="fechaFiltro" class="p-2 border rounded-lg">
                <button onclick="consultarFecha()" class="bg-slate-800 text-white px-6 rounded-lg">Ver Datos</button>
            </div>
            <div id="resultadoHistorial" class="text-slate-500 italic">Los reportes aparecerán aquí...</div>
        </div>
    </div>

    <script>
        // PEGA AQUÍ TUS MISMAS CREDENCIALES DE FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyCLeGKE5NoGUQT0GRdMDIHn4zhxF3ZOp6k",
            authDomain: "app-academica-interna.firebaseapp.com",
            projectId: "app-academica-interna",
            storageBucket: "app-academica-interna.firebasestorage.app",
            messagingSenderId: "169882587504",
            appId: "1:169882587504:web:0fcdf32efdc81ad0a0bfb5"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        async function crearAlumno() {
            const nombre = document.getElementById('nuevoNombre').value;
            const cursoID = document.getElementById('nuevoCurso').value;

            if(!nombre) return alert("Pon un nombre");

            try {
                await db.collection('alumnos').add({
                    nombre: nombre,
                    cursoID: cursoID
                });
                alert("Alumno cargado con éxito");
                document.getElementById('nuevoNombre').value = "";
            } catch(e) {
                alert("Error al cargar");
            }
        }
    </script>
</body>
</html>
