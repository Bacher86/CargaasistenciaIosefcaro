<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Panel de Control Escolar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-storage-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .admin-tab { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .sidebar-btn.active { background: #1e293b; border-left: 4px solid #3b82f6; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen flex">

    <aside class="w-64 bg-slate-900 text-white p-6 hidden md:block flex-shrink-0">
        <div class="mb-8">
            <h1 class="text-xl font-bold text-blue-400 text-center">Control Central</h1>
            <p class="text-[10px] text-slate-500 uppercase tracking-widest text-center mt-1">Gestión Institucional</p>
        </div>
        <nav class="space-y-2">
            <button onclick="tab('alumnos')" class="sidebar-btn flex items-center w-full p-3 hover:bg-slate-800 rounded-xl transition-all">
                <i class="fa-solid fa-graduation-cap mr-3 text-blue-400"></i> Alumnos
            </button>
            <button onclick="tab('cursos')" class="sidebar-btn flex items-center w-full p-3 hover:bg-slate-800 rounded-xl transition-all">
                <i class="fa-solid fa-chalkboard mr-3 text-green-400"></i> Cursos
            </button>
            <button onclick="tab('docentes')" class="sidebar-btn flex items-center w-full p-3 hover:bg-slate-800 rounded-xl transition-all">
                <i class="fa-solid fa-user-tie mr-3 text-purple-400"></i> Docentes
            </button>
            <div class="border-t border-slate-800 my-4"></div>
            <button onclick="tab('familias')" class="sidebar-btn flex items-center w-full p-3 hover:bg-slate-800 rounded-xl transition-all">
                <i class="fa-solid fa-people-group mr-3 text-orange-400"></i> Familias
            </button>
            <button onclick="tab('comunicacion')" class="sidebar-btn flex items-center w-full p-3 hover:bg-slate-800 rounded-xl transition-all">
                <i class="fa-solid fa-bullhorn mr-3 text-pink-400"></i> Comunicación
            </button>
        </nav>
    </aside>

    <main class="flex-1 p-8 overflow-y-auto">
        
        <section id="tab-alumnos" class="admin-tab">
            <h2 class="text-2xl font-bold text-slate-800 mb-6">Gestión de Alumnos</h2>
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200 mb-8">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <input type="text" id="nombreAlumno" placeholder="Nombre Completo" class="p-3 bg-slate-50 border rounded-xl outline-none">
                    <select id="cursoAlumno" class="p-3 bg-slate-50 border rounded-xl outline-none font-bold text-slate-600">
                        <option value="">Cargando cursos...</option>
                    </select>
                    <button onclick="crearAlumno()" class="bg-blue-600 text-white font-bold py-3 rounded-xl hover:bg-blue-700 transition-all">Registrar Alumno</button>
                </div>
            </div>
            <div id="tablaAlumnos" class="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden"></div>
        </section>

        <section id="tab-cursos" class="admin-tab hidden">
            <h2 class="text-2xl font-bold text-slate-800 mb-6">Configuración de Cursos</h2>
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200 mb-8">
                <div class="flex gap-4">
                    <input type="text" id="nombreCurso" placeholder="Ej: 1° Año A, Sala Verde..." class="flex-1 p-3 bg-slate-50 border rounded-xl outline-none">
                    <button onclick="crearCurso()" class="bg-green-600 text-white font-bold px-8 py-3 rounded-xl hover:bg-green-700 transition-all">Crear Curso</button>
                </div>
            </div>
            <div id="listaCursos" class="grid grid-cols-1 md:grid-cols-4 gap-4"></div>
        </section>

        <section id="tab-docentes" class="admin-tab hidden">
            <h2 class="text-2xl font-bold text-slate-800 mb-6">Gestión de Docentes</h2>
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200 mb-8">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <input type="text" id="nombreDocente" placeholder="Nombre del Docente" class="p-3 bg-slate-50 border rounded-xl outline-none">
                    <input type="email" id="emailDocente" placeholder="email@escuela.com" class="p-3 bg-slate-50 border rounded-xl outline-none">
                    <button onclick="registrarDocente()" class="bg-purple-600 text-white font-bold py-3 rounded-xl hover:bg-purple-700 transition-all">Alta Docente</button>
                </div>
            </div>
            <div id="tablaDocentes" class="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden"></div>
        </section>

        <section id="tab-familias" class="admin-tab hidden">
            <h2 class="text-2xl font-bold text-slate-800 mb-6">Vinculación de Familias</h2>
            <div class="bg-white p-8 rounded-3xl shadow-sm border border-slate-200 max-w-2xl">
                <div class="space-y-4">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-bold text-slate-400 mb-2 uppercase">Email Responsable</label>
                            <input type="email" id="emailFamilia" placeholder="papa-mama@email.com" class="w-full p-3 bg-slate-50 border rounded-xl outline-none">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-400 mb-2 uppercase">Nombre Tutor</label>
                            <input type="text" id="nombreFamilia" placeholder="Nombre completo" class="w-full p-3 bg-slate-50 border rounded-xl outline-none">
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-400 mb-2 uppercase">Asignar Hijo/a (Alumno)</label>
                        <select id="selectHijo" class="w-full p-3 bg-slate-50 border rounded-xl outline-none"></select>
                    </div>
                    <button onclick="registrarFamilia()" class="w-full bg-orange-500 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-orange-600 transition-all">Crear Cuenta de Familia</button>
                </div>
            </div>
        </section>

        <section id="tab-comunicacion" class="admin-tab hidden">
            <h2 class="text-2xl font-bold text-slate-800 mb-6">Muro de Comunicación</h2>
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <div class="bg-white p-8 rounded-3xl shadow-sm border border-slate-200 h-fit space-y-4">
                    <input type="text" id="tituloPost" placeholder="Título del comunicado" class="w-full p-3 bg-slate-50 border rounded-xl outline-none font-bold">
                    <textarea id="contenidoPost" rows="4" placeholder="¿Qué está pasando en la escuela?" class="w-full p-3 bg-slate-50 border rounded-xl outline-none"></textarea>
                    
                    <div class="flex flex-wrap gap-2 p-2 bg-slate-50 rounded-2xl border border-dashed border-slate-300">
                        <label class="flex items-center gap-2 px-3 py-2 bg-white border rounded-xl cursor-pointer hover:bg-blue-50 text-[10px] font-bold">
                            <i class="fa-solid fa-image text-blue-500"></i> Imagen <input type="file" id="adjuntoImagen" accept="image/*" class="hidden" onchange="previewFile(this)">
                        </label>
                        <label class="flex items-center gap-2 px-3 py-2 bg-white border rounded-xl cursor-pointer hover:bg-purple-50 text-[10px] font-bold">
                            <i class="fa-solid fa-video text-purple-500"></i> Video <input type="file" id="adjuntoVideo" accept="video/*" class="hidden" onchange="previewFile(this)">
                        </label>
                        <label class="flex items-center gap-2 px-3 py-2 bg-white border rounded-xl cursor-pointer hover:bg-orange-50 text-[10px] font-bold">
                            <i class="fa-solid fa-file-pdf text-orange-500"></i> PDF <input type="file" id="adjuntoDoc" accept=".pdf" class="hidden" onchange="previewFile(this)">
                        </label>
                    </div>
                    <div id="fileInfo" class="text-[10px] text-indigo-500 font-bold italic px-2"></div>

                    <div class="grid grid-cols-2 gap-2">
                        <input type="datetime-local" id="fechaProgramada" class="w-full p-2 bg-slate-50 border rounded-xl text-xs outline-none">
                        <select id="tagPost" class="w-full p-2 bg-slate-50 border rounded-xl text-xs outline-none font-bold">
                            <option value="TODOS">Toda la Escuela</option>
                        </select>
                    </div>

                    <div class="flex gap-2">
                        <button onclick="mejorarConIA(event)" class="flex-1 bg-indigo-50 text-indigo-600 py-3 rounded-xl font-bold text-xs hover:bg-indigo-100 transition-all">IA Pulir</button>
                        <button onclick="publicarFeed()" class="flex-[2] bg-pink-500 text-white font-bold py-3 rounded-xl hover:bg-pink-600 shadow-lg">Publicar Ahora</button>
                    </div>
                </div>
                <div id="previewFeed" class="space-y-4"></div>
            </div>
        </section>

    </main>

    <script>
        // CONFIGURACIÓN FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyCLeGKE5NoGUQT0GRdMDIHn4zhxF3ZOp6k",
            authDomain: "app-academica-interna.firebaseapp.com",
            projectId: "app-academica-interna",
            storageBucket: "app-academica-interna.firebasestorage.app",
            messagingSenderId: "169882587504",
            appId: "1:169882587504:web:0fcdf32efdc81ad0a0bfb5"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const storage = firebase.storage();

        // NAVEGACIÓN
        function tab(id) {
            document.querySelectorAll('.admin-tab').forEach(t => t.classList.add('hidden'));
            document.getElementById('tab-' + id).classList.remove('hidden');
            document.querySelectorAll('.sidebar-btn').forEach(b => b.classList.remove('active'));
            event.currentTarget.classList.add('active');
        }

        // --- FUNCIONES CURSOS ---
        async function crearCurso() {
            const nombre = document.getElementById('nombreCurso').value.trim().toUpperCase();
            if(!nombre) return alert("Nombre de curso vacío");
            await db.collection('cursos').doc(nombre).set({ nombre });
            document.getElementById('nombreCurso').value = "";
        }

        function escucharCursos() {
            db.collection('cursos').onSnapshot(snap => {
                const lista = document.getElementById('listaCursos');
                const cursoAlumnos = document.getElementById('cursoAlumno');
                const tagPost = document.getElementById('tagPost');
                
                let html = "", options = '<option value="">Elegir curso...</option>', tags = '<option value="TODOS">Toda la Escuela</option>';
                
                snap.forEach(doc => {
                    html += `<div class="bg-white p-4 rounded-2xl border border-slate-200 flex justify-between items-center shadow-sm">
                        <span class="font-bold text-slate-700">${doc.id}</span>
                        <button onclick="borrar('cursos', '${doc.id}')" class="text-red-400 hover:text-red-600"><i class="fa-solid fa-trash text-xs"></i></button>
                    </div>`;
                    options += `<option value="${doc.id}">${doc.id}</option>`;
                    tags += `<option value="${doc.id}">Solo ${doc.id}</option>`;
                });
                lista.innerHTML = html;
                cursoAlumnos.innerHTML = options;
                tagPost.innerHTML = tags;
            });
        }

        // --- FUNCIONES ALUMNOS ---
        async function crearAlumno() {
            const nombre = document.getElementById('nombreAlumno').value;
            const cursoID = document.getElementById('cursoAlumno').value;
            if(!nombre || !cursoID) return alert("Faltan datos");
            await db.collection('alumnos').add({ nombre, cursoID });
            document.getElementById('nombreAlumno').value = "";
        }

        function escucharAlumnos() {
            db.collection('alumnos').onSnapshot(snap => {
                const tabla = document.getElementById('tablaAlumnos');
                const selectHijo = document.getElementById('selectHijo');
                let html = '<table class="w-full text-left"><thead class="bg-slate-50 text-[10px] uppercase text-slate-400 font-black"><tr><th class="p-4">Nombre</th><th class="p-4">Curso</th><th class="p-4">Acción</th></tr></thead><tbody class="divide-y divide-slate-100">';
                let options = "";

                snap.forEach(doc => {
                    html += `<tr class="text-sm"><td class="p-4 font-bold text-slate-700">${doc.data().nombre}</td><td class="p-4"><span class="bg-blue-50 text-blue-600 px-2 py-1 rounded-lg text-xs font-bold">${doc.data().cursoID}</span></td><td class="p-4"><button onclick="borrar('alumnos', '${doc.id}')" class="text-red-400"><i class="fa-solid fa-trash"></i></button></td></tr>`;
                    options += `<option value="${doc.id}">${doc.data().nombre} (${doc.data().cursoID})</option>`;
                });
                tabla.innerHTML = html + '</tbody></table>';
                selectHijo.innerHTML = options;
            });
        }

        // --- FUNCIONES DOCENTES ---
        async function registrarDocente() {
            const nombre = document.getElementById('nombreDocente').value;
            const email = document.getElementById('emailDocente').value.toLowerCase();
            if(!nombre || !email) return alert("Faltan datos");
            await db.collection('usuarios').doc(email).set({ nombre, rol: 'docente' });
            document.getElementById('nombreDocente').value = "";
            document.getElementById('emailDocente').value = "";
        }

        function escucharDocentes() {
            db.collection('usuarios').where('rol', '==', 'docente').onSnapshot(snap => {
                const tabla = document.getElementById('tablaDocentes');
                let html = '<table class="w-full text-left"><thead class="bg-slate-50 text-[10px] uppercase text-slate-400 font-black"><tr><th class="p-4">Nombre</th><th class="p-4">Email</th><th class="p-4">Acción</th></tr></thead><tbody>';
                snap.forEach(doc => {
                    html += `<tr class="text-sm"><td class="p-4 font-bold">${doc.data().nombre}</td><td class="p-4 text-slate-500">${doc.id}</td><td class="p-4"><button onclick="borrar('usuarios', '${doc.id}')" class="text-red-400"><i class="fa-solid fa-trash"></i></button></td></tr>`;
                });
                tabla.innerHTML = html + '</tbody></table>';
            });
        }

        // --- FUNCIONES FAMILIAS ---
        async function registrarFamilia() {
            const email = document.getElementById('emailFamilia').value.toLowerCase();
            const nombre = document.getElementById('nombreFamilia').value;
            const hijoID = document.getElementById('selectHijo').value;
            if(!email || !nombre) return alert("Faltan datos");
            await db.collection('usuarios').doc(email).set({ nombre, rol: 'familia', hijoID });
            alert("Familia vinculada");
        }

        // --- COMUNICACIÓN & IA ---
        function previewFile(input) { document.getElementById('fileInfo').innerText = `Archivo: ${input.files[0].name}`; }

        async function subir(file, folder) {
            if(!file) return "";
            const ref = storage.ref().child(`${folder}/${Date.now()}_${file.name}`);
            await ref.put(file);
            return await ref.getDownloadURL();
        }

        async function mejorarConIA(event) {
            const btn = event.currentTarget;
            const text = document.getElementById('contenidoPost');
            if(!text.value) return;
            const original = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=AIzaSyATS0LI0XhWWyYEcVyncMWBkFutT-SlWQE`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: "Mejora este comunicado escolar de forma formal y breve: " + text.value }] }] })
                });
                const data = await res.json();
                text.value = data.candidates[0].content.parts[0].text.trim();
            } catch (e) { alert("Error IA"); }
            btn.innerHTML = original;
        }

        async function publicarFeed() {
            const titulo = document.getElementById('tituloPost').value;
            const texto = document.getElementById('contenidoPost').value;
            const tag = document.getElementById('tagPost').value;
            const fecha = document.getElementById('fechaProgramada').value;
            
            if(!titulo || !texto) return alert("Falta contenido");
            
            const img = await subir(document.getElementById('adjuntoImagen').files[0], 'images');
            const doc = await subir(document.getElementById('adjuntoDoc').files[0], 'docs');

            await db.collection('comunicados').add({
                titulo, texto, tag, img, doc,
                fechaPublicacion: fecha ? new Date(fecha).toISOString() : new Date().toISOString(),
                creadoEn: new Date().toISOString(),
                likes: 0
            });
            location.reload();
        }

        function escucharFeed() {
            db.collection('comunicados').orderBy('creadoEn', 'desc').onSnapshot(snap => {
                const feed = document.getElementById('previewFeed');
                feed.innerHTML = snap.docs.map(doc => `
                    <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm relative">
                        <span class="absolute top-4 right-4 text-[9px] font-black bg-slate-100 px-2 py-1 rounded text-slate-500 uppercase">${doc.data().tag}</span>
                        <h4 class="font-bold text-slate-800">${doc.data().titulo}</h4>
                        <p class="text-xs text-slate-500 mt-2">${doc.data().texto.substring(0,100)}...</p>
                        ${doc.data().img ? `<img src="${doc.data().img}" class="mt-2 rounded-lg h-20 w-full object-cover">` : ''}
                        <button onclick="borrar('comunicados', '${doc.id}')" class="mt-3 text-[10px] text-red-400 font-bold uppercase tracking-widest">Eliminar</button>
                    </div>
                `).join('');
            });
        }

        async function borrar(col, id) { if(confirm("¿Eliminar?")) await db.collection(col).doc(id).delete(); }

        // INICIO
        escucharCursos();
        escucharAlumnos();
        escucharDocentes();
        escucharFeed();
    </script>
</body>
</html>
