<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Panel Escolar Directo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .admin-tab { display: none; }
        .admin-tab.active { display: block; animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .sidebar-btn.active { background: #1e293b; border-left: 4px solid #3b82f6; color: #60a5fa; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen flex">

    <aside class="w-64 bg-slate-900 text-white p-6 hidden md:block flex-shrink-0">
        <div class="mb-8 text-center">
            <h1 class="text-xl font-bold text-blue-400">Control Central</h1>
            <p class="text-[10px] text-slate-500 uppercase tracking-widest mt-1">Gestión Institucional</p>
        </div>
        <nav class="space-y-2">
            <button onclick="tab('alumnos')" id="btn-alumnos" class="sidebar-btn flex items-center w-full p-3 hover:bg-slate-800 rounded-xl active">
                <i class="fa-solid fa-graduation-cap mr-3 w-5"></i> Alumnos
            </button>
            <button onclick="tab('cursos')" id="btn-cursos" class="sidebar-btn flex items-center w-full p-3 hover:bg-slate-800 rounded-xl">
                <i class="fa-solid fa-chalkboard mr-3 w-5"></i> Cursos
            </button>
            <button onclick="tab('docentes')" id="btn-docentes" class="sidebar-btn flex items-center w-full p-3 hover:bg-slate-800 rounded-xl">
                <i class="fa-solid fa-user-tie mr-3 w-5"></i> Docentes
            </button>
            <button onclick="tab('familias')" id="btn-familias" class="sidebar-btn flex items-center w-full p-3 hover:bg-slate-800 rounded-xl">
                <i class="fa-solid fa-people-group mr-3 w-5"></i> Familias
            </button>
            <button onclick="tab('comunicacion')" id="btn-comunicacion" class="sidebar-btn flex items-center w-full p-3 hover:bg-slate-800 rounded-xl">
                <i class="fa-solid fa-bullhorn mr-3 w-5"></i> Muro Escolar
            </button>
            <button onclick="tab('mensajes')" id="btn-mensajes" class="sidebar-btn flex items-center w-full p-3 hover:bg-slate-800 rounded-xl">
                <i class="fa-solid fa-comments mr-3 w-5"></i> Mensajes
            </button>
        </nav>
    </aside>

    <main class="flex-1 p-8 overflow-y-auto">
        
        <section id="tab-alumnos" class="admin-tab active">
            <h2 class="text-2xl font-bold text-slate-800 mb-6">Gestión de Alumnos</h2>
            <div class="bg-white p-6 rounded-3xl border mb-8 grid grid-cols-1 md:grid-cols-3 gap-4 shadow-sm">
                <input type="text" id="nombreAlumno" placeholder="Nombre completo" class="p-3 border rounded-xl outline-none">
                <select id="cursoAlumno" class="p-3 border rounded-xl outline-none font-bold text-slate-600">
                    <option value="">Cargando cursos...</option>
                </select>
                <button onclick="crearAlumno()" class="bg-blue-600 text-white font-bold py-3 rounded-xl">Registrar Alumno</button>
            </div>
            <div id="tablaAlumnos" class="bg-white rounded-3xl border overflow-hidden shadow-sm"></div>
        </section>

        <section id="tab-cursos" class="admin-tab">
            <h2 class="text-2xl font-bold text-slate-800 mb-6">Configuración de Cursos</h2>
            <div class="bg-white p-6 rounded-3xl border mb-8 flex gap-4 shadow-sm">
                <input type="text" id="nombreCurso" placeholder="Ej: 1° AÑO A" class="flex-1 p-3 border rounded-xl font-bold uppercase">
                <button onclick="crearCurso()" class="bg-green-600 text-white font-bold px-8 rounded-xl">Crear Curso</button>
            </div>
            <div id="listaCursos" class="grid grid-cols-1 md:grid-cols-4 gap-4"></div>
        </section>

        <section id="tab-comunicacion" class="admin-tab">
            <h2 class="text-2xl font-bold text-slate-800 mb-6">Muro de Comunicación</h2>
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <div class="bg-white p-6 rounded-3xl border space-y-4 shadow-sm h-fit">
                    <input type="text" id="tituloPost" placeholder="Título del comunicado" class="w-full p-3 border rounded-xl font-bold outline-none">
                    <textarea id="contenidoPost" rows="5" placeholder="Escribe el mensaje para las familias..." class="w-full p-3 border rounded-xl outline-none"></textarea>
                    <select id="tagPost" class="w-full p-3 border rounded-xl font-bold text-slate-500"></select>
                    <button onclick="publicarFeed()" class="w-full bg-pink-500 text-white font-bold py-3 rounded-xl shadow-md">Publicar Ahora</button>
                </div>
                <div id="previewFeed" class="space-y-4"></div>
            </div>
        </section>

        <section id="tab-docentes" class="admin-tab">
            <h2 class="text-2xl font-bold text-slate-800 mb-6">Docentes</h2>
            <div class="bg-white p-6 rounded-3xl border mb-8 grid grid-cols-1 md:grid-cols-3 gap-4 shadow-sm">
                <input type="text" id="nombreDocente" placeholder="Nombre" class="p-3 border rounded-xl">
                <input type="email" id="emailDocente" placeholder="email@escuela.com" class="p-3 border rounded-xl">
                <button onclick="registrarDocente()" class="bg-purple-600 text-white font-bold py-3 rounded-xl">Alta Docente</button>
            </div>
            <div id="tablaDocentes" class="bg-white rounded-3xl border overflow-hidden shadow-sm"></div>
        </section>

        <section id="tab-familias" class="admin-tab">
            <h2 class="text-2xl font-bold text-slate-800 mb-6">Vinculación de Familias</h2>
            <div class="bg-white p-6 rounded-3xl border max-w-xl shadow-sm space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" id="nombreFamilia" placeholder="Nombre Tutor" class="p-3 border rounded-xl">
                    <input type="email" id="emailFamilia" placeholder="Email Tutor" class="p-3 border rounded-xl">
                </div>
                <p class="text-[10px] font-bold text-slate-400 uppercase">Hijos (Ctrl + Click para varios)</p>
                <select id="selectHijo" multiple class="w-full p-3 border rounded-xl h-40 font-bold text-slate-600"></select>
                <button onclick="registrarFamilia()" class="w-full bg-orange-500 text-white font-bold py-4 rounded-xl">Crear Cuenta</button>
            </div>
            <div id="tablaFamilias" class="mt-8 bg-white rounded-3xl border overflow-hidden shadow-sm"></div>
        </section>

        <section id="tab-mensajes" class="admin-tab">
            <h2 class="text-2xl font-bold text-slate-800 mb-6">Mensajería</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 h-[500px] bg-white rounded-3xl border overflow-hidden shadow-sm">
                <div class="border-r bg-slate-50 overflow-y-auto" id="lista-chats"></div>
                <div class="md:col-span-2 flex flex-col">
                    <div id="chat-header" class="p-4 border-b font-bold text-blue-600 bg-white">Selecciona un chat</div>
                    <div id="admin-chat-box" class="flex-1 p-4 overflow-y-auto flex flex-col gap-3"></div>
                    <div class="p-4 border-t flex gap-2 bg-white">
                        <input type="text" id="admin-reply-input" placeholder="Responder..." class="flex-1 border p-3 rounded-xl outline-none">
                        <button onclick="enviarRespuestaAdmin()" class="bg-blue-600 text-white px-6 rounded-xl"><i class="fa-solid fa-paper-plane"></i></button>
                    </div>
                </div>
            </div>
        </section>

    </main>

    <script>
        // FIREBASE CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyCLeGKE5NoGUQT0GRdMDIHn4zhxF3ZOp6k",
            authDomain: "app-academica-interna.firebaseapp.com",
            projectId: "app-academica-interna",
            storageBucket: "app-academica-interna.firebasestorage.app",
            messagingSenderId: "169882587504",
            appId: "1:169882587504:web:0fcdf32efdc81ad0a0bfb5"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let chatActivoEmail = null;

        // TABS
        function tab(id) {
            document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.sidebar-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + id).classList.add('active');
            document.getElementById('btn-' + id).classList.add('active');
            if(id === 'mensajes') cargarListaChats();
        }

        // CURSOS
        async function crearCurso() {
            const n = document.getElementById('nombreCurso').value.toUpperCase().trim();
            if(n) await db.collection('cursos').doc(n).set({ nombre: n });
            document.getElementById('nombreCurso').value = "";
        }

        function escucharCursos() {
            db.collection('cursos').onSnapshot(snap => {
                let h = "", opts = '<option value="TODOS">Toda la Escuela</option>';
                snap.forEach(doc => {
                    h += `<div class="bg-white p-4 rounded-xl border flex justify-between font-bold shadow-sm"><span>${doc.id}</span><button onclick="borrar('cursos', '${doc.id}')" class="text-red-400">×</button></div>`;
                    opts += `<option value="${doc.id}">${doc.id}</option>`;
                });
                document.getElementById('listaCursos').innerHTML = h;
                document.getElementById('cursoAlumno').innerHTML = opts;
                document.getElementById('tagPost').innerHTML = opts;
            });
        }

        // ALUMNOS
        async function crearAlumno() {
            const n = document.getElementById('nombreAlumno').value;
            const c = document.getElementById('cursoAlumno').value;
            if(n && c) {
                const res = await db.collection('alumnos').add({ nombre: n, cursoID: c });
                await db.collection('calificaciones').doc(res.id).set({ inasistencias: 0, notas: {} });
                document.getElementById('nombreAlumno').value = "";
            }
        }

        function escucharAlumnos() {
            db.collection('alumnos').onSnapshot(snap => {
                let h = '<table class="w-full text-left text-sm"><thead><tr class="bg-slate-50"><th class="p-4">Nombre</th><th class="p-4">Curso</th><th class="p-4">Acción</th></tr></thead>';
                let opts = "";
                snap.forEach(doc => {
                    h += `<tr class="border-t"><td class="p-4 font-bold">${doc.data().nombre}</td><td class="p-4">${doc.data().cursoID}</td><td class="p-4"><button onclick="borrar('alumnos','${doc.id}')">🗑️</button></td></tr>`;
                    opts += `<option value="${doc.id}">${doc.data().nombre} (${doc.data().cursoID})</option>`;
                });
                document.getElementById('tablaAlumnos').innerHTML = h + '</table>';
                document.getElementById('selectHijo').innerHTML = opts;
            });
        }

        // MURO (COMUNICACIÓN) - MANUAL
        async function publicarFeed() {
            const t = document.getElementById('tituloPost').value;
            const c = document.getElementById('contenidoPost').value;
            const g = document.getElementById('tagPost').value;
            if(!t || !c) return alert("Completa los campos");
            
            try {
                await db.collection('comunicados').add({
                    titulo: t,
                    texto: c,
                    tag: g,
                    creadoEn: new Date().toISOString()
                });
                document.getElementById('tituloPost').value = "";
                document.getElementById('contenidoPost').value = "";
            } catch(e) { console.error(e); }
        }

        function escucharFeed() {
            db.collection('comunicados').orderBy('creadoEn', 'desc').onSnapshot(snap => {
                document.getElementById('previewFeed').innerHTML = snap.docs.map(doc => `
                    <div class="bg-white p-4 rounded-2xl border shadow-sm relative">
                        <button onclick="borrar('comunicados','${doc.id}')" class="absolute top-2 right-2 text-slate-300 hover:text-red-500">×</button>
                        <span class="text-[9px] font-black text-pink-500 uppercase">${doc.data().tag}</span>
                        <h4 class="font-bold text-slate-800">${doc.data().titulo}</h4>
                        <p class="text-xs text-slate-500 mt-1 whitespace-pre-wrap">${doc.data().texto}</p>
                    </div>`).join('');
            });
        }

        // DOCENTES
        async function registrarDocente() {
            const n = document.getElementById('nombreDocente').value;
            const e = document.getElementById('emailDocente').value.toLowerCase().trim();
            if(n && e) {
                await db.collection('usuarios').doc(e).set({ nombre: n, email: e, rol: 'docente' });
                document.getElementById('nombreDocente').value = ""; document.getElementById('emailDocente').value = "";
            }
        }

        function escucharDocentes() {
            db.collection('usuarios').where('rol', '==', 'docente').onSnapshot(snap => {
                let h = '<table class="w-full text-left text-sm"><thead><tr class="bg-slate-50"><th class="p-4">Nombre</th><th class="p-4">Email</th><th class="p-4">Acción</th></tr></thead>';
                snap.forEach(doc => {
                    h += `<tr class="border-t"><td class="p-4 font-bold">${doc.data().nombre}</td><td class="p-4">${doc.id}</td><td class="p-4"><button onclick="borrar('usuarios','${doc.id}')">🗑️</button></td></tr>`;
                });
                document.getElementById('tablaDocentes').innerHTML = h + '</table>';
            });
        }

        // FAMILIAS
        async function registrarFamilia() {
            const e = document.getElementById('emailFamilia').value.toLowerCase().trim();
            const n = document.getElementById('nombreFamilia').value;
            const h = Array.from(document.getElementById('selectHijo').selectedOptions).map(o => o.value);
            if(e && h.length > 0) {
                await db.collection('usuarios').doc(e).set({ nombre: n, email: e, rol: 'familia', hijoID: h });
                alert("Guardado");
            }
        }

        function escucharFamilias() {
            db.collection('usuarios').where('rol', '==', 'familia').onSnapshot(snap => {
                let h = '<table class="w-full text-left text-sm"><thead><tr class="bg-slate-50"><th class="p-4">Tutor</th><th class="p-4">Hijos</th><th class="p-4">Acción</th></tr></thead>';
                snap.forEach(doc => {
                    h += `<tr class="border-t"><td class="p-4 font-bold">${doc.data().nombre}<br><span class="text-[9px] font-normal text-slate-400">${doc.id}</span></td><td class="p-4 text-[9px] text-slate-400">${doc.data().hijoID.join(', ')}</td><td class="p-4"><button onclick="borrar('usuarios','${doc.id}')">🗑️</button></td></tr>`;
                });
                document.getElementById('tablaFamilias').innerHTML = h + '</table>';
            });
        }

        // MENSAJERÍA
        function cargarListaChats() {
            db.collection('mensajes').onSnapshot(snap => {
                const emails = [...new Set(snap.docs.map(d => d.data().participantes).flat())].filter(e => e !== "secretaria_primaria");
                document.getElementById('lista-chats').innerHTML = emails.map(e => `<div onclick="abrirChat('${e}')" class="p-4 border-b cursor-pointer hover:bg-blue-50 font-bold text-xs">${e}</div>`).join('');
            });
        }

        function abrirChat(email) {
            chatActivoEmail = email;
            document.getElementById('chat-header').innerText = "Chat con: " + email;
            db.collection('mensajes').where('participantes', 'array-contains', email).orderBy('fecha', 'asc').onSnapshot(snap => {
                const box = document.getElementById('admin-chat-box');
                box.innerHTML = snap.docs.map(doc => {
                    const esSec = doc.data().emisorID === "secretaria_primaria";
                    return `<div class="max-w-[85%] p-3 rounded-2xl text-xs ${esSec ? 'bg-blue-600 text-white self-end' : 'bg-slate-100 self-start'}">${doc.data().texto}</div>`;
                }).join('');
                box.scrollTop = box.scrollHeight;
            });
        }

        async function enviarRespuestaAdmin() {
            const input = document.getElementById('admin-reply-input');
            if(!input.value || !chatActivoEmail) return;
            await db.collection('mensajes').add({
                emisorID: "secretaria_primaria", receptorID: chatActivoEmail,
                participantes: [chatActivoEmail, "secretaria_primaria"],
                texto: input.value, fecha: new Date().toISOString()
            });
            input.value = "";
        }

        async function borrar(col, id) { if(confirm("¿Seguro?")) await db.collection(col).doc(id).delete(); }

        // START
        escucharCursos();
        escucharAlumnos();
        escucharDocentes();
        escucharFamilias();
        escucharFeed();
    </script>
</body>
</html>
