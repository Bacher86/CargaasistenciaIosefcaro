<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin Maestro - Sincronizado</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f1f5f9; padding-bottom: 90px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .nav-active { color: #2563eb !important; border-top: 3px solid #2563eb; background: #eff6ff; }
    </style>
</head>
<body>

    <header class="bg-white p-4 border-b flex justify-between items-center sticky top-0 z-40">
        <h1 class="font-800 text-lg tracking-tight">EDU<span class="text-blue-600">ADMIN</span></h1>
        <div id="conn-status" class="text-[10px] bg-emerald-100 text-emerald-600 px-2 py-1 rounded-full font-bold">CONECTADO</div>
    </header>

    <main class="p-4 max-w-lg mx-auto">
        
        <section id="t-inicio" class="tab-content active">
            <div class="grid grid-cols-2 gap-4 mb-6">
                <div class="bg-white p-5 rounded-3xl border shadow-sm text-center">
                    <p class="text-[10px] font-bold text-slate-400 uppercase">Alumnos</p>
                    <h2 id="count-alu" class="text-3xl font-800 text-slate-800">0</h2>
                </div>
                <div class="bg-white p-5 rounded-3xl border shadow-sm text-center">
                    <p class="text-[10px] font-bold text-slate-400 uppercase">Familias</p>
                    <h2 id="count-fam" class="text-3xl font-800 text-slate-800">0</h2>
                </div>
            </div>
            <div class="bg-white p-6 rounded-[2rem] border shadow-sm">
                <h3 class="font-bold mb-2">Central de Datos</h3>
                <p class="text-xs text-slate-500 leading-relaxed">Este panel alimenta a la <b>App Docentes</b> (notas/asistencia) y a la <b>App Familias</b> (comunicados/agenda). Los cambios son instantáneos.</p>
            </div>
        </section>

        <section id="t-alumnos" class="tab-content">
            <div class="bg-white p-6 rounded-[2rem] border shadow-sm mb-4">
                <h3 class="font-bold mb-4">Alta de Alumno</h3>
                <input type="text" id="alu-nom" placeholder="Nombre completo" class="w-full p-4 bg-slate-50 rounded-2xl mb-3 outline-none border-none font-semibold">
                <div class="flex gap-2">
                    <select id="alu-cur" class="flex-1 p-4 bg-slate-50 rounded-2xl outline-none font-bold text-slate-600 border-none"></select>
                    <button onclick="addAlumno()" class="bg-blue-600 text-white px-6 rounded-2xl font-bold"><i class="fa-solid fa-plus"></i></button>
                </div>
            </div>
            <div id="list-alu" class="space-y-2"></div>
        </section>

        <section id="t-familias" class="tab-content">
            <div class="bg-white p-6 rounded-[2rem] border shadow-sm mb-4">
                <h3 class="font-bold mb-4">Cuenta para Familia</h3>
                <input type="text" id="fam-nom" placeholder="Nombre del Padre/Madre" class="w-full p-4 bg-slate-50 rounded-2xl mb-3 outline-none">
                <input type="email" id="fam-mail" placeholder="Correo electrónico" class="w-full p-4 bg-slate-50 rounded-2xl mb-4 outline-none">
                
                <p class="text-[10px] font-bold text-slate-400 mb-2 uppercase ml-2">Vincular con Alumno/s:</p>
                <select id="fam-hijos" multiple class="w-full p-4 bg-slate-50 rounded-2xl h-40 border-none font-bold text-slate-600 mb-4"></select>
                
                <button onclick="addFamilia()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-800">SINCRONIZAR FAMILIA</button>
            </div>
            <div id="list-fam" class="space-y-2"></div>
        </section>

        <section id="t-muro" class="tab-content">
            <div class="bg-white p-6 rounded-[2rem] border shadow-sm mb-4 space-y-3">
                <input type="text" id="post-tit" placeholder="Título" class="w-full p-4 bg-slate-50 rounded-2xl border-none font-bold">
                <textarea id="post-msg" rows="4" placeholder="Escribe el comunicado..." class="w-full p-4 bg-slate-50 rounded-2xl border-none"></textarea>
                <select id="post-tag" class="w-full p-4 bg-slate-50 rounded-2xl border-none font-bold text-slate-500"></select>
                <button onclick="addPost()" class="w-full bg-pink-500 text-white py-4 rounded-2xl font-bold">PUBLICAR EN MURO</button>
            </div>
            <div id="list-muro" class="space-y-3"></div>
        </section>

    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around p-2 z-50">
        <button onclick="nav('inicio')" id="b-inicio" class="flex flex-col items-center p-2 nav-active text-slate-400 w-full">
            <i class="fa-solid fa-house-chimney text-lg"></i><span class="text-[8px] font-bold mt-1 uppercase">Inicio</span>
        </button>
        <button onclick="nav('alumnos')" id="b-alumnos" class="flex flex-col items-center p-2 text-slate-400 w-full">
            <i class="fa-solid fa-user-graduate text-lg"></i><span class="text-[8px] font-bold mt-1 uppercase">Alumnos</span>
        </button>
        <button onclick="nav('familias')" id="b-familias" class="flex flex-col items-center p-2 text-slate-400 w-full">
            <i class="fa-solid fa-users text-lg"></i><span class="text-[8px] font-bold mt-1 uppercase">Familias</span>
        </button>
        <button onclick="nav('muro')" id="b-muro" class="flex flex-col items-center p-2 text-slate-400 w-full">
            <i class="fa-solid fa-message-captions text-lg"></i><span class="text-[8px] font-bold mt-1 uppercase">Muro</span>
        </button>
    </nav>

    <script>
        // CONFIGURACIÓN (Verificada)
        const firebaseConfig = {
            apiKey: "AIzaSyCLeGKE5NoGUQT0GRdMDIHn4zhxF3ZOp6k",
            authDomain: "app-academica-interna.firebaseapp.com",
            projectId: "app-academica-interna",
            storageBucket: "app-academica-interna.firebasestorage.app",
            messagingSenderId: "169882587504",
            appId: "1:169882587504:web:0fcdf32efdc81ad0a0bfb5"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // NAVEGACIÓN
        function nav(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('nav-active'));
            document.getElementById('t-' + id).classList.add('active');
            document.getElementById('b-' + id).classList.add('nav-active');
            window.scrollTo(0,0);
        }

        // 1. CURSOS (Sincronización automática)
        db.collection('cursos').onSnapshot(snap => {
            let opts = '<option value="TODOS">Toda la Escuela</option>';
            snap.forEach(doc => opts += `<option value="${doc.id}">${doc.id}</option>`);
            document.getElementById('alu-cur').innerHTML = opts;
            document.getElementById('post-tag').innerHTML = opts;
        });

        // 2. ALUMNOS (Crea el vínculo para Docentes)
        async function addAlumno() {
            const nom = document.getElementById('alu-nom').value.trim();
            const cur = document.getElementById('alu-cur').value;
            if(!nom) return;
            
            // Creamos el alumno
            const res = await db.collection('alumnos').add({
                nombre: nom,
                cursoID: cur,
                creadoEn: firebase.firestore.FieldValue.serverTimestamp()
            });

            // VÍNCULO DOCENTE: Creamos el documento de notas con el MISMO ID
            await db.collection('calificaciones').doc(res.id).set({
                inasistencias: 0,
                notas: {},
                nombreAlumno: nom // redundancia para facilitar búsqueda
            });

            document.getElementById('alu-nom').value = "";
        }

        db.collection('alumnos').orderBy('nombre').onSnapshot(snap => {
            let html = "", opts = "";
            snap.forEach(doc => {
                html += `<div class="bg-white p-4 rounded-2xl border flex justify-between items-center shadow-sm">
                    <div><p class="font-bold text-sm text-slate-700">${doc.data().nombre}</p><p class="text-[9px] font-black text-blue-500 uppercase">${doc.data().cursoID}</p></div>
                    <button onclick="borrar('alumnos','${doc.id}')" class="text-slate-200"><i class="fa-solid fa-trash"></i></button>
                </div>`;
                opts += `<option value="${doc.id}">${doc.data().nombre} (${doc.data().cursoID})</option>`;
            });
            document.getElementById('list-alu').innerHTML = html;
            document.getElementById('fam-hijos').innerHTML = opts;
            document.getElementById('count-alu').innerText = snap.size;
        });

        // 3. FAMILIAS (Vínculo para App Familias)
        async function addFamilia() {
            const mail = document.getElementById('fam-mail').value.toLowerCase().trim();
            const nom = document.getElementById('fam-nom').value.trim();
            const hijos = Array.from(document.getElementById('fam-hijos').selectedOptions).map(o => o.value);

            if(!mail || hijos.length === 0) return alert("Email e hijos son obligatorios");

            await db.collection('usuarios').doc(mail).set({
                nombre: nom,
                email: mail,
                rol: 'familia',
                hijoID: hijos // Esto es lo que la App Familias usa para filtrar
            });
            alert("Familia conectada correctamente");
        }

        db.collection('usuarios').where('rol','==','familia').onSnapshot(snap => {
            document.getElementById('count-fam').innerText = snap.size;
        });

        // 4. MURO (Vínculo para App Familias)
        async function addPost() {
            const tit = document.getElementById('post-tit').value;
            const msg = document.getElementById('post-msg').value;
            const tag = document.getElementById('post-tag').value;
            if(!tit || !msg) return;

            await db.collection('comunicados').add({
                titulo: tit,
                texto: msg,
                tag: tag,
                creadoEn: new Date().toISOString() // La App Familias suele leer ISOStrings
            });
            document.getElementById('post-tit').value = "";
            document.getElementById('post-msg').value = "";
        }

        db.collection('comunicados').orderBy('creadoEn', 'desc').onSnapshot(snap => {
            document.getElementById('list-muro').innerHTML = snap.docs.map(doc => `
                <div class="bg-white p-5 rounded-3xl border shadow-sm">
                    <span class="text-[8px] font-black bg-blue-50 text-blue-600 px-2 py-1 rounded-full uppercase">${doc.data().tag}</span>
                    <h4 class="font-bold text-sm mt-2">${doc.data().titulo}</h4>
                    <p class="text-[11px] text-slate-500 mt-1">${doc.data().texto}</p>
                </div>`).join('');
        });

        async function borrar(col, id) { if(confirm("¿Eliminar?")) await db.collection(col).doc(id).delete(); }

    </script>
</body>
</html>
