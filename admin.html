<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Panel de Control Escolar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .admin-tab { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .sidebar-btn.active { background: #1e293b; border-left: 4px solid #3b82f6; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen flex">

    <aside class="w-64 bg-slate-900 text-white p-6 hidden md:block flex-shrink-0">
        <div class="mb-8">
            <h1 class="text-xl font-bold text-blue-400 text-center">Control Central</h1>
            <p class="text-[10px] text-slate-500 uppercase tracking-widest text-center mt-1">Gestión Institucional</p>
        </div>
        <nav class="space-y-2">
            <button onclick="tab('alumnos')" class="sidebar-btn flex items-center w-full p-3 hover:bg-slate-800 rounded-xl transition-all active">
                <i class="fa-solid fa-graduation-cap mr-3 text-blue-400"></i> Alumnos
            </button>
            <button onclick="tab('cursos')" class="sidebar-btn flex items-center w-full p-3 hover:bg-slate-800 rounded-xl transition-all">
                <i class="fa-solid fa-chalkboard mr-3 text-green-400"></i> Cursos
            </button>
            <button onclick="tab('docentes')" class="sidebar-btn flex items-center w-full p-3 hover:bg-slate-800 rounded-xl transition-all">
                <i class="fa-solid fa-user-tie mr-3 text-purple-400"></i> Docentes
            </button>
            <div class="border-t border-slate-800 my-4"></div>
            <button onclick="tab('familias')" class="sidebar-btn flex items-center w-full p-3 hover:bg-slate-800 rounded-xl transition-all">
                <i class="fa-solid fa-people-group mr-3 text-orange-400"></i> Familias
            </button>
            <button onclick="tab('calendario')" class="sidebar-btn flex items-center w-full p-3 hover:bg-slate-800 rounded-xl transition-all">
                <i class="fa-solid fa-calendar-days mr-3 text-indigo-400"></i> Calendario
            </button>
            <button onclick="tab('comunicacion')" class="sidebar-btn flex items-center w-full p-3 hover:bg-slate-800 rounded-xl transition-all">
                <i class="fa-solid fa-bullhorn mr-3 text-pink-400"></i> Comunicación
            </button>
        </nav>
    </aside>

    <main class="flex-1 p-8 overflow-y-auto">
        
        <section id="tab-alumnos" class="admin-tab">
            <h2 class="text-2xl font-bold text-slate-800 mb-6">Gestión de Alumnos</h2>
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200 mb-8">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <input type="text" id="nombreAlumno" placeholder="Nombre Completo" class="p-3 bg-slate-50 border rounded-xl outline-none">
                    <select id="cursoAlumno" class="p-3 bg-slate-50 border rounded-xl outline-none font-bold text-slate-600">
                        <option value="">Cargando cursos...</option>
                    </select>
                    <button onclick="crearAlumno()" class="bg-blue-600 text-white font-bold py-3 rounded-xl hover:bg-blue-700 transition-all">Registrar Alumno</button>
                </div>
            </div>
            <div id="tablaAlumnos" class="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden"></div>
        </section>

        <section id="tab-calendario" class="admin-tab hidden">
            <h2 class="text-2xl font-bold text-slate-800 mb-6">Agenda de Eventos</h2>
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200 mb-8">
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <input type="date" id="fechaEvento" class="p-3 bg-slate-50 border rounded-xl outline-none">
                    <input type="text" id="tituloEvento" placeholder="Ej: Examen de Matemática" class="p-3 bg-slate-50 border rounded-xl outline-none">
                    <select id="cursoEvento" class="p-3 bg-slate-50 border rounded-xl outline-none font-bold text-slate-600">
                        <option value="TODOS">Toda la Escuela</option>
                    </select>
                    <button onclick="crearEvento()" class="bg-indigo-600 text-white font-bold py-3 rounded-xl hover:bg-indigo-700 transition-all">Agendar Evento</button>
                </div>
            </div>
            <div id="listaEventos" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </section>

        <section id="tab-comunicacion" class="admin-tab hidden">
            <h2 class="text-2xl font-bold text-slate-800 mb-6">Muro de Comunicación</h2>
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <div class="bg-white p-8 rounded-3xl shadow-sm border border-slate-200 h-fit space-y-4">
                    <input type="text" id="tituloPost" placeholder="Título del comunicado" class="w-full p-3 bg-slate-50 border rounded-xl outline-none font-bold">
                    <textarea id="contenidoPost" rows="4" placeholder="¿Qué está pasando en la escuela?" class="w-full p-3 bg-slate-50 border rounded-xl outline-none"></textarea>
                    
                    <div class="grid grid-cols-1 gap-2">
                        <div class="relative">
                            <i class="fa-solid fa-link absolute left-3 top-4 text-slate-400 text-xs"></i>
                            <input type="text" id="linkImagen" placeholder="Pegar Link de Imagen (ImgBB)" class="w-full p-3 pl-10 bg-white border rounded-xl text-xs outline-none focus:border-blue-500">
                        </div>
                        <div class="relative">
                            <i class="fa-solid fa-file-pdf absolute left-3 top-4 text-slate-400 text-xs"></i>
                            <input type="text" id="linkPDF" placeholder="Pegar Link de PDF (Drive/Dropbox)" class="w-full p-3 pl-10 bg-white border rounded-xl text-xs outline-none focus:border-orange-500">
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-2">
                        <input type="datetime-local" id="fechaProgramada" class="w-full p-2 bg-slate-50 border rounded-xl text-xs outline-none">
                        <select id="tagPost" class="w-full p-2 bg-slate-50 border rounded-xl text-xs outline-none font-bold">
                            <option value="TODOS">Toda la Escuela</option>
                        </select>
                    </div>

                    <div class="flex gap-2">
                        <button onclick="mejorarConIA(event)" class="flex-1 bg-indigo-50 text-indigo-600 py-3 rounded-xl font-bold text-xs hover:bg-indigo-100 transition-all text-center">IA Pulir</button>
                        <button onclick="publicarFeed()" class="flex-[2] bg-pink-500 text-white font-bold py-3 rounded-xl hover:bg-pink-600 shadow-lg transition-all">Publicar Ahora</button>
                    </div>
                </div>
                <div id="previewFeed" class="space-y-4"></div>
            </div>
        </section>

        <section id="tab-cursos" class="admin-tab hidden">
            <h2 class="text-2xl font-bold text-slate-800 mb-6">Configuración de Cursos</h2>
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200 mb-8">
                <div class="flex gap-4">
                    <input type="text" id="nombreCurso" placeholder="Ej: 1° Año A" class="flex-1 p-3 bg-slate-50 border rounded-xl outline-none text-center font-bold">
                    <button onclick="crearCurso()" class="bg-green-600 text-white font-bold px-8 py-3 rounded-xl hover:bg-green-700 transition-all">Crear Curso</button>
                </div>
            </div>
            <div id="listaCursos" class="grid grid-cols-1 md:grid-cols-4 gap-4"></div>
        </section>

        <section id="tab-docentes" class="admin-tab hidden">
            <h2 class="text-2xl font-bold text-slate-800 mb-6">Gestión de Docentes</h2>
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200 mb-8">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <input type="text" id="nombreDocente" placeholder="Nombre" class="p-3 bg-slate-50 border rounded-xl outline-none">
                    <input type="email" id="emailDocente" placeholder="email@escuela.com" class="p-3 bg-slate-50 border rounded-xl outline-none">
                    <button onclick="registrarDocente()" class="bg-purple-600 text-white font-bold py-3 rounded-xl hover:bg-purple-700 transition-all">Alta Docente</button>
                </div>
            </div>
            <div id="tablaDocentes" class="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden"></div>
        </section>

        <section id="tab-familias" class="admin-tab hidden">
            <h2 class="text-2xl font-bold text-slate-800 mb-6">Vinculación de Familias</h2>
            <div class="bg-white p-8 rounded-3xl shadow-sm border border-slate-200 max-w-2xl">
                <div class="space-y-4">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <input type="email" id="emailFamilia" placeholder="Email responsable" class="w-full p-3 bg-slate-50 border rounded-xl outline-none">
                        <input type="text" id="nombreFamilia" placeholder="Nombre Tutor" class="w-full p-3 bg-slate-50 border rounded-xl outline-none">
                    </div>
                    <select id="selectHijo" class="w-full p-3 bg-slate-50 border rounded-xl outline-none font-bold text-slate-600"></select>
                    <button onclick="registrarFamilia()" class="w-full bg-orange-500 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-orange-600">Crear Cuenta Familia</button>
                </div>
            </div>
        </section>

    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCLeGKE5NoGUQT0GRdMDIHn4zhxF3ZOp6k",
            authDomain: "app-academica-interna.firebaseapp.com",
            projectId: "app-academica-interna",
            storageBucket: "app-academica-interna.firebasestorage.app",
            messagingSenderId: "169882587504",
            appId: "1:169882587504:web:0fcdf32efdc81ad0a0bfb5"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function tab(id) {
            document.querySelectorAll('.admin-tab').forEach(t => t.classList.add('hidden'));
            document.getElementById('tab-' + id).classList.remove('hidden');
            document.querySelectorAll('.sidebar-btn').forEach(b => b.classList.remove('active'));
            if(event) event.currentTarget.classList.add('active');
        }

        // --- CALENDARIO ---
        async function crearEvento() {
            const fecha = document.getElementById('fechaEvento').value;
            const titulo = document.getElementById('tituloEvento').value;
            const curso = document.getElementById('cursoEvento').value;
            if(!fecha || !titulo) return alert("Faltan datos del evento");
            await db.collection('eventos').add({ fecha, titulo, curso, creadoEn: new Date().toISOString() });
            document.getElementById('tituloEvento').value = "";
        }

        function escucharEventos() {
            db.collection('eventos').orderBy('fecha', 'asc').onSnapshot(snap => {
                const lista = document.getElementById('listaEventos');
                lista.innerHTML = snap.docs.map(doc => `
                    <div class="bg-white p-4 rounded-2xl border border-slate-100 flex justify-between items-center shadow-sm">
                        <div>
                            <span class="text-[10px] font-black text-indigo-500 uppercase">${doc.data().fecha}</span>
                            <p class="font-bold text-slate-700">${doc.data().titulo} <span class="text-[10px] font-normal text-slate-400">(${doc.data().curso})</span></p>
                        </div>
                        <button onclick="borrar('eventos', '${doc.id}')" class="text-red-300 hover:text-red-500"><i class="fa-solid fa-calendar-xmark"></i></button>
                    </div>
                `).join('');
            });
        }

        async function publicarFeed() {
    const titulo = document.getElementById('tituloPost').value;
    const texto = document.getElementById('contenidoPost').value;
    const tag = document.getElementById('tagPost').value;
    const fecha = document.getElementById('fechaProgramada').value;
    
    // Ahora tomamos los links directamente de los inputs de texto
    const img = document.getElementById('linkImagen').value.trim();
    const doc = document.getElementById('linkPDF').value.trim();

    if(!titulo || !texto) return alert("Falta título o contenido");

    try {
        await db.collection('comunicados').add({
            titulo,
            texto,
            tag,
            img, // Link de ImgBB
            doc, // Link de PDF
            fechaPublicacion: fecha ? new Date(fecha).toISOString() : new Date().toISOString(),
            creadoEn: new Date().toISOString(),
            likes: 0
        });
        
        alert("¡Comunicado publicado!");
        // Limpiamos los campos para el próximo
        document.getElementById('tituloPost').value = "";
        document.getElementById('contenidoPost').value = "";
        document.getElementById('linkImagen').value = "";
        document.getElementById('linkPDF').value = "";
        
    } catch (e) {
        console.error("Error al publicar:", e);
        alert("Error al guardar en la base de datos.");
    }
}

        // --- IA PULIR ---
        async function mejorarConIA(event) {
            const btn = event.currentTarget;
            const textInput = document.getElementById('contenidoPost');
            const tituloInput = document.getElementById('tituloPost');
            if(!textInput.value) return alert("Escribí un borrador.");
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fa-spin fa-solid fa-spinner"></i>';
            
            try {
                const API_KEY = "AIzaSyATS0LI0XhWWyYEcVyncMWBkFutT-SlWQE";
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{ parts: [{ text: `Actúa como directivo escolar. Mejora este comunicado: Título: ${tituloInput.value}. Texto: ${textInput.value}` }] }] })
                });
                const data = await response.json();
                textInput.value = data.candidates[0].content.parts[0].text;
            } catch (e) { alert("Error IA: " + e.message); }
            btn.innerHTML = originalText;
        }

        // --- FUNCIONES BASE ---
        async function crearCurso() {
            const nombre = document.getElementById('nombreCurso').value.trim().toUpperCase();
            if(!nombre) return alert("Nombre vacío");
            await db.collection('cursos').doc(nombre).set({ nombre });
            document.getElementById('nombreCurso').value = "";
        }

        function escucharCursos() {
            db.collection('cursos').onSnapshot(snap => {
                const lista = document.getElementById('listaCursos');
                const cAlu = document.getElementById('cursoAlumno');
                const cEv = document.getElementById('cursoEvento');
                const cTag = document.getElementById('tagPost');
                let h = "", opts = '<option value="">Elegir curso...</option>', tags = '<option value="TODOS">Toda la Escuela</option>';
                snap.forEach(doc => {
                    h += `<div class="bg-white p-4 rounded-2xl border flex justify-between"><b>${doc.id}</b><button onclick="borrar('cursos', '${doc.id}')" class="text-red-400">×</button></div>`;
                    opts += `<option value="${doc.id}">${doc.id}</option>`;
                    tags += `<option value="${doc.id}">Solo ${doc.id}</option>`;
                });
                lista.innerHTML = h; cAlu.innerHTML = opts; cEv.innerHTML = tags; cTag.innerHTML = tags;
            });
        }

        async function crearAlumno() {
            const nombre = document.getElementById('nombreAlumno').value;
            const cursoID = document.getElementById('cursoAlumno').value;
            if(!nombre || !cursoID) return alert("Faltan datos");
            await db.collection('alumnos').add({ nombre, cursoID });
            document.getElementById('nombreAlumno').value = "";
        }

        function escucharAlumnos() {
            db.collection('alumnos').onSnapshot(snap => {
                const tabla = document.getElementById('tablaAlumnos');
                const selHijo = document.getElementById('selectHijo');
                let h = '<table class="w-full text-left"><thead class="bg-slate-50 text-[10px] uppercase p-4"><tr><th class="p-4">Alumno</th><th class="p-4">Curso</th><th></th></tr></thead><tbody>';
                let opts = "";
                snap.forEach(doc => {
                    h += `<tr class="border-t"> <td class="p-4 font-bold">${doc.data().nombre}</td> <td class="p-4">${doc.data().cursoID}</td> <td class="p-4"><button onclick="borrar('alumnos', '${doc.id}')">🗑️</button></td></tr>`;
                    opts += `<option value="${doc.id}">${doc.data().nombre} (${doc.data().cursoID})</option>`;
                });
                tabla.innerHTML = h + '</tbody></table>'; selHijo.innerHTML = opts;
            });
        }

        function escucharFeed() {
            db.collection('comunicados').orderBy('creadoEn', 'desc').onSnapshot(snap => {
                const feed = document.getElementById('previewFeed');
                feed.innerHTML = snap.docs.map(doc => `
                    <div class="bg-white p-4 rounded-2xl border relative shadow-sm">
                        <span class="absolute top-2 right-2 text-[8px] bg-slate-100 p-1 rounded font-bold">${doc.data().tag}</span>
                        <h4 class="font-bold text-sm text-slate-800">${doc.data().titulo}</h4>
                        ${doc.data().img ? `<img src="${doc.data().img}" class="w-full h-24 object-cover rounded-lg mt-2">` : ''}
                        <button onclick="borrar('comunicados', '${doc.id}')" class="text-red-400 text-[10px] mt-2 font-bold uppercase">Eliminar</button>
                    </div>
                `).join('');
            });
        }

        async function registrarDocente() {
            const nombre = document.getElementById('nombreDocente').value;
            const email = document.getElementById('emailDocente').value.toLowerCase();
            await db.collection('usuarios').doc(email).set({ nombre, rol: 'docente' });
            alert("Docente registrado");
        }

        async function registrarFamilia() {
            const email = document.getElementById('emailFamilia').value.toLowerCase();
            const nombre = document.getElementById('nombreFamilia').value;
            const hijoID = document.getElementById('selectHijo').value;
            await db.collection('usuarios').doc(email).set({ nombre, rol: 'familia', hijoID });
            alert("Familia registrada");
        }

        async function borrar(col, id) { if(confirm("¿Eliminar?")) await db.collection(col).doc(id).delete(); }

        escucharCursos(); escucharAlumnos(); escucharFeed(); escucharEventos();
    </script>
</body>
</html>
