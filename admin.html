<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control - Iosef Caro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
</head>
<body class="bg-slate-100 font-sans pb-20">

    <div class="max-w-4xl mx-auto p-6">
        <h1 class="text-3xl font-bold text-slate-800 mb-6 border-b-2 border-slate-200 pb-2">Panel de Administración</h1>

        <div class="bg-white p-6 rounded-2xl shadow-sm mb-6 border-l-4 border-blue-500">
            <h2 class="text-xl font-bold mb-4 text-blue-600">Agregar Nuevo Alumno</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <input type="text" id="nuevoNombre" placeholder="Apellido y Nombre" class="p-3 border rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                <select id="nuevoCurso" class="p-3 border rounded-xl">
                    <option value="5A">5to Año A</option>
                    <option value="4A">4to Año A</option>
                    <option value="4B">4to Año B</option>
                </select>
                <button onclick="crearAlumno()" class="bg-blue-600 text-white p-3 rounded-xl font-bold hover:bg-blue-700 transition-all">
                    Cargar Alumno
                </button>
            </div>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-sm mb-6 border-l-4 border-orange-500">
            <h2 class="text-xl font-bold mb-4 text-orange-600">Registrar Informe / Sanción</h2>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                <div>
                    <label class="text-xs font-bold text-slate-400 uppercase ml-1">1. Buscar Alumno</label>
                    <input type="text" id="busquedaAlumno" onkeyup="buscarParaInforme()" placeholder="Escribe el nombre..." class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-orange-500">
                    <div id="sugerenciasAlumnos" class="bg-slate-50 rounded-xl mt-1 max-h-40 overflow-y-auto shadow-inner"></div>
                </div>

                <div>
                    <label class="text-xs font-bold text-slate-400 uppercase ml-1">2. Tipo de reporte</label>
                    <select id="tipoInforme" class="w-full p-3 border rounded-xl">
                        <option value="Sanción Disciplinaria">Sanción Disciplinaria</option>
                        <option value="Falta de Atención">Falta de Atención</option>
                        <option value="Uniforme / Material">Incumplimiento Uniforme/Material</option>
                        <option value="Nota Positiva">Nota Positiva / Felicitación</option>
                    </select>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-4">
                <div class="md:col-span-1">
                    <label class="text-xs font-bold text-slate-400 uppercase ml-1">3. Cantidad</label>
                    <input type="number" id="cantInforme" value="1" min="1" class="w-full p-3 border rounded-xl font-bold text-center">
                </div>
                <div class="md:col-span-3">
                    <label class="text-xs font-bold text-slate-400 uppercase ml-1">4. Detalle de la observación</label>
                    <input type="text" id="detalleInforme" placeholder="Ej: No trajo la carpeta..." class="w-full p-3 border rounded-xl">
                </div>
            </div>

            <input type="hidden" id="idAlumnoSeleccionado">
            <button onclick="guardarInforme()" id="btnInforme" class="w-full bg-orange-500 text-white p-4 rounded-2xl font-bold hover:bg-orange-600 transition-all shadow-md">
                Registrar en Legajo Digital
            </button>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-sm border-l-4 border-slate-700">
            <h2 class="text-xl font-bold mb-4 text-slate-700">Consultar Historial de Hoy</h2>
            <div class="flex gap-4 mb-6">
                <input type="date" id="fechaFiltro" class="p-3 border rounded-xl">
                <button onclick="consultarFecha()" class="bg-slate-800 text-white px-8 rounded-xl font-bold hover:bg-black">Ver Registros</button>
            </div>
            <div id="resultadoHistorial" class="space-y-4"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCLeGKE5NoGUQT0GRdMDIHn4zhxF3ZOp6k",
            authDomain: "app-academica-interna.firebaseapp.com",
            projectId: "app-academica-interna",
            storageBucket: "app-academica-interna.firebasestorage.app",
            messagingSenderId: "169882587504",
            appId: "1:169882587504:web:0fcdf32efdc81ad0a0bfb5"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // --- GESTIÓN DE ALUMNOS ---
        async function crearAlumno() {
            const nombre = document.getElementById('nuevoNombre').value;
            const cursoID = document.getElementById('nuevoCurso').value;
            if(!nombre) return alert("Pon un nombre");
            try {
                await db.collection('alumnos').add({ nombre, cursoID });
                alert("Alumno cargado");
                document.getElementById('nuevoNombre').value = "";
            } catch(e) { alert("Error"); }
        }

        // --- BUSCADOR E INFORMES ---
        let seleccionadoID = "";

        async function buscarParaInforme() {
            const txt = document.getElementById('busquedaAlumno').value.toLowerCase();
            const sug = document.getElementById('sugerenciasAlumnos');
            if (txt.length < 2) { sug.innerHTML = ""; return; }
            const snap = await db.collection('alumnos').get();
            const filtered = snap.docs.filter(d => d.data().nombre.toLowerCase().includes(txt));
            sug.innerHTML = filtered.map(d => `
                <div onclick="setAlumno('${d.id}', '${d.data().nombre}')" class="p-3 hover:bg-blue-50 cursor-pointer border-b border-white text-sm">
                    ${d.data().nombre} <span class="text-blue-500 font-bold">[${d.data().cursoID}]</span>
                </div>
            `).join('');
        }

        function setAlumno(id, nombre) {
            seleccionadoID = id;
            document.getElementById('busquedaAlumno').value = nombre;
            document.getElementById('sugerenciasAlumnos').innerHTML = "";
        }

        async function guardarInforme() {
            const tipo = document.getElementById('tipoInforme').value;
            const cant = document.getElementById('cantInforme').value;
            const det = document.getElementById('detalleInforme').value;
            if(!seleccionadoID || !det) return alert("Selecciona alumno y escribe el detalle");
            
            try {
                await db.collection('informes').add({
                    alumnoID: seleccionadoID,
                    alumnoNombre: document.getElementById('busquedaAlumno').value,
                    tipo,
                    cantidad: parseInt(cant),
                    detalle: det,
                    fecha: new Date().toISOString().split('T')[0],
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                alert("Informe guardado.");
                document.getElementById('detalleInforme').value = "";
                document.getElementById('busquedaAlumno').value = "";
                seleccionadoID = "";
            } catch(e) { alert("Error al guardar"); }
        }

        // --- HISTORIAL ---
        async function consultarFecha() {
            const fecha = document.getElementById('fechaFiltro').value;
            const res = document.getElementById('resultadoHistorial');
            if(!fecha) return;
            res.innerHTML = "Buscando...";

            const snapAsist = await db.collection('asistencias').where('fecha', '==', fecha).get();
            const snapInfo = await db.collection('informes').where('fecha', '==', fecha).get();

            let html = '<h3 class="text-lg font-bold text-slate-800">Resumen del Día:</h3>';

            if(snapAsist.empty && snapInfo.empty) {
                res.innerHTML = "No hay datos para esta fecha.";
                return;
            }

            // Mostrar Asistencias
            snapAsist.forEach(doc => {
                const data = doc.data();
                html += `<div class="bg-white p-4 rounded-xl border mb-2 text-sm shadow-sm">
                            <span class="font-bold text-blue-600">ASISTENCIA ${data.curso}:</span> Registro guardado.
                         </div>`;
            });

            // Mostrar Informes/Sanciones
            snapInfo.forEach(doc => {
                const data = doc.data();
                html += `<div class="bg-orange-50 p-4 rounded-xl border-l-4 border-orange-500 text-sm shadow-sm">
                            <span class="font-bold text-orange-700">${data.alumnoNombre}</span><br>
                            <b>${data.tipo} (${data.cantidad}):</b> ${data.detalle}
                         </div>`;
            });

            res.innerHTML = html;
        }
    </script>
</body>
</html>
