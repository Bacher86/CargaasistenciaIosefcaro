<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Panel de Control Escolar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-storage-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .admin-tab { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-100 min-h-screen flex">

    <aside class="w-64 bg-slate-900 text-white p-6 hidden md:block flex-shrink-0">
        <div class="mb-8">
            <h1 class="text-xl font-bold text-blue-400 text-center">Control Central</h1>
            <p class="text-[10px] text-slate-500 uppercase tracking-widest text-center mt-1">Gestión Institucional</p>
        </div>
        <nav class="space-y-2">
            <button onclick="tab('alumnos')" class="flex items-center w-full p-3 hover:bg-slate-800 rounded-xl transition-all">
                <i class="fa-solid fa-graduation-cap mr-3 text-blue-400"></i> Alumnos
            </button>
            <button onclick="tab('cursos')" class="flex items-center w-full p-3 hover:bg-slate-800 rounded-xl transition-all">
                <i class="fa-solid fa-chalkboard mr-3 text-green-400"></i> Cursos
            </button>
            <button onclick="tab('docentes')" class="flex items-center w-full p-3 hover:bg-slate-800 rounded-xl transition-all">
                <i class="fa-solid fa-user-tie mr-3 text-purple-400"></i> Docentes
            </button>
            <div class="border-t border-slate-800 my-4"></div>
            <button onclick="tab('familias')" class="flex items-center w-full p-3 hover:bg-slate-800 rounded-xl transition-all">
                <i class="fa-solid fa-people-group mr-3 text-orange-400"></i> Familias
            </button>
            <button onclick="tab('comunicacion')" class="flex items-center w-full p-3 hover:bg-slate-800 rounded-xl transition-all">
                <i class="fa-solid fa-bullhorn mr-3 text-pink-400"></i> Comunicación
            </button>
        </nav>
    </aside>

    <main class="flex-1 p-8 overflow-y-auto">
        
        <section id="tab-alumnos" class="admin-tab">
            <h2 class="text-2xl font-bold text-slate-800 mb-6">Gestión de Alumnos</h2>
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200 mb-8">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <input type="text" id="nombreAlumno" placeholder="Nombre Completo" class="p-3 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                    <select id="cursoAlumno" class="p-3 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="">Cargando cursos...</option>
                    </select>
                    <button onclick="crearAlumno()" class="bg-blue-600 text-white font-bold py-3 rounded-xl hover:bg-blue-700 transition-all">Registrar Alumno</button>
                </div>
            </div>
            <div id="tablaAlumnos" class="bg-white rounded-3xl shadow-sm overflow-hidden border border-slate-200"></div>
        </section>

        <section id="tab-familias" class="admin-tab hidden">
            <h2 class="text-2xl font-bold text-slate-800 mb-6">Vinculación de Familias</h2>
            <div class="bg-white p-8 rounded-3xl shadow-sm border border-slate-200 max-w-2xl">
                <div class="space-y-4">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-bold text-slate-400 mb-2 uppercase">Email Responsable</label>
                            <input type="email" id="emailFamilia" placeholder="papa-mama@email.com" class="w-full p-3 bg-slate-50 border rounded-xl outline-none">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-400 mb-2 uppercase">Nombre Tutor</label>
                            <input type="text" id="nombreFamilia" placeholder="Nombre completo" class="w-full p-3 bg-slate-50 border rounded-xl outline-none">
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-400 mb-2 uppercase">Asignar Hijo/a (Alumno)</label>
                        <select id="selectHijo" class="w-full p-3 bg-slate-50 border rounded-xl outline-none"></select>
                    </div>
                    <button onclick="registrarFamilia()" class="w-full bg-orange-500 text-white font-bold py-4 rounded-xl shadow-lg shadow-orange-100 hover:bg-orange-600 transition-all">
                        Crear Cuenta de Familia
                    </button>
                </div>
            </div>
        </section>

        <section id="tab-comunicacion" class="admin-tab hidden">
            <h2 class="text-2xl font-bold text-slate-800 mb-6">Muro de Comunicación</h2>
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <div class="bg-white p-8 rounded-3xl shadow-sm border border-slate-200 h-fit">
                    <h3 class="font-bold text-slate-700 mb-4">Nueva Publicación</h3>
                    <div class="space-y-4">
                        <input type="text" id="tituloPost" placeholder="Título del comunicado" class="w-full p-3 bg-slate-50 border rounded-xl outline-none font-bold">
                        <textarea id="contenidoPost" rows="4" placeholder="¿Qué está pasando en la escuela?" class="w-full p-3 bg-slate-50 border rounded-xl outline-none"></textarea>
                        
                        <div class="flex flex-wrap gap-2 p-2 bg-slate-50 rounded-2xl border border-dashed border-slate-300">
                            <label class="flex items-center gap-2 px-3 py-2 bg-white border rounded-xl cursor-pointer hover:bg-blue-50 text-[10px] font-bold">
                                <i class="fa-solid fa-image text-blue-500"></i> Imagen
                                <input type="file" id="adjuntoImagen" accept="image/*" class="hidden" onchange="previewFile(this)">
                            </label>
                            <label class="flex items-center gap-2 px-3 py-2 bg-white border rounded-xl cursor-pointer hover:bg-purple-50 text-[10px] font-bold">
                                <i class="fa-solid fa-video text-purple-500"></i> Video
                                <input type="file" id="adjuntoVideo" accept="video/*" class="hidden" onchange="previewFile(this)">
                            </label>
                            <label class="flex items-center gap-2 px-3 py-2 bg-white border rounded-xl cursor-pointer hover:bg-orange-50 text-[10px] font-bold">
                                <i class="fa-solid fa-file-pdf text-orange-500"></i> PDF
                                <input type="file" id="adjuntoDoc" accept=".pdf" class="hidden" onchange="previewFile(this)">
                            </label>
                        </div>
                        <div id="fileInfo" class="text-[10px] text-indigo-500 font-bold italic px-2"></div>

                        <div class="grid grid-cols-2 gap-2">
                            <div>
                                <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Publicar el:</label>
                                <input type="datetime-local" id="fechaProgramada" class="w-full p-2 bg-slate-50 border rounded-xl text-xs outline-none">
                            </div>
                            <div>
                                <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Para:</label>
                                <select id="tagPost" class="w-full p-2 bg-slate-50 border rounded-xl text-xs outline-none font-bold">
                                    <option value="TODOS">Toda la Escuela</option>
                                </select>
                            </div>
                        </div>

                        <div class="flex gap-2 pt-2">
                            <button onclick="mejorarConIA(event)" class="flex-1 bg-indigo-100 text-indigo-600 py-3 rounded-xl font-bold text-xs hover:bg-indigo-200 transition-all">
                                <i class="fa-solid fa-wand-magic-sparkles mr-1"></i> Pulir con IA
                            </button>
                            <button onclick="publicarFeed()" class="flex-[2] bg-pink-500 text-white font-bold py-3 rounded-xl shadow-lg hover:bg-pink-600 transition-all">
                                Publicar en el Muro
                            </button>
                        </div>
                    </div>
                </div>

                <div class="space-y-4" id="previewFeed"></div>
            </div>
        </section>

    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCLeGKE5NoGUQT0GRdMDIHn4zhxF3ZOp6k",
            authDomain: "app-academica-interna.firebaseapp.com",
            projectId: "app-academica-interna",
            storageBucket: "app-academica-interna.firebasestorage.app",
            messagingSenderId: "169882587504",
            appId: "1:169882587504:web:0fcdf32efdc81ad0a0bfb5"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const storage = firebase.storage();

        function tab(id) {
            document.querySelectorAll('.admin-tab').forEach(t => t.classList.add('hidden'));
            document.getElementById('tab-' + id).classList.remove('hidden');
        }

        // --- GESTIÓN DE ARCHIVOS ---
        function previewFile(input) {
            const info = document.getElementById('fileInfo');
            if(input.files.length > 0) {
                info.innerText = `Adjunto listo: ${input.files[0].name}`;
            }
        }

        async function subirArchivo(file, ruta) {
            if(!file) return null;
            const ref = storage.ref().child(`${ruta}/${Date.now()}_${file.name}`);
            await ref.put(file);
            return await ref.getDownloadURL();
        }

        // --- MEJORAR CON IA (FIXED) ---
        async function mejorarConIA(event) {
            const tituloInput = document.getElementById('tituloPost');
            const contenidoInput = document.getElementById('contenidoPost');
            const btnIA = event.currentTarget; 

            if (!contenidoInput.value) return alert("Escribe un borrador primero.");

            const originalHtml = btnIA.innerHTML;
            btnIA.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Puliendo...';
            btnIA.disabled = true;

            const promptText = `Eres un directivo escolar. Mejora este comunicado institucional:
            Título: ${tituloInput.value}
            Mensaje: ${contenidoInput.value}
            Responde ÚNICAMENTE con el cuerpo del mensaje mejorado, con tono profesional y cálido.`;

            try {
                const API_KEY = "AIzaSyATS0LI0XhWWyYEcVyncMWBkFutT-SlWQE";
                // Usando v1beta que es más flexible para generateContent
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;
                
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: promptText }] }]
                    })
                });

                const data = await response.json();
                if (data.error) throw new Error(data.error.message);

                if (data.candidates && data.candidates[0].content) {
                    contenidoInput.value = data.candidates[0].content.parts[0].text.trim();
                }
            } catch (e) {
                console.error(e);
                alert("Error de IA: " + e.message);
            } finally {
                btnIA.innerHTML = originalHtml;
                btnIA.disabled = false;
            }
        }

        // --- PUBLICAR FEED ---
        async function publicarFeed() {
            const titulo = document.getElementById('tituloPost').value;
            const texto = document.getElementById('contenidoPost').value;
            const tag = document.getElementById('tagPost').value;
            const fechaProg = document.getElementById('fechaProgramada').value;
            
            const fileImg = document.getElementById('adjuntoImagen').files[0];
            const fileVid = document.getElementById('adjuntoVideo').files[0];
            const fileDoc = document.getElementById('adjuntoDoc').files[0];

            if(!titulo || !texto) return alert("Completa título y mensaje");

            try {
                const btn = event.currentTarget;
                btn.disabled = true;
                btn.innerText = "Subiendo multimedia...";

                const imgUrl = await subirArchivo(fileImg, 'posts/images');
                const vidUrl = await subirArchivo(fileVid, 'posts/videos');
                const docUrl = await subirArchivo(fileDoc, 'posts/docs');

                await db.collection('comunicados').add({
                    titulo,
                    texto,
                    tag,
                    urlImagen: imgUrl || "",
                    urlVideo: vidUrl || "",
                    urlDoc: docUrl || "",
                    fechaPublicacion: fechaProg ? new Date(fechaProg).toISOString() : new Date().toISOString(),
                    creadoEn: new Date().toISOString(),
                    likes: 0
                });

                alert("¡Publicado con éxito!");
                location.reload();
            } catch (e) {
                alert("Error al publicar: " + e.message);
            }
        }

        // --- CARGA DE DATOS Y LISTENERS ---
        function escucharFeed() {
            db.collection('comunicados').orderBy('creadoEn', 'desc').onSnapshot(snap => {
                const feed = document.getElementById('previewFeed');
                feed.innerHTML = snap.docs.map(doc => {
                    const d = doc.data();
                    return `
                        <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm relative">
                            <span class="absolute top-4 right-4 text-[9px] font-black bg-slate-100 px-2 py-1 rounded text-slate-500 uppercase">${d.tag}</span>
                            <h4 class="font-bold text-slate-800 pr-12">${d.titulo}</h4>
                            <p class="text-sm text-slate-600 mt-2 whitespace-pre-wrap">${d.texto}</p>
                            ${d.urlImagen ? `<img src="${d.urlImagen}" class="mt-3 rounded-xl w-full h-40 object-cover border">` : ''}
                            <div class="mt-4 flex items-center text-[10px] text-slate-400 gap-4 font-bold uppercase">
                                <span><i class="fa-solid fa-clock mr-1"></i> ${new Date(d.fechaPublicacion).toLocaleString()}</span>
                                ${d.urlDoc ? `<a href="${d.urlDoc}" target="_blank" class="text-orange-500"><i class="fa-solid fa-file-pdf mr-1"></i> Ver PDF</a>` : ''}
                            </div>
                        </div>
                    `;
                }).join('');
            });
        }

        async function registrarFamilia() {
            const email = document.getElementById('emailFamilia').value.trim().toLowerCase();
            const nombre = document.getElementById('nombreFamilia').value.trim();
            const hijoID = document.getElementById('selectHijo').value;
            if(!email || !nombre || !hijoID) return alert("Completa todos los campos");
            try {
                await db.collection('usuarios').doc(email).set({ nombre, rol: 'familia', hijoID }, { merge: true });
                alert("Familia registrada");
                document.getElementById('emailFamilia').value = "";
            } catch (e) { alert("Error"); }
        }

        function cargarSelects() {
            db.collection('alumnos').orderBy('nombre').onSnapshot(snap => {
                const selectHijo = document.getElementById('selectHijo');
                const selectAlumno = document.getElementById('cursoAlumno'); // Para la pestaña alumnos
                const options = snap.docs.map(doc => `<option value="${doc.id}">${doc.data().nombre} (${doc.data().cursoID})</option>`).join('');
                selectHijo.innerHTML = options;
            });
            db.collection('cursos').onSnapshot(snap => {
                const tagPost = document.getElementById('tagPost');
                const selectCursoAlumno = document.getElementById('cursoAlumno');
                let opt = '<option value="TODOS">Toda la Escuela</option>';
                let optCursos = '<option value="">Elegir curso...</option>';
                snap.forEach(doc => {
                    opt += `<option value="${doc.id}">Solo ${doc.id}</option>`;
                    optCursos += `<option value="${doc.id}">${doc.id}</option>`;
                });
                tagPost.innerHTML = opt;
                selectCursoAlumno.innerHTML = optCursos;
            });
        }

        // Inicialización
        escucharFeed();
        cargarSelects();
    </script>
</body>
</html>
