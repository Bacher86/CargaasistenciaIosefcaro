<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Admin - Sistema Educativo v6.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .nav-link.active { background: #3b82f6; color: white; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3); }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
    </style>
</head>
<body class="flex min-h-screen">

    <nav class="w-72 bg-white border-r p-6 flex flex-col gap-2 flex-shrink-0">
        <div class="mb-10 px-2">
            <h1 class="text-2xl font-800 text-slate-900 tracking-tight">Edu<span class="text-blue-600">Admin</span></h1>
            <p class="text-xs font-bold text-slate-400 uppercase tracking-widest mt-1">Panel de Control</p>
        </div>
        
        <button onclick="showTab('dashboard')" id="nav-dashboard" class="nav-link active flex items-center p-3 rounded-xl transition-all font-semibold text-slate-600 hover:bg-slate-50">
            <i class="fa-solid fa-chart-pie mr-3 w-5"></i> Dashboard
        </button>
        <button onclick="showTab('alumnos')" id="nav-alumnos" class="nav-link flex items-center p-3 rounded-xl transition-all font-semibold text-slate-600 hover:bg-slate-50">
            <i class="fa-solid fa-graduation-cap mr-3 w-5"></i> Alumnos
        </button>
        <button onclick="showTab('cursos')" id="nav-cursos" class="nav-link flex items-center p-3 rounded-xl transition-all font-semibold text-slate-600 hover:bg-slate-50">
            <i class="fa-solid fa-school mr-3 w-5"></i> Cursos
        </button>
        <button onclick="showTab('familias')" id="nav-familias" class="nav-link flex items-center p-3 rounded-xl transition-all font-semibold text-slate-600 hover:bg-slate-50">
            <i class="fa-solid fa-people-roof mr-3 w-5"></i> Familias
        </button>
        <button onclick="showTab('muro')" id="nav-muro" class="nav-link flex items-center p-3 rounded-xl transition-all font-semibold text-slate-600 hover:bg-slate-50">
            <i class="fa-solid fa-bullhorn mr-3 w-5"></i> Muro Escolar
        </button>
        <button onclick="showTab('calendario')" id="nav-calendario" class="nav-link flex items-center p-3 rounded-xl transition-all font-semibold text-slate-600 hover:bg-slate-50">
            <i class="fa-solid fa-calendar-check mr-3 w-5"></i> Calendario
        </button>
        <button onclick="showTab('chat')" id="nav-chat" class="nav-link flex items-center p-3 rounded-xl transition-all font-semibold text-slate-600 hover:bg-slate-50">
            <i class="fa-solid fa-envelope-open-text mr-3 w-5"></i> Mensajes
        </button>
    </nav>

    <main class="flex-1 p-10 overflow-y-auto">
        
        <section id="tab-dashboard" class="tab-content active">
            <h2 class="text-3xl font-bold text-slate-800 mb-8">Resumen General</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="bg-blue-600 p-6 rounded-3xl text-white shadow-lg">
                    <p class="text-blue-100 font-semibold uppercase text-xs">Total Alumnos</p>
                    <h3 id="stat-alumnos" class="text-4xl font-bold mt-2">--</h3>
                </div>
                <div class="bg-white p-6 rounded-3xl border shadow-sm">
                    <p class="text-slate-400 font-semibold uppercase text-xs">Mensajes Pendientes</p>
                    <h3 id="stat-mensajes" class="text-4xl font-bold mt-2 text-slate-800">--</h3>
                </div>
                <div class="bg-white p-6 rounded-3xl border shadow-sm">
                    <p class="text-slate-400 font-semibold uppercase text-xs">Cursos Activos</p>
                    <h3 id="stat-cursos" class="text-4xl font-bold mt-2 text-slate-800">--</h3>
                </div>
            </div>
        </section>

        <section id="tab-alumnos" class="tab-content">
            <h2 class="text-2xl font-bold mb-6">Registro de Alumnos</h2>
            <div class="bg-white p-8 rounded-3xl border shadow-sm mb-8 grid grid-cols-1 md:grid-cols-3 gap-4">
                <input type="text" id="add-alumno-nombre" placeholder="Nombre completo" class="p-3 bg-slate-50 border rounded-xl outline-none">
                <select id="add-alumno-curso" class="p-3 bg-slate-50 border rounded-xl outline-none font-bold text-slate-600"></select>
                <button onclick="actionAlumno()" class="bg-blue-600 text-white font-bold py-3 rounded-xl hover:bg-blue-700 transition-all">Registrar Alumno</button>
            </div>
            <div id="list-alumnos" class="bg-white rounded-3xl border overflow-hidden shadow-sm"></div>
        </section>

        <section id="tab-cursos" class="tab-content">
            <h2 class="text-2xl font-bold mb-6">Gestión de Cursos</h2>
            <div class="bg-white p-8 rounded-3xl border shadow-sm mb-8 flex gap-4">
                <input type="text" id="add-curso-id" placeholder="Ej: 1° AÑO A" class="flex-1 p-3 bg-slate-50 border rounded-xl font-bold uppercase outline-none">
                <button onclick="actionCurso()" class="bg-green-600 text-white font-bold px-10 rounded-xl hover:bg-green-700">Crear Curso</button>
            </div>
            <div id="list-cursos" class="grid grid-cols-1 md:grid-cols-4 gap-4"></div>
        </section>

        <section id="tab-familias" class="tab-content">
            <h2 class="text-2xl font-bold mb-6">Cuentas de Familias</h2>
            <div class="bg-white p-8 rounded-3xl border shadow-sm max-w-3xl space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" id="add-fam-nombre" placeholder="Nombre Tutor" class="p-3 bg-slate-50 border rounded-xl outline-none">
                    <input type="email" id="add-fam-email" placeholder="email@familia.com" class="p-3 bg-slate-50 border rounded-xl outline-none">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase mb-2 block">Seleccionar Hijo/s (Mantener Ctrl)</label>
                    <select id="add-fam-hijos" multiple class="w-full p-4 bg-slate-50 border rounded-xl h-44 font-semibold text-slate-600"></select>
                </div>
                <button onclick="actionFamilia()" class="w-full bg-slate-900 text-white font-bold py-4 rounded-xl shadow-lg">Vincular Familia</button>
            </div>
            <div id="list-familias" class="mt-10 bg-white rounded-3xl border overflow-hidden shadow-sm"></div>
        </section>

        <section id="tab-muro" class="tab-content">
            <h2 class="text-2xl font-bold mb-6">Comunicación Institucional</h2>
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-10">
                <div class="bg-white p-8 rounded-3xl border shadow-sm space-y-4 h-fit">
                    <input type="text" id="add-muro-titulo" placeholder="Título del comunicado" class="w-full p-4 border rounded-xl font-bold outline-none focus:ring-2 ring-blue-500">
                    <textarea id="add-muro-texto" rows="6" placeholder="¿Qué quieres informar hoy?" class="w-full p-4 border rounded-xl outline-none"></textarea>
                    <select id="add-muro-tag" class="w-full p-3 border rounded-xl font-bold text-slate-500"></select>
                    <button onclick="actionMuro()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl shadow-lg">Publicar en el Muro</button>
                </div>
                <div id="list-muro" class="space-y-4 overflow-y-auto max-h-[700px] pr-2"></div>
            </div>
        </section>

        <section id="tab-calendario" class="tab-content">
            <h2 class="text-2xl font-bold mb-6">Agenda de Eventos</h2>
            <div class="bg-white p-8 rounded-3xl border shadow-sm mb-8 grid grid-cols-1 md:grid-cols-4 gap-4 items-end">
                <div class="space-y-1">
                    <label class="text-xs font-bold text-slate-400">Fecha</label>
                    <input type="date" id="add-cal-fecha" class="w-full p-3 bg-slate-50 border rounded-xl">
                </div>
                <div class="space-y-1 col-span-2">
                    <label class="text-xs font-bold text-slate-400">Nombre del Evento</label>
                    <input type="text" id="add-cal-titulo" placeholder="Ej: Entrega de Diplomas" class="w-full p-3 bg-slate-50 border rounded-xl">
                </div>
                <button onclick="actionCalendario()" class="bg-indigo-600 text-white font-bold py-3.5 rounded-xl">Agendar</button>
            </div>
            <div id="list-calendario" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div>
        </section>

        <section id="tab-chat" class="tab-content">
            <h2 class="text-2xl font-bold mb-6">Centro de Mensajes</h2>
            <div class="bg-white border rounded-3xl overflow-hidden shadow-sm flex h-[600px]">
                <div id="chat-sidebar" class="w-80 border-r bg-slate-50/50 overflow-y-auto"></div>
                <div class="flex-1 flex flex-col">
                    <div id="chat-header" class="p-5 border-b font-bold text-slate-800 bg-white">Selecciona una familia</div>
                    <div id="chat-box" class="flex-1 p-6 overflow-y-auto flex flex-col gap-4 bg-white/50"></div>
                    <div class="p-4 border-t bg-white flex gap-3">
                        <input type="text" id="chat-input" placeholder="Escribe un mensaje..." class="flex-1 p-3 border rounded-2xl outline-none">
                        <button onclick="sendReply()" class="bg-blue-600 text-white px-6 rounded-2xl"><i class="fa-solid fa-paper-plane"></i></button>
                    </div>
                </div>
            </div>
        </section>

    </main>

    <script>
        // CONFIGURACIÓN FIREBASE (REVISADA)
        const fbConfig = {
            apiKey: "AIzaSyCLeGKE5NoGUQT0GRdMDIHn4zhxF3ZOp6k",
            authDomain: "app-academica-interna.firebaseapp.com",
            projectId: "app-academica-interna",
            storageBucket: "app-academica-interna.firebasestorage.app",
            messagingSenderId: "169882587504",
            appId: "1:169882587504:web:0fcdf32efdc81ad0a0bfb5"
        };
        firebase.initializeApp(fbConfig);
        const db = firebase.firestore();
        let currentChatEmail = null;

        // NAVEGACIÓN
        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
            document.getElementById('tab-' + id).classList.add('active');
            document.getElementById('nav-' + id).classList.add('active');
            if(id === 'chat') syncChats();
        }

        // --- GESTIÓN DE CURSOS ---
        async function actionCurso() {
            const id = document.getElementById('add-curso-id').value.toUpperCase().trim();
            if(!id) return;
            await db.collection('cursos').doc(id).set({ nombre: id });
            document.getElementById('add-curso-id').value = "";
        }

        function syncCursos() {
            db.collection('cursos').onSnapshot(snap => {
                let html = "", options = '<option value="TODOS">Toda la Escuela</option>';
                snap.forEach(doc => {
                    html += `<div class="bg-white p-4 rounded-2xl border font-bold flex justify-between shadow-sm">
                                <span>${doc.id}</span>
                                <button onclick="deleteDoc('cursos','${doc.id}')" class="text-red-300 hover:text-red-500">×</button>
                             </div>`;
                    options += `<option value="${doc.id}">${doc.id}</option>`;
                });
                document.getElementById('list-cursos').innerHTML = html;
                document.getElementById('add-alumno-curso').innerHTML = options;
                document.getElementById('add-muro-tag').innerHTML = options;
                document.getElementById('stat-cursos').innerText = snap.size;
            });
        }

        // --- GESTIÓN DE ALUMNOS ---
        async function actionAlumno() {
            const n = document.getElementById('add-alumno-nombre').value.trim();
            const c = document.getElementById('add-alumno-curso').value;
            if(!n || !c) return alert("Faltan datos");
            const res = await db.collection('alumnos').add({ nombre: n, cursoID: c, creadoEn: new Date() });
            await db.collection('calificaciones').doc(res.id).set({ inasistencias: 0, notas: {} });
            document.getElementById('add-alumno-nombre').value = "";
        }

        function syncAlumnos() {
            db.collection('alumnos').orderBy('creadoEn', 'desc').onSnapshot(snap => {
                let html = `<table class="w-full text-left text-sm">
                    <thead class="bg-slate-50 border-b">
                        <tr><th class="p-4">Nombre Alumno</th><th class="p-4">Curso</th><th class="p-4">Acción</th></tr>
                    </thead><tbody>`;
                let options = "";
                snap.forEach(doc => {
                    const data = doc.data();
                    html += `<tr class="border-b hover:bg-slate-50/50">
                                <td class="p-4 font-bold text-slate-700">${data.nombre}</td>
                                <td class="p-4 text-slate-500 font-semibold">${data.cursoID}</td>
                                <td class="p-4"><button onclick="deleteDoc('alumnos','${doc.id}')" class="text-slate-300 hover:text-red-500"><i class="fa-solid fa-trash-can"></i></button></td>
                             </tr>`;
                    options += `<option value="${doc.id}">${data.nombre} (${data.cursoID})</option>`;
                });
                document.getElementById('list-alumnos').innerHTML = html + `</tbody></table>`;
                document.getElementById('add-fam-hijos').innerHTML = options;
                document.getElementById('stat-alumnos').innerText = snap.size;
            });
        }

        // --- GESTIÓN DE FAMILIAS ---
        async function actionFamilia() {
            const n = document.getElementById('add-fam-nombre').value.trim();
            const e = document.getElementById('add-fam-email').value.toLowerCase().trim();
            const h = Array.from(document.getElementById('add-fam-hijos').selectedOptions).map(o => o.value);
            if(!e || h.length === 0) return alert("Email e hijos obligatorios");
            await db.collection('usuarios').doc(e).set({ nombre: n, email: e, rol: 'familia', hijoID: h });
            alert("Familia Registrada");
        }

        function syncFamilias() {
            db.collection('usuarios').where('rol','==','familia').onSnapshot(snap => {
                let html = `<table class="w-full text-left text-sm"><thead class="bg-slate-50 border-b"><tr><th class="p-4">Tutor / Email</th><th class="p-4 text-xs">Hijos Vinculados</th><th class="p-4 text-center">Borrar</th></tr></thead><tbody>`;
                snap.forEach(doc => {
                    const d = doc.data();
                    html += `<tr class="border-b">
                        <td class="p-4"><p class="font-bold">${d.nombre}</p><p class="text-[10px] text-slate-400">${d.email}</p></td>
                        <td class="p-4 text-[9px] text-slate-400 break-all font-mono">${d.hijoID.join(' | ')}</td>
                        <td class="p-4 text-center"><button onclick="deleteDoc('usuarios','${doc.id}')" class="text-red-200 hover:text-red-500">×</button></td>
                    </tr>`;
                });
                document.getElementById('list-familias').innerHTML = html + `</tbody></table>`;
            });
        }

        // --- MURO ---
        async function actionMuro() {
            const tit = document.getElementById('add-muro-titulo').value.trim();
            const txt = document.getElementById('add-muro-texto').value.trim();
            const tag = document.getElementById('add-muro-tag').value;
            if(!tit || !txt) return;
            await db.collection('comunicados').add({ 
                titulo: tit, texto: txt, tag: tag, fecha: new Date().toISOString() 
            });
            document.getElementById('add-muro-titulo').value = "";
            document.getElementById('add-muro-texto').value = "";
        }

        function syncMuro() {
            db.collection('comunicados').orderBy('fecha', 'desc').onSnapshot(snap => {
                document.getElementById('list-muro').innerHTML = snap.docs.map(doc => {
                    const d = doc.data();
                    return `<div class="bg-white p-6 rounded-3xl border shadow-sm relative group transition-all hover:border-blue-200">
                        <button onclick="deleteDoc('comunicados','${doc.id}')" class="absolute top-4 right-4 text-slate-200 group-hover:text-red-400 transition-colors">×</button>
                        <span class="text-[9px] font-black bg-blue-50 text-blue-600 px-3 py-1 rounded-full uppercase">${d.tag}</span>
                        <h4 class="font-bold text-slate-800 mt-3 text-lg">${d.titulo}</h4>
                        <p class="text-slate-500 text-sm mt-2 whitespace-pre-wrap leading-relaxed">${d.texto}</p>
                    </div>`;
                }).join('');
            });
        }

        // --- CALENDARIO ---
        async function actionCalendario() {
            const f = document.getElementById('add-cal-fecha').value;
            const t = document.getElementById('add-cal-titulo').value.trim();
            if(!f || !t) return alert("Faltan datos del evento");
            await db.collection('eventos').add({ fecha: f, titulo: t, creadoEn: new Date() });
            document.getElementById('add-cal-titulo').value = "";
        }

        function syncCalendario() {
            db.collection('eventos').orderBy('fecha', 'asc').onSnapshot(snap => {
                document.getElementById('list-calendario').innerHTML = snap.docs.map(doc => {
                    const d = doc.data();
                    return `<div class="bg-white p-5 rounded-2xl border flex justify-between items-center shadow-sm">
                        <div><p class="text-xs font-black text-indigo-500 uppercase">${d.fecha}</p><p class="font-bold text-slate-700">${d.titulo}</p></div>
                        <button onclick="deleteDoc('eventos','${doc.id}')" class="text-red-200">×</button>
                    </div>`;
                }).join('');
            });
        }

        // --- CHAT ---
        function syncChats() {
            db.collection('mensajes').onSnapshot(snap => {
                const ems = [...new Set(snap.docs.map(d => d.data().participantes || []).flat())].filter(e => e !== 'secretaria_primaria');
                document.getElementById('chat-sidebar').innerHTML = ems.map(e => `
                    <div onclick="openChat('${e}')" class="p-4 border-b cursor-pointer hover:bg-white transition-all">
                        <p class="font-bold text-xs text-slate-600">${e}</p>
                    </div>`).join('');
                document.getElementById('stat-mensajes').innerText = ems.length;
            });
        }

        function openChat(email) {
            currentChatEmail = email;
            document.getElementById('chat-header').innerText = "Chat con: " + email;
            db.collection('mensajes').where('participantes', 'array-contains', email).orderBy('fecha', 'asc').onSnapshot(snap => {
                const box = document.getElementById('chat-box');
                box.innerHTML = snap.docs.map(doc => {
                    const esAdm = doc.data().emisorID === 'secretaria_primaria';
                    return `<div class="max-w-[80%] p-4 rounded-2xl text-xs font-semibold ${esAdm ? 'bg-blue-600 text-white self-end rounded-tr-none shadow-md' : 'bg-slate-100 text-slate-600 self-start rounded-tl-none border'}">
                        ${doc.data().texto}
                    </div>`;
                }).join('');
                box.scrollTop = box.scrollHeight;
            });
        }

        async function sendReply() {
            const inp = document.getElementById('chat-input');
            if(!inp.value || !currentChatEmail) return;
            await db.collection('mensajes').add({
                emisorID: "secretaria_primaria", receptorID: currentChatEmail,
                participantes: [currentChatEmail, "secretaria_primaria"],
                texto: inp.value, fecha: new Date().toISOString()
            });
            inp.value = "";
        }

        // --- UTILIDADES ---
        async function deleteDoc(col, id) {
            if(confirm("¿Eliminar definitivamente?")) await db.collection(col).doc(id).delete();
        }

        // INICIO
        window.onload = () => {
            syncCursos();
            syncAlumnos();
            syncFamilias();
            syncMuro();
            syncCalendario();
        };

    </script>
</body>
</html>
